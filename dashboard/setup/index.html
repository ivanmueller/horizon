<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password — Horizon partner dashboard</title>
  <meta name="description" content="Pick a password for future Horizon partner-dashboard sign-ins.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://connect.gowithhorizon.com/setup/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css_new/horizon-connect-tokens.css">
  <link rel="stylesheet" href="/css_new/horizon-connect-responsive.css">
  <link rel="stylesheet" href="/css_new/horizon-connect-components.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%234F5BFF'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">
  <style>body { visibility: hidden; }</style>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: var(--type-body-size);
      line-height: var(--type-body-line);
      color: var(--text-body);
    }

    /* ── Brand mark ───────────────────────────────────────────────── */
    .auth-brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .auth-brand__name {
      font-size: var(--type-subheading-size);
      line-height: var(--type-subheading-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Card — auth-specific extension of .card inside .auth-layout */
    .auth-card {
      width: 100%;
      max-width: 440px;
    }
    @media (min-width: 640px) /* --bp-sm */ {
      .auth-card { padding: var(--space-2xl); }
    }

    .auth-card__title {
      font-size: var(--type-heading-size);
      line-height: var(--type-heading-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin: 0 0 var(--space-sm);
    }
    .auth-card__sub {
      font-size: var(--type-body-size);
      line-height: var(--type-body-line);
      color: var(--text-body);
      margin: 0 0 var(--space-xl);
    }

    /* ── Form ─────────────────────────────────────────────────────── */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }
    .auth-field { display: flex; flex-direction: column; gap: var(--space-sm); }
    .auth-label {
      font-size: var(--type-label-size);
      line-height: var(--type-label-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
    }
    .auth-input {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: var(--space-md);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      font: inherit;
      font-size: var(--type-body-size);
      line-height: var(--type-body-line);
      color: var(--text-primary);
      background: var(--bg-surface);
    }
    .auth-input::placeholder { color: var(--text-tertiary); }
    .auth-input:hover  { border-color: var(--border-strong); }
    .auth-input:focus  {
      outline: none;
      border-color: var(--border-brand);
      box-shadow: var(--shadow-focus-ring);
    }
    .auth-input:disabled {
      background: var(--bg-subtle);
      color: var(--text-secondary);
      cursor: not-allowed;
    }
    .auth-hint {
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      color: var(--text-secondary);
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .auth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: var(--space-md) var(--space-lg);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      font: inherit;
      font-size: var(--type-label-size);
      line-height: var(--type-label-line);
      font-weight: var(--weight-medium);
      cursor: pointer;
      margin-top: var(--space-sm);
    }
    .auth-btn:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus-ring);
    }
    .auth-btn--primary {
      background: var(--action-primary-default);
      color: var(--text-inverse);
    }
    .auth-btn--primary:hover:not(:disabled)  { background: var(--action-primary-hover); }
    .auth-btn--primary:active:not(:disabled) { background: var(--action-primary-pressed); }
    .auth-btn--primary:disabled {
      background: var(--action-primary-disabled);
      cursor: progress;
    }

    /* ── Banner ───────────────────────────────────────────────────── */
    .auth-banner {
      padding: var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      border-width: 1px;
      border-style: solid;
    }
    .auth-banner--error {
      background: var(--feedback-danger-bg);
      border-color: var(--feedback-danger-border);
      color: var(--feedback-danger-text);
    }
    .auth-banner[hidden] { display: none; }

    /* ── Footer ───────────────────────────────────────────────────── */
    .auth-card__footer {
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      color: var(--text-secondary);
      text-align: center;
      margin: var(--space-xl) 0 0;
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-subtle);
    }
    .auth-link-btn {
      background: none;
      border: 0;
      padding: var(--space-xs) var(--space-sm);
      font: inherit;
      font-size: inherit;
      line-height: inherit;
      color: var(--text-brand);
      font-weight: var(--weight-medium);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .auth-link-btn:hover { color: var(--action-primary-hover); text-decoration: underline; }
    .auth-link-btn:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus-ring);
    }
  </style>
</head>
<body>

  <div class="auth-layout">

  <div class="auth-brand">
    <svg width="28" height="28" viewBox="0 0 36 36" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#4F5BFF"/>
      <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="auth-brand__name">Horizon</span>
  </div>

  <main class="card auth-card">
    <h1 class="auth-card__title">Set your password</h1>
    <p class="auth-card__sub">
      You're signed in. Pick a password to use for future sign-ins —
      it's faster than waiting for a verification code.
    </p>

    <p class="auth-banner auth-banner--error" id="hsError" hidden></p>

    <form class="auth-form" id="hsSetupForm" autocomplete="on">
      <div class="auth-field">
        <label class="auth-label" for="hsEmail">Email</label>
        <input class="auth-input" type="email" id="hsEmail" disabled>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="hsPassword">New password</label>
        <input class="auth-input" type="password" id="hsPassword"
               autocomplete="new-password" minlength="8" required autofocus>
        <span class="auth-hint">At least 8 characters.</span>
      </div>

      <div class="auth-field">
        <label class="auth-label" for="hsConfirm">Confirm password</label>
        <input class="auth-input" type="password" id="hsConfirm"
               autocomplete="new-password" minlength="8" required>
      </div>

      <button type="submit" class="auth-btn auth-btn--primary" id="hsSubmit">
        Save password &amp; continue
      </button>
    </form>

    <p class="auth-card__footer">
      Wrong account? <button type="button" class="auth-link-btn" id="hsSignout">Sign out</button>
    </p>
  </main>

  </div><!-- /.auth-layout -->

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
    import { cookieStorage } from '/js/supabase-cookie-storage.js';

    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';
    const BOKUN_API     = 'https://horizon-bokun.ivan-mueller02.workers.dev';

    // Read the link type before supabase-js consumes (and strips) the
    // URL hash. Supabase recovery links carry type=recovery; invite /
    // magic-link / signup do not — used only to word the page as a
    // password *reset* vs first-time *setup*.
    const IS_RECOVERY =
      new URLSearchParams(window.location.hash.replace(/^#/, '')).get('type') === 'recovery';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storage: cookieStorage },
    });

    const els = {
      form:     document.getElementById('hsSetupForm'),
      email:    document.getElementById('hsEmail'),
      password: document.getElementById('hsPassword'),
      confirm:  document.getElementById('hsConfirm'),
      submit:   document.getElementById('hsSubmit'),
      error:    document.getElementById('hsError'),
      signout:  document.getElementById('hsSignout'),
    };

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.replace('/login/');
      throw new Error('redirecting to /dashboard/login/');
    }

    document.body.style.visibility = 'visible';

    // supabase-js has already parsed the session out of the hash by
    // now; clear any residue (token params or a bare "#") so the URL
    // bar reads cleanly.
    if (window.location.hash) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    if (IS_RECOVERY) {
      document.title = 'Reset your password — Horizon partner dashboard';
      document.querySelector('.auth-card__title').textContent = 'Reset your password';
      document.querySelector('.auth-card__sub').textContent =
        'Choose a new password for your account.';
    }

    els.email.value = (session.user && session.user.email) || '';

    function showError(msg) { els.error.textContent = msg; els.error.hidden = false; }
    function clearError()   { els.error.hidden = true; els.error.textContent = ''; }

    els.form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const pw  = els.password.value;
      const pw2 = els.confirm.value;
      if (pw.length < 8)   { showError('Password must be at least 8 characters.'); return; }
      if (pw !== pw2)      { showError('Passwords don’t match.'); return; }

      els.submit.disabled = true;
      els.submit.textContent = 'Saving…';

      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) throw error;

        const { data: { session: sess } } = await supabase.auth.getSession();
        if (sess?.access_token) {
          await fetch(`${BOKUN_API}/api/auth/mark-password-set`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${sess.access_token}` },
          }).catch(() => {});
        }

        window.location.replace('/');
      } catch (err) {
        console.error('updateUser failed', err);
        showError(err.message || 'Could not save password.');
        els.submit.disabled = false;
        els.submit.textContent = 'Save password & continue';
      }
    });

    els.signout.addEventListener('click', async () => {
      els.signout.disabled = true;
      await supabase.auth.signOut();
      window.location.replace('/login/');
    });
  </script>

</body>
</html>
