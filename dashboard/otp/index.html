<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your email — Horizon partner dashboard</title>
  <meta name="description" content="Enter the 6-digit code sent to your email to continue.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://gowithhorizon.com/dashboard/otp/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      visibility: hidden;
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f6f9fc;
      color: #1a1f36;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .brand__text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1f36;
      letter-spacing: -0.01em;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #e6ebf1;
      border-radius: 8px;
      padding: 40px 48px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .card__title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1f36;
      margin: 0 0 6px;
    }
    .card__sub {
      font-size: 0.875rem;
      color: #697386;
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .card__sub strong {
      color: #1a1f36;
      font-weight: 500;
    }

    .field + .field { margin-top: 16px; }
    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #1a1f36;
      margin-bottom: 6px;
    }

    /* 6-box OTP input grid */
    .otp-grid {
      display: flex;
      gap: 8px;
    }
    .otp-grid input {
      flex: 1;
      width: 0; /* flex overrides, prevents overflow */
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      font-family: inherit;
      color: #1a1f36;
      padding: 12px 4px;
      border: 1px solid #e6ebf1;
      border-radius: 6px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      /* prevent mobile zoom */
      -webkit-text-size-adjust: 100%;
    }
    .otp-grid input:focus {
      border-color: #FF6B4A;
      box-shadow: 0 0 0 3px rgba(255,107,74,0.12);
    }
    .otp-grid input.otp--invalid {
      border-color: #e25950;
      box-shadow: 0 0 0 3px rgba(226,89,80,0.12);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      60%       { transform: translateX(4px); }
      80%       { transform: translateX(-2px); }
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px 16px;
      background: #FF6B4A;
      color: #fff;
      border: 0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #e85e3f; }
    .btn:disabled { opacity: 0.55; cursor: progress; }

    .error-msg {
      margin-top: 14px;
      padding: 10px 14px;
      background: #fff8f7;
      border: 1px solid #f9c9c2;
      border-radius: 6px;
      font-size: 0.8125rem;
      color: #a4271e;
    }
    .error-msg[hidden] { display: none; }

    .resend-row {
      margin-top: 20px;
      font-size: 0.8125rem;
      color: #697386;
      text-align: center;
    }
    .resend-row button {
      background: none;
      border: 0;
      padding: 0;
      font: inherit;
      font-size: inherit;
      color: #FF6B4A;
      cursor: pointer;
      font-weight: 500;
    }
    .resend-row button:hover { text-decoration: underline; }
    .resend-row button:disabled { opacity: 0.5; cursor: default; text-decoration: none; }

    .back-row {
      margin-top: 12px;
      font-size: 0.8125rem;
      color: #697386;
      text-align: center;
    }
    .back-row a {
      color: #697386;
      text-decoration: none;
    }
    .back-row a:hover { color: #1a1f36; text-decoration: underline; }

    .footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #a3acb9;
      text-align: center;
      line-height: 1.5;
    }
    .footer a { color: inherit; }
  </style>
</head>
<body>

  <div class="brand">
    <svg width="32" height="32" viewBox="0 0 36 36" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#FF6B4A"/>
      <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="brand__text">horizon</span>
  </div>

  <div class="card">
    <h1 class="card__title">Check your email</h1>
    <p class="card__sub">
      We sent a 6-digit code to <strong id="emailDisplay"></strong>.
      Enter it below to continue.
    </p>

    <div class="field">
      <label>Verification code</label>
      <div class="otp-grid" id="otpGrid" role="group" aria-label="One-time code">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="one-time-code" aria-label="Digit 1">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 2">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 3">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 4">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 5">
        <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]" aria-label="Digit 6">
      </div>
    </div>

    <p class="error-msg" id="errorMsg" hidden></p>

    <button type="button" class="btn" id="verifyBtn" disabled>Verify code</button>

    <p class="resend-row">
      Didn't receive it?
      <button type="button" id="resendBtn">Resend code</button>
    </p>
    <p class="back-row">
      <a href="/dashboard/login/" id="backLink">&larr; Use a different email</a>
    </p>
  </div>

  <p class="footer">
    Access is by invitation only.
    Need help? <a href="mailto:hello@gowithhorizon.com">hello@gowithhorizon.com</a>
  </p>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';
    const LOGIN_PAGE    = '/dashboard/login/';
    const SETUP_PAGE    = '/dashboard/setup/';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    // Pull email from ?email= query param — set by login page after sending OTP.
    const params = new URLSearchParams(window.location.search);
    const email  = (params.get('email') || '').trim();

    if (!email) {
      // No email in URL → someone navigated directly; send them back.
      window.location.replace(LOGIN_PAGE);
      throw new Error('no email param — redirecting');
    }

    document.getElementById('emailDisplay').textContent = email;
    document.getElementById('backLink').href = LOGIN_PAGE;
    document.body.style.visibility = 'visible';

    // ── OTP grid behaviour ────────────────────────────────────────────────────

    const grid     = document.getElementById('otpGrid');
    const cells    = Array.from(grid.querySelectorAll('input'));
    const verifyBtn = document.getElementById('verifyBtn');
    const errorMsg  = document.getElementById('errorMsg');

    function getCode() { return cells.map(c => c.value).join(''); }
    function isComplete() { return getCode().length === 6; }

    function updateVerifyState() {
      verifyBtn.disabled = !isComplete();
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.hidden = false;
      // Shake all cells to signal failure.
      cells.forEach(c => {
        c.classList.remove('otp--invalid');
        void c.offsetWidth; // reflow to restart animation
        c.classList.add('otp--invalid');
      });
    }

    function clearError() {
      errorMsg.hidden = true;
      errorMsg.textContent = '';
      cells.forEach(c => c.classList.remove('otp--invalid'));
    }

    function clearCells() {
      cells.forEach(c => { c.value = ''; c.classList.remove('otp--invalid'); });
      cells[0].focus();
      updateVerifyState();
    }

    cells.forEach((cell, i) => {
      cell.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !cell.value && i > 0) {
          cells[i - 1].focus();
        }
      });

      cell.addEventListener('input', (e) => {
        clearError();
        const val = e.data ?? cell.value;

        // Handle a pasted/auto-filled full code in the first cell.
        if (val && val.length === 6 && /^\d{6}$/.test(val)) {
          val.split('').forEach((ch, j) => { cells[j].value = ch; });
          cells[5].focus();
          updateVerifyState();
          return;
        }

        // Accept only a single digit.
        const digit = val ? val.replace(/\D/g, '').slice(-1) : '';
        cell.value = digit;

        if (digit && i < cells.length - 1) {
          cells[i + 1].focus();
        }

        updateVerifyState();
      });

      // Allow paste on any cell — fills from that position onward.
      cell.addEventListener('paste', (e) => {
        e.preventDefault();
        clearError();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g, '');
        pasted.split('').forEach((ch, offset) => {
          if (i + offset < cells.length) cells[i + offset].value = ch;
        });
        const next = Math.min(i + pasted.length, cells.length - 1);
        cells[next].focus();
        updateVerifyState();
      });
    });

    // Auto-submit when all six digits are filled.
    grid.addEventListener('input', () => {
      if (isComplete()) verifyBtn.click();
    });

    // ── Verify ────────────────────────────────────────────────────────────────

    async function verify() {
      clearError();
      const token = getCode();
      if (token.length !== 6) return;

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying…';

      try {
        const { error } = await supabase.auth.verifyOtp({
          email,
          token,
          type: 'email',
        });

        if (error) throw error;

        // OTP accepted — session is now established.
        // Redirect to the set-password page.
        window.location.replace(SETUP_PAGE);
      } catch (err) {
        console.error('verifyOtp failed', err);
        const msg = err.message?.toLowerCase() || '';
        if (msg.includes('expired') || msg.includes('invalid')) {
          showError('Code is invalid or has expired. Request a new one below.');
        } else {
          showError(err.message || 'Verification failed. Please try again.');
        }
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify code';
      }
    }

    verifyBtn.addEventListener('click', verify);

    // ── Resend ────────────────────────────────────────────────────────────────

    const resendBtn = document.getElementById('resendBtn');
    let resendCooldown = null;

    function startCooldown(seconds) {
      resendBtn.disabled = true;
      let remaining = seconds;
      resendBtn.textContent = `Resend code (${remaining}s)`;
      resendCooldown = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(resendCooldown);
          resendCooldown = null;
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend code';
        } else {
          resendBtn.textContent = `Resend code (${remaining}s)`;
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      if (resendCooldown) return;
      clearError();
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending…';

      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { shouldCreateUser: false },
        });
        if (error) throw error;
        clearCells();
        startCooldown(60);
      } catch (err) {
        console.error('resend OTP failed', err);
        showError(err.message || 'Could not resend code. Please try again.');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      }
    });

    // Focus the first cell on load.
    cells[0].focus();
  </script>

</body>
</html>
