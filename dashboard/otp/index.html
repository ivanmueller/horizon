<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your email — Horizon partner dashboard</title>
  <meta name="description" content="Enter the code sent to your email to continue.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://connect.gowithhorizon.com/otp/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css_new/horizon-connect-tokens.css">
  <link rel="stylesheet" href="/css_new/horizon-connect-responsive.css">
  <link rel="stylesheet" href="/css_new/horizon-connect-components.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%234920C4'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">
  <style>body { visibility: hidden; }</style>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: var(--type-body-size);
      line-height: var(--type-body-line);
      color: var(--text-body);
    }

    /* ── Brand mark ───────────────────────────────────────────────── */
    .auth-brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .auth-brand__name {
      font-size: var(--type-subheading-size);
      line-height: var(--type-subheading-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Card — auth-specific extension of .card inside .auth-layout */
    .auth-card {
      width: 100%;
      max-width: 440px;
    }
    @media (min-width: 640px) /* --bp-sm */ {
      .auth-card { padding: var(--space-2xl); }
    }

    .auth-card__title {
      font-size: var(--type-heading-size);
      line-height: var(--type-heading-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin: 0 0 var(--space-sm);
    }
    .auth-card__sub {
      font-size: var(--type-body-size);
      line-height: var(--type-body-line);
      color: var(--text-body);
      margin: 0 0 var(--space-xl);
    }
    .auth-card__sub strong {
      color: var(--text-primary);
      font-weight: var(--weight-medium);
    }

    /* ── Field ────────────────────────────────────────────────────── */
    .auth-field { margin-bottom: var(--space-lg); }
    .auth-label {
      display: block;
      font-size: var(--type-label-size);
      line-height: var(--type-label-line);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
    }

    /* ── 8-cell OTP grid ──────────────────────────────────────────── */
    .otp-grid {
      display: flex;
      gap: var(--space-xs);
    }
    .otp-grid input {
      flex: 1;
      width: 0;
      min-width: 0;
      min-height: 44px;
      padding: var(--space-md) 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: var(--type-subheading-size);
      line-height: 1;
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      outline: none;
      text-transform: uppercase;
      -webkit-text-size-adjust: 100%;
    }
    .otp-grid input:hover { border-color: var(--border-strong); }
    .otp-grid input:focus {
      border-color: var(--border-brand);
      box-shadow: var(--shadow-focus-ring);
    }
    .otp-grid input.otp--invalid {
      border-color: var(--border-danger);
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .auth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: var(--space-md) var(--space-lg);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      font: inherit;
      font-size: var(--type-label-size);
      line-height: var(--type-label-line);
      font-weight: var(--weight-medium);
      cursor: pointer;
      margin-top: var(--space-lg);
    }
    .auth-btn:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus-ring);
    }
    .auth-btn--primary {
      background: var(--action-primary-default);
      color: var(--text-inverse);
    }
    .auth-btn--primary:hover:not(:disabled)  { background: var(--action-primary-hover); }
    .auth-btn--primary:active:not(:disabled) { background: var(--action-primary-pressed); }
    .auth-btn--primary:disabled {
      background: var(--action-primary-disabled);
      cursor: not-allowed;
    }

    /* ── Banner ───────────────────────────────────────────────────── */
    .auth-banner {
      margin-top: var(--space-md);
      padding: var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      border-width: 1px;
      border-style: solid;
    }
    .auth-banner--error {
      background: var(--feedback-danger-bg);
      border-color: var(--feedback-danger-border);
      color: var(--feedback-danger-text);
    }
    .auth-banner[hidden] { display: none; }

    /* ── Resend / back rows ───────────────────────────────────────── */
    .auth-meta-row {
      margin-top: var(--space-lg);
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      color: var(--text-secondary);
      text-align: center;
    }
    .auth-meta-row--tight { margin-top: var(--space-sm); }
    .auth-link-btn {
      background: none;
      border: 0;
      padding: var(--space-xs) var(--space-sm);
      font: inherit;
      font-size: inherit;
      line-height: inherit;
      color: var(--text-brand);
      font-weight: var(--weight-medium);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .auth-link-btn:hover:not(:disabled) {
      color: var(--action-primary-hover);
      text-decoration: underline;
    }
    .auth-link-btn:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus-ring);
    }
    .auth-link-btn:disabled {
      color: var(--text-tertiary);
      cursor: not-allowed;
    }
    .auth-text-link {
      color: var(--text-secondary);
      text-decoration: none;
    }
    .auth-text-link:hover { color: var(--text-primary); text-decoration: underline; }

    /* ── Page footer ──────────────────────────────────────────────── */
    .auth-footer {
      font-size: var(--type-caption-size);
      line-height: var(--type-caption-line);
      color: var(--text-tertiary);
      text-align: center;
      max-width: 440px;
    }
    .auth-footer a { color: inherit; text-decoration: underline; }
    .auth-footer a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>

  <div class="auth-layout">

  <div class="auth-brand">
    <svg width="28" height="28" viewBox="0 0 36 36" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#4920C4"/>
      <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="auth-brand__name">Horizon</span>
  </div>

  <main class="card auth-card">
    <h1 class="auth-card__title">Check your email</h1>
    <p class="auth-card__sub">
      We sent a verification code to <strong id="emailDisplay"></strong>.
      Enter it below to continue.
    </p>

    <div class="auth-field">
      <label class="auth-label">Verification code</label>
      <div class="otp-grid" id="otpGrid" role="group" aria-label="Verification code">
        <input type="text" inputmode="text" maxlength="1" autocomplete="one-time-code" autocapitalize="characters" aria-label="Character 1">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 2">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 3">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 4">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 5">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 6">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 7">
        <input type="text" inputmode="text" maxlength="1" autocapitalize="characters" aria-label="Character 8">
      </div>
    </div>

    <p class="auth-banner auth-banner--error" id="errorMsg" hidden></p>

    <button type="button" class="auth-btn auth-btn--primary" id="verifyBtn" disabled>Verify code</button>

    <p class="auth-meta-row">
      Didn't receive it?
      <button type="button" class="auth-link-btn" id="resendBtn">Resend code</button>
    </p>
    <p class="auth-meta-row auth-meta-row--tight">
      <a class="auth-text-link" href="/login/" id="backLink">Use a different email</a>
    </p>
  </main>

  <p class="auth-footer">
    Access is by invitation only.
    Need help? <a href="mailto:hello@gowithhorizon.com">hello@gowithhorizon.com</a>
  </p>

  </div><!-- /.auth-layout -->

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
    import { cookieStorage } from '/js/supabase-cookie-storage.js';

    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';
    const LOGIN_PAGE = '/login/';
    const SETUP_PAGE = '/setup/';
    const CODE_LEN   = 8;

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storage: cookieStorage },
    });

    const params = new URLSearchParams(window.location.search);
    const email  = (params.get('email') || '').trim();

    if (!email) {
      window.location.replace(LOGIN_PAGE);
      throw new Error('no email param — redirecting');
    }

    document.getElementById('emailDisplay').textContent = email;
    document.getElementById('backLink').href = LOGIN_PAGE;
    document.body.style.visibility = 'visible';

    const grid      = document.getElementById('otpGrid');
    const cells     = Array.from(grid.querySelectorAll('input'));
    const verifyBtn = document.getElementById('verifyBtn');
    const errorMsg  = document.getElementById('errorMsg');

    const VALID_CHAR = /^[a-zA-Z0-9]$/;

    function getCode() { return cells.map(c => c.value).join(''); }
    function isComplete() { return getCode().length === CODE_LEN; }
    function updateVerifyState() { verifyBtn.disabled = !isComplete(); }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.hidden = false;
      cells.forEach(c => c.classList.add('otp--invalid'));
    }

    function clearError() {
      errorMsg.hidden = true;
      errorMsg.textContent = '';
      cells.forEach(c => c.classList.remove('otp--invalid'));
    }

    function clearCells() {
      cells.forEach(c => { c.value = ''; c.classList.remove('otp--invalid'); });
      cells[0].focus();
      updateVerifyState();
    }

    cells.forEach((cell, i) => {
      cell.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !cell.value && i > 0) {
          cells[i - 1].focus();
        }
      });

      cell.addEventListener('input', (e) => {
        clearError();
        const raw = (e.data ?? cell.value).toUpperCase();

        if (i === 0 && raw.length === CODE_LEN && raw.split('').every(ch => VALID_CHAR.test(ch))) {
          raw.split('').forEach((ch, j) => { cells[j].value = ch; });
          cells[CODE_LEN - 1].focus();
          updateVerifyState();
          return;
        }

        const ch = raw.replace(/[^A-Z0-9]/g, '').slice(-1);
        cell.value = ch;

        if (ch && i < cells.length - 1) {
          cells[i + 1].focus();
        }

        updateVerifyState();
      });

      cell.addEventListener('paste', (e) => {
        e.preventDefault();
        clearError();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData('text')
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, '');
        pasted.split('').forEach((ch, offset) => {
          if (i + offset < cells.length) cells[i + offset].value = ch;
        });
        const next = Math.min(i + pasted.length, cells.length - 1);
        cells[next].focus();
        updateVerifyState();
      });
    });

    grid.addEventListener('input', () => {
      if (isComplete()) verifyBtn.click();
    });

    async function verify() {
      clearError();
      const token = getCode();
      if (token.length !== CODE_LEN) return;

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying…';

      try {
        const { error } = await supabase.auth.verifyOtp({
          email,
          token,
          type: 'email',
        });

        if (error) throw error;
        window.location.replace(SETUP_PAGE);
      } catch (err) {
        console.error('verifyOtp failed', err);
        const msg = (err.message || '').toLowerCase();
        if (msg.includes('expired') || msg.includes('invalid')) {
          showError('Code is invalid or has expired. Request a new one below.');
        } else {
          showError(err.message || 'Verification failed. Please try again.');
        }
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify code';
      }
    }

    verifyBtn.addEventListener('click', verify);

    const resendBtn = document.getElementById('resendBtn');
    let resendCooldown = null;

    function startCooldown(seconds) {
      resendBtn.disabled = true;
      let remaining = seconds;
      resendBtn.textContent = `Resend code (${remaining}s)`;
      resendCooldown = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(resendCooldown);
          resendCooldown = null;
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend code';
        } else {
          resendBtn.textContent = `Resend code (${remaining}s)`;
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      if (resendCooldown) return;
      clearError();
      resendBtn.disabled = true;
      resendBtn.textContent = 'Sending…';

      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { shouldCreateUser: false },
        });
        if (error) throw error;
        clearCells();
        startCooldown(60);
      } catch (err) {
        console.error('resend OTP failed', err);
        showError(err.message || 'Could not resend code. Please try again.');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      }
    });

    cells[0].focus();
  </script>

</body>
</html>
