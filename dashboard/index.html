<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Commission Dashboard — Horizon Tours</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts (Horizon brand) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Horizon brand tokens -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">

  <style>
    /* ============================================================
       Dashboard — Page shell & layout grid (Step 1)
       ============================================================ */

    :root {
      --dash-header-height: 56px;
    }

    html, body {
      background: var(--warm-white);
      color: var(--near-black);
      font-family: var(--font-body);
    }

    /* --- Outer page wrapper --- */
    .dash-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Sticky header bar --- */
    .dash-header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--dash-header-height);
      background: #FFFFFF;
      border-bottom: 1px solid var(--border-color);
    }
    .dash-header__inner {
      max-width: var(--container-max);
      height: 100%;
      margin: 0 auto;
      padding: 0 var(--container-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    /* Left: property identity */
    .dash-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }
    .dash-brand__avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      background: var(--near-black);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .dash-brand__name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--near-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Right cluster: date toggle + settings */
    .dash-header__right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    /* Date range pill toggle */
    .date-toggle {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      background: var(--warm-white-alt);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
    }
    .date-toggle__option {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 5px 12px;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--mid-gray);
      border-radius: var(--radius-full);
      cursor: pointer;
      line-height: 1;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    .date-toggle__option:hover {
      color: var(--near-black);
    }
    .date-toggle__option[aria-pressed="true"] {
      background: #FFFFFF;
      color: var(--near-black);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(26, 26, 46, 0.06);
    }
    .date-toggle__option:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }

    /* Settings gear */
    .dash-icon-btn {
      appearance: none;
      border: 0;
      background: transparent;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--mid-gray);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    .dash-icon-btn:hover {
      background: var(--warm-white-alt);
      color: var(--near-black);
    }
    .dash-icon-btn:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }
    .dash-icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* --- Main content container (where future sections will live) --- */
    .dash-main {
      flex: 1;
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--space-8) var(--container-padding) var(--space-16);
    }

    /* --- KPI summary cards row --- */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .kpi-card {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-width: 0;
    }
    .kpi-card__label {
      font-family: var(--font-body);
      font-size: 0.8125rem;       /* 13px */
      font-weight: 500;
      color: var(--mid-gray);
      line-height: 1.4;
    }
    .kpi-card__value {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 2.4vw, 2rem);  /* 28–32px */
      font-weight: 700;
      color: var(--near-black);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .kpi-card__trend {
      font-family: var(--font-body);
      font-size: 0.8125rem;       /* 13px */
      font-weight: 500;
      line-height: 1.3;
    }
    .kpi-card__trend--up      { color: #1A9E6D; }
    .kpi-card__trend--down    { color: #D14848; }
    .kpi-card__trend--flat    { color: var(--mid-gray); }
    .kpi-card__trend--neutral { color: var(--mid-gray); }

    /* 2x2 breakpoint — tablet and mobile */
    @media (max-width: 1023px) {
      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 420px) {
      .kpi-card__value { font-size: 1.625rem; }
    }

    /* --- Chart row (chart + leaderboard, 70/30) --- */
    .chart-row {
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(0, 3fr);
      gap: var(--space-4);
      margin-top: var(--space-6);
      align-items: start;
    }
    .chart-row--solo {
      grid-template-columns: minmax(0, 1fr);
    }
    @media (max-width: 1023px) {
      .chart-row { grid-template-columns: minmax(0, 1fr); }
    }

    /* --- Commission Over Time chart --- */
    .chart-panel {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-5) var(--space-4);
    }
    .chart-panel__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .chart-panel__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
      margin: 0;
    }
    .chart-panel__meta {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--mid-gray);
    }
    .chart-panel__canvas-wrap {
      position: relative;
      width: 100%;
      height: 240px;
    }
    @media (max-width: 640px) {
      .chart-panel__canvas-wrap { height: 180px; }
    }

    /* --- Leaderboard card --- */
    .leaderboard {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }
    .leaderboard[hidden] { display: none; }
    .leaderboard__summary {
      list-style: none;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      cursor: default;
    }
    .leaderboard__summary::-webkit-details-marker { display: none; }
    .leaderboard__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
    }
    .leaderboard__meta {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--mid-gray);
    }
    .leaderboard__chevron {
      display: none;             /* visible only on mobile */
      width: 10px;
      height: 10px;
      border-right: 1.5px solid var(--mid-gray);
      border-bottom: 1.5px solid var(--mid-gray);
      transform: rotate(45deg);
      margin-left: var(--space-2);
      transition: transform 200ms var(--ease-out);
    }
    .leaderboard[open] .leaderboard__chevron {
      transform: rotate(-135deg);
    }
    .leaderboard__list {
      list-style: none;
      padding: 0;
      margin: var(--space-4) 0 0;
      display: flex;
      flex-direction: column;
    }
    .leaderboard__row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      column-gap: var(--space-3);
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid #F0F0EB;
    }
    .leaderboard__row:last-child { border-bottom: 0; }
    .leaderboard__rank {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--mid-gray);
      font-size: 0.875rem;
      text-align: center;
      line-height: 24px;
    }
    .leaderboard__row--top .leaderboard__rank {
      background: rgba(201, 162, 74, 0.15);
      color: #9C7A1F;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8125rem;
      line-height: 1;
      margin: 0 auto;
    }
    .leaderboard__info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .leaderboard__name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--near-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leaderboard__role {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--mid-gray);
      line-height: 1.35;
    }
    .leaderboard__stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
    }
    .leaderboard__amount {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
      line-height: 1.2;
    }
    .leaderboard__count {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--mid-gray);
      line-height: 1.35;
    }

    /* Mobile: make the summary look interactive and show chevron */
    @media (max-width: 767px) {
      .leaderboard__summary { cursor: pointer; }
      .leaderboard__chevron { display: inline-block; }
    }

    /* --- Filter bar --- */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-8);
    }
    .filter-pill-wrap {
      position: relative;
    }
    .filter-pill {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--mid-gray);
      cursor: pointer;
      line-height: 1.4;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
    }
    .filter-pill:hover {
      background: var(--warm-white-alt);
      color: var(--near-black);
    }
    .filter-pill:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }
    .filter-pill--active {
      background: var(--near-black);
      border-color: var(--near-black);
      color: #FFFFFF;
    }
    .filter-pill--active:hover {
      background: #000;
      color: #FFFFFF;
    }
    .filter-pill--active .filter-pill__label strong {
      font-weight: 600;
    }
    .filter-pill__caret {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid currentColor;
      margin-left: 2px;
      opacity: 0.7;
    }
    .filter-pill__clear {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.8;
      margin-right: -4px;
    }
    .filter-pill__clear:hover {
      opacity: 1;
      background: rgba(255,255,255,0.15);
    }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(26,26,46,0.08);
      min-width: 220px;
      padding: 4px;
      z-index: 100;
      max-height: 320px;
      overflow-y: auto;
    }
    .filter-dropdown[hidden] { display: none; }
    .filter-dropdown__option {
      appearance: none;
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--near-black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      line-height: 1.3;
    }
    .filter-dropdown__option:hover {
      background: var(--warm-white-alt);
    }
    .filter-dropdown__option--selected {
      color: var(--coral);
      font-weight: 600;
    }
    .filter-dropdown__option--all {
      border-bottom: 1px solid var(--border-color);
      border-radius: 0;
      margin-bottom: 4px;
    }
    .filter-dropdown__check {
      color: var(--coral);
      font-weight: 600;
      font-size: 0.875rem;
    }

    @media (max-width: 640px) {
      .filter-bar {
        flex-wrap: nowrap;
        overflow-x: auto;
        margin-left: calc(var(--container-padding) * -1);
        margin-right: calc(var(--container-padding) * -1);
        padding: 0 var(--container-padding);
        scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-pill { flex-shrink: 0; }
      .filter-dropdown { min-width: 200px; }
    }

    /* Responsive trims */
    @media (max-width: 640px) {
      :root { --dash-header-height: 56px; }
      .dash-brand__name { max-width: 140px; }
      .date-toggle__option { padding: 5px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="dash-page">

    <!-- ========== STICKY HEADER BAR ========== -->
    <header class="dash-header" role="banner">
      <div class="dash-header__inner">

        <!-- Left: Hotel property name + avatar (populated from HorizonData) -->
        <div class="dash-brand">
          <span class="dash-brand__avatar" data-property-initials aria-hidden="true"></span>
          <span class="dash-brand__name" data-property-name></span>
        </div>

        <!-- Right: date range toggle + settings -->
        <div class="dash-header__right">
          <div class="date-toggle" role="group" aria-label="Date range">
            <button type="button" class="date-toggle__option" data-range="7d"     aria-pressed="false">7d</button>
            <button type="button" class="date-toggle__option" data-range="30d"    aria-pressed="true">30d</button>
            <button type="button" class="date-toggle__option" data-range="90d"    aria-pressed="false">90d</button>
            <button type="button" class="date-toggle__option" data-range="custom" aria-pressed="false">Custom</button>
          </div>

          <button type="button" class="dash-icon-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>

      </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="dash-main" id="dash-main" role="main">

      <!-- KPI summary cards -->
      <section class="kpi-grid" aria-label="Commission summary">
        <article class="kpi-card" data-kpi="total-commission">
          <p class="kpi-card__label">Total Commission Earned</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <p class="kpi-card__trend" data-kpi-trend></p>
        </article>
        <article class="kpi-card" data-kpi="bookings-count">
          <p class="kpi-card__label">Bookings This Period</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <p class="kpi-card__trend" data-kpi-trend></p>
        </article>
        <article class="kpi-card" data-kpi="avg-commission">
          <p class="kpi-card__label">Avg. Commission per Booking</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <p class="kpi-card__trend" data-kpi-trend></p>
        </article>
        <article class="kpi-card" data-kpi="pending-payout">
          <p class="kpi-card__label">Pending Payout</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <p class="kpi-card__trend" data-kpi-trend></p>
        </article>
      </section>

      <!-- Chart + Leaderboard row (70/30 on desktop) -->
      <div class="chart-row" data-chart-row>

        <!-- Commission Over Time chart -->
        <section class="chart-panel" aria-label="Commission over time">
          <header class="chart-panel__header">
            <h2 class="chart-panel__title">Commission Over Time</h2>
            <span class="chart-panel__meta">Hover a bar for details</span>
          </header>
          <div class="chart-panel__canvas-wrap">
            <canvas id="commission-chart" aria-label="Commission earned per day" role="img"></canvas>
          </div>
        </section>

        <!-- Top Staff leaderboard (collapses to accordion on mobile) -->
        <details class="leaderboard" data-leaderboard open>
          <summary class="leaderboard__summary">
            <span>
              <span class="leaderboard__title">Top Staff</span>
              <span class="leaderboard__meta" data-leaderboard-meta>Last 30 days</span>
            </span>
            <span class="leaderboard__chevron" aria-hidden="true"></span>
          </summary>
          <ol class="leaderboard__list" data-leaderboard-list></ol>
        </details>

      </div>

      <!-- Filter bar (sits above the transaction table, to be added next) -->
      <section class="filter-bar" data-filter-bar aria-label="Filter bookings">
        <div class="filter-pill-wrap" data-filter-wrap data-filter="staffId">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
        <div class="filter-pill-wrap" data-filter-wrap data-filter="tourId">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
        <div class="filter-pill-wrap" data-filter-wrap data-filter="status">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
      </section>

    </main>

  </div>

  <!-- Mock data layer (single source of truth for every component) -->
  <script src="/dashboard/data.js"></script>

  <script>
    // Hydrate the header from the mock data layer.
    (function () {
      const data = window.HorizonData;
      if (!data) return;
      const nameEl = document.querySelector('[data-property-name]');
      const initEl = document.querySelector('[data-property-initials]');
      if (nameEl) nameEl.textContent = data.property.name;
      if (initEl) initEl.textContent = data.property.initials;
    })();

    // Date range toggle — updates aria-pressed and broadcasts
    // a 'dash:range-change' event that every downstream widget
    // (KPIs, chart, table) can subscribe to.
    (function () {
      const toggle = document.querySelector('.date-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', function (e) {
        const btn = e.target.closest('.date-toggle__option');
        if (!btn) return;
        toggle.querySelectorAll('.date-toggle__option').forEach(b => {
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
        });
        window.dispatchEvent(new CustomEvent('dash:range-change', {
          detail: { range: btn.dataset.range }
        }));
      });
    })();
  </script>
