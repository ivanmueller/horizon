<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Commission Dashboard — Horizon Tours</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts (Horizon brand) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Horizon brand tokens -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">

  <style>
    /* ============================================================
       Dashboard — Page shell & layout grid (Step 1)
       ============================================================ */

    :root {
      --dash-header-height: 56px;

      /* Semantic accents — extend the Horizon brand palette with a
         small, fixed set of status colors used only inside the
         dashboard (trend arrows, status pills, leaderboard top-rank,
         informational links). Tints are derived from the same hue so
         the backgrounds always feel native to the --warm-white canvas. */
      --positive:       #1D9E75;
      --positive-tint:  rgba(29, 158, 117, 0.12);
      --pending:        #BA7517;
      --pending-tint:   rgba(186, 117, 23, 0.14);
      --info:           #185FA5;
      --info-tint:      rgba(24, 95, 165, 0.08);
      --info-border:    rgba(24, 95, 165, 0.18);
      /* Negative delta only — reserved for down-trends.
         Coral is the revenue accent and must never signal "down". */
      --negative:       #C4443B;
    }

    /* ============================================================
       Benchmark ribbon — sits above the KPI grid. Low-saturation
       blue background keeps it informational, never promotional.
       ============================================================ */
    .benchmark-ribbon {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 10px var(--space-5);
      background: var(--info-tint);
      border: 1px solid var(--info-border);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-5);
    }
    .benchmark-ribbon__icon {
      width: 18px;
      height: 18px;
      color: var(--info);
      flex-shrink: 0;
    }
    .benchmark-ribbon__text {
      margin: 0;
      font-family: var(--font-body);
      font-size: 0.875rem;
      line-height: 1.4;
      color: var(--near-black);
      min-width: 0;
    }
    .benchmark-ribbon__text strong {
      color: var(--info);
      font-weight: 600;
    }
    @media (max-width: 640px) {
      .benchmark-ribbon {
        padding: 10px var(--space-4);
        gap: var(--space-2);
      }
      .benchmark-ribbon__text { font-size: 0.8125rem; }
    }

    html, body {
      background: var(--warm-white);
      color: var(--near-black);
      font-family: var(--font-body);
    }

    /* --- Outer page wrapper --- */
    .dash-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Sticky header bar --- */
    .dash-header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--dash-header-height);
      background: #FFFFFF;
      border-bottom: 1px solid var(--border-color);
    }
    .dash-header__inner {
      max-width: var(--container-max);
      height: 100%;
      margin: 0 auto;
      padding: 0 var(--container-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    /* Left: property identity */
    .dash-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }
    .dash-brand__avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      background: var(--near-black);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .dash-brand__name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--near-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Right cluster: date toggle + settings */
    .dash-header__right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    /* Date range pill toggle */
    .date-toggle {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      background: var(--warm-white-alt);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
    }
    .date-toggle__option {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 5px 12px;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--mid-gray);
      border-radius: var(--radius-full);
      cursor: pointer;
      line-height: 1;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    .date-toggle__option:hover {
      color: var(--near-black);
    }
    .date-toggle__option[aria-pressed="true"] {
      background: #FFFFFF;
      color: var(--near-black);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(26, 26, 46, 0.06);
    }
    .date-toggle__option:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }

    /* Settings gear */
    .dash-icon-btn {
      appearance: none;
      border: 0;
      background: transparent;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--mid-gray);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    .dash-icon-btn:hover {
      background: var(--warm-white-alt);
      color: var(--near-black);
    }
    .dash-icon-btn:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }
    .dash-icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* --- Main content container --- */
    .dash-main {
      flex: 1;
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--space-8) var(--container-padding) var(--space-16);
    }
    @media (max-width: 767px) {
      .dash-main { padding-top: var(--space-6); padding-bottom: var(--space-12); }
    }

    /* --- KPI summary cards row --- */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .kpi-card {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      min-width: 0;
    }
    /* Label → Value → Footer(delta + sparkline). Label sits
       above the number so the eye hits the label first, then
       the hero value, then peripheral context. */
    .kpi-card__label {
      font-family: var(--font-body);
      font-size: 0.8125rem;       /* 13px */
      font-weight: 500;
      color: var(--mid-gray);
      line-height: 1.4;
    }
    .kpi-card__value {
      font-family: var(--font-display);
      font-size: 1.5rem;          /* 24px — hero number */
      font-weight: 700;
      color: var(--near-black);
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-top: 2px;
    }
    /* Coral is reserved EXCLUSIVELY for the commission value so
       the eye instinctively tracks revenue. No other KPI value
       — and no delta — may be coral. */
    .kpi-card--commission .kpi-card__value { color: var(--coral); }

    .kpi-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: var(--space-2);
      min-height: 20px;
    }
    .kpi-card__trend {
      font-family: var(--font-body);
      font-size: 0.75rem;         /* 12px — tiny delta */
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    /* Deltas use green/red, NEVER coral. Coral == revenue only. */
    .kpi-card__trend--up      { color: var(--positive); }
    .kpi-card__trend--down    { color: var(--negative); }
    .kpi-card__trend--flat    { color: var(--mid-gray); }
    .kpi-card__trend--neutral { color: var(--mid-gray); }

    .kpi-card__sparkline {
      flex: 0 0 auto;
      width: 80px;
      height: 20px;
      display: block;
    }
    .kpi-card__sparkline svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .kpi-card__link {
      appearance: none;
      align-self: flex-start;
      background: transparent;
      border: 0;
      padding: 0;
      margin-top: var(--space-1);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--info);
      cursor: pointer;
      line-height: 1.4;
    }
    .kpi-card__link:hover { color: var(--near-black); text-decoration: underline; }
    .kpi-card__link:focus-visible {
      outline: 2px solid var(--info);
      outline-offset: 2px;
      border-radius: 2px;
    }
    .kpi-card__link::after {
      content: '\00A0→';
      letter-spacing: 0.02em;
    }

    /* 2x2 breakpoint — tablet and mobile */
    @media (max-width: 1023px) {
      .kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 420px) {
      .kpi-card__value { font-size: 1.375rem; }
      .kpi-card__sparkline { width: 60px; }
    }

    /* --- Chart row (chart + leaderboard, 70/30) --- */
    .chart-row {
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(0, 3fr);
      gap: var(--space-4);
      margin-top: var(--space-6);
      align-items: start;
    }
    .chart-row--solo {
      grid-template-columns: minmax(0, 1fr);
    }
    @media (max-width: 1023px) {
      .chart-row { grid-template-columns: minmax(0, 1fr); }
    }

    /* --- Commission Over Time chart --- */
    .chart-panel {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-5) var(--space-4);
    }
    .chart-panel__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .chart-panel__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
      margin: 0;
    }
    .chart-panel__meta {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--mid-gray);
    }
    .chart-panel__canvas-wrap {
      position: relative;
      width: 100%;
      height: 240px;
    }
    @media (max-width: 640px) {
      .chart-panel__canvas-wrap { height: 180px; }
    }

    /* --- Leaderboard card --- */
    .leaderboard {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
    }
    .leaderboard[hidden] { display: none; }
    .leaderboard__summary {
      list-style: none;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--space-3);
      cursor: default;
    }
    .leaderboard__summary::-webkit-details-marker { display: none; }
    .leaderboard__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
    }
    .leaderboard__meta {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--mid-gray);
    }
    .leaderboard__chevron {
      display: none;             /* visible only on mobile */
      width: 10px;
      height: 10px;
      border-right: 1.5px solid var(--mid-gray);
      border-bottom: 1.5px solid var(--mid-gray);
      transform: rotate(45deg);
      margin-left: var(--space-2);
      transition: transform 200ms var(--ease-out);
    }
    .leaderboard[open] .leaderboard__chevron {
      transform: rotate(-135deg);
    }
    .leaderboard__list {
      list-style: none;
      padding: 0;
      margin: var(--space-4) 0 0;
      display: flex;
      flex-direction: column;
    }
    .leaderboard__row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      column-gap: var(--space-3);
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid #F0F0EB;
    }
    .leaderboard__row:last-child { border-bottom: 0; }
    .leaderboard__rank {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--mid-gray);
      font-size: 0.875rem;
      text-align: center;
      line-height: 24px;
    }
    .leaderboard__row--top .leaderboard__rank {
      background: var(--pending-tint);
      color: var(--pending);
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8125rem;
      line-height: 1;
      margin: 0 auto;
    }
    .leaderboard__info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .leaderboard__name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--near-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leaderboard__role {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--mid-gray);
      line-height: 1.35;
    }
    .leaderboard__stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
    }
    .leaderboard__amount {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--near-black);
      line-height: 1.2;
    }
    .leaderboard__count {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--mid-gray);
      line-height: 1.35;
    }

    /* Mobile: make the summary look interactive and show chevron */
    @media (max-width: 767px) {
      .leaderboard__summary { cursor: pointer; }
      .leaderboard__chevron { display: inline-block; }
    }

    /* --- Filter bar --- */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-8);
    }
    .filter-pill-wrap {
      position: relative;
    }
    .filter-pill {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--mid-gray);
      cursor: pointer;
      line-height: 1.4;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
    }
    .filter-pill:hover {
      background: var(--warm-white-alt);
      color: var(--near-black);
    }
    .filter-pill:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }
    .filter-pill--active {
      background: var(--near-black);
      border-color: var(--near-black);
      color: #FFFFFF;
    }
    .filter-pill--active:hover {
      background: #000;
      color: #FFFFFF;
    }
    .filter-pill--active .filter-pill__label strong {
      font-weight: 600;
    }
    .filter-pill__caret {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid currentColor;
      margin-left: 2px;
      opacity: 0.7;
    }
    .filter-pill__clear {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      opacity: 0.85;
      margin-right: -6px;
      transition: background-color var(--duration-fast) var(--ease-out),
                  opacity var(--duration-fast) var(--ease-out);
    }
    .filter-pill__clear:hover {
      opacity: 1;
      background: rgba(255,255,255,0.18);
    }
    .filter-pill__clear:focus-visible {
      outline: 2px solid #FFFFFF;
      outline-offset: 1px;
    }

    .filter-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(26,26,46,0.08);
      min-width: 220px;
      padding: 4px;
      z-index: 100;
      max-height: 320px;
      overflow-y: auto;
    }
    .filter-dropdown[hidden] { display: none; }
    .filter-dropdown__option {
      appearance: none;
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--near-black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      line-height: 1.3;
    }
    .filter-dropdown__option:hover {
      background: var(--warm-white-alt);
    }
    .filter-dropdown__option--selected {
      color: var(--coral);
      font-weight: 600;
    }
    .filter-dropdown__option--all {
      border-bottom: 1px solid var(--border-color);
      border-radius: 0;
      margin-bottom: 4px;
    }
    .filter-dropdown__check {
      color: var(--coral);
      font-weight: 600;
      font-size: 0.875rem;
    }

    @media (max-width: 640px) {
      .filter-bar {
        flex-wrap: nowrap;
        overflow-x: auto;
        margin-left: calc(var(--container-padding) * -1);
        margin-right: calc(var(--container-padding) * -1);
        padding: 0 var(--container-padding);
        scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar { display: none; }
      .filter-pill { flex-shrink: 0; }
      .filter-dropdown { min-width: 200px; }
    }

    /* --- Transaction table --- */
    .txn-section {
      margin-top: var(--space-5);
    }
    .txn-card {
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
    }
    .txn-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--near-black);
    }
    .txn-table__th,
    .txn-table__cell {
      padding: 0 var(--space-4);
      text-align: left;
      vertical-align: middle;
      min-width: 0;
    }
    .txn-table__th {
      position: sticky;
      top: var(--dash-header-height);
      z-index: 5;
      height: 44px;
      background: #FFFFFF;
      border-bottom: 1px solid var(--border-color);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--mid-gray);
    }
    .txn-table__th:first-child { border-top-left-radius: var(--radius-lg); }
    .txn-table__th:last-child  { border-top-right-radius: var(--radius-lg); }

    .txn-table__row {
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out);
    }
    .txn-table__row:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: -2px;
    }
    .txn-table__cell {
      height: 52px;
      border-bottom: 1px solid #F0F0EB;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .txn-table__row:last-child .txn-table__cell { border-bottom: 0; }
    .txn-table__row:hover {
      background: var(--warm-white-alt);
    }

    /* Column widths (desktop) */
    .txn-col-date       { width: 100px; }
    .txn-col-guest      { width: 160px; }
    .txn-col-tour       { width: auto; }
    .txn-col-referrer   { width: 140px; }
    .txn-col-value      { width: 110px; }
    .txn-col-commission { width: 110px; }
    .txn-col-status     { width: 120px; }

    /* Cell content styling */
    .txn-col-guest .txn-table__cell,
    td.txn-col-guest {
      font-weight: 500;
    }
    td.txn-col-value,
    td.txn-col-commission {
      font-family: var(--font-display);
      font-weight: 600;
    }
    td.txn-col-commission {
      color: var(--coral);
    }

    /* Status pills */
    .txn-status {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .txn-status--confirmed {
      background: var(--positive-tint);
      color: var(--positive);
    }
    .txn-status--pending {
      background: var(--pending-tint);
      color: var(--pending);
    }
    .txn-status--paid-out {
      background: var(--warm-white-alt);
      color: var(--mid-gray);
    }

    /* Empty state */
    .txn-empty {
      padding: var(--space-8) var(--space-5);
      text-align: center;
      color: var(--mid-gray);
      font-size: 0.875rem;
    }

    /* Footer + Load more */
    .txn-footer {
      display: flex;
      justify-content: center;
      margin-top: var(--space-5);
    }
    .txn-load-more {
      appearance: none;
      border: 1px solid var(--border-color);
      background: #FFFFFF;
      color: var(--near-black);
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
    }
    .txn-load-more:hover {
      background: var(--warm-white-alt);
      border-color: var(--light-gray);
    }
    .txn-load-more:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }
    .txn-load-more[hidden] { display: none; }

    /* Tablet: hide Booking Value */
    @media (max-width: 1023px) {
      .txn-table__th.txn-col-value,
      .txn-table__cell.txn-col-value {
        display: none;
      }
    }

    /* Mobile: convert table to stacked cards */
    @media (max-width: 767px) {
      .txn-card {
        background: transparent;
        border: 0;
      }
      .txn-table,
      .txn-table thead,
      .txn-table tbody,
      .txn-table tr,
      .txn-table td {
        display: block;
        width: 100%;
      }
      .txn-table thead { display: none; }
      .txn-table__row {
        background: #FFFFFF;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        margin-bottom: var(--space-3);
        transition: background-color var(--duration-fast) var(--ease-out),
                    border-color var(--duration-fast) var(--ease-out);
      }
      .txn-table__row:last-child { margin-bottom: 0; }
      .txn-table__row:hover {
        background: #FFFFFF;
        border-color: var(--light-gray);
      }
      .txn-table__row:focus-visible {
        outline: 2px solid var(--coral);
        outline-offset: 2px;
      }
      .txn-table__cell {
        height: auto;
        padding: 5px 0;
        border-bottom: 0;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        font-size: 0.875rem;
      }
      .txn-table__cell::before {
        content: attr(data-label);
        color: var(--mid-gray);
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        flex-shrink: 0;
      }
      /* Guest name: big, no label, top of card */
      td.txn-col-guest {
        padding-top: 2px;
        padding-bottom: var(--space-3);
        margin-bottom: var(--space-2);
        border-bottom: 1px solid #F0F0EB;
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 600;
      }
      td.txn-col-guest::before { display: none; }
      td.txn-col-commission { color: var(--coral); }
      td.txn-col-status { justify-content: space-between; }
    }

    /* --- Booking Detail Lightbox --- */
    .booking-modal {
      /* Explicit centering — keeps the modal vertically + horizontally
         centered whether the UA uses margin:auto + inset:0 (showModal)
         or a non-modal <dialog> fallback. */
      margin: auto;
      padding: 0;
      border: 0;
      background: #FFFFFF;
      color: var(--near-black);
      border-radius: var(--radius-lg);
      max-width: 480px;
      width: calc(100% - 32px);
      max-height: calc(100vh - 32px);
      box-shadow: 0 20px 60px rgba(26, 26, 46, 0.18),
                  0 4px 16px rgba(26, 26, 46, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .booking-modal::backdrop {
      background: rgba(0, 0, 0, 0.4);
    }
    .booking-modal[open] {
      animation: booking-modal-in 180ms var(--ease-out);
    }
    @keyframes booking-modal-in {
      from { opacity: 0; transform: translateY(4px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .booking-modal__close {
      appearance: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--mid-gray);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
    }
    .booking-modal__close:hover {
      background: var(--warm-white-alt);
      color: var(--near-black);
    }
    .booking-modal__close:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: 2px;
    }

    .booking-modal__body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: var(--space-8) var(--space-6) var(--space-6);
    }
    .booking-modal__section {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin: 0;
    }
    .booking-modal__row {
      display: grid;
      grid-template-columns: minmax(110px, 40%) minmax(0, 1fr);
      column-gap: var(--space-4);
      align-items: baseline;
    }
    .booking-modal__row dt {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--mid-gray);
    }
    .booking-modal__row dd {
      margin: 0;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--near-black);
      line-height: 1.4;
      word-break: break-word;
    }
    .booking-modal__row--commission dt,
    .booking-modal__row--commission dd {
      color: var(--coral);
      font-weight: 600;
    }
    .booking-modal__row--commission dd {
      font-family: var(--font-display);
    }
    .booking-modal__divider {
      border: 0;
      border-top: 1px solid var(--border-color);
      margin: var(--space-5) 0;
    }

    /* --- Payout History Lightbox --- */
    .payout-modal {
      margin: auto;
      padding: 0;
      border: 0;
      background: #FFFFFF;
      color: var(--near-black);
      border-radius: var(--radius-lg);
      max-width: 560px;
      width: calc(100% - 32px);
      max-height: calc(100vh - 32px);
      box-shadow: 0 20px 60px rgba(26, 26, 46, 0.18),
                  0 4px 16px rgba(26, 26, 46, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .payout-modal::backdrop {
      background: rgba(0, 0, 0, 0.4);
    }
    .payout-modal[open] {
      animation: booking-modal-in 180ms var(--ease-out);
    }

    .payout-modal__header {
      padding: var(--space-5) 52px var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-color);
      flex: 0 0 auto;
    }
    .payout-modal__title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      color: var(--near-black);
      margin: 0;
      line-height: 1.2;
    }
    .payout-modal__subtitle {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--mid-gray);
      margin-top: 2px;
      line-height: 1.35;
    }
    .payout-modal__body {
      flex: 1 1 auto;
      overflow-y: auto;
    }
    .payout-modal__empty {
      padding: var(--space-8) var(--space-6);
      text-align: center;
      color: var(--mid-gray);
      font-size: 0.875rem;
    }

    .payout-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-body);
      font-size: 0.875rem;
    }
    .payout-table thead th {
      position: sticky;
      top: 0;
      background: #FFFFFF;
      text-align: left;
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mid-gray);
      padding: 10px var(--space-6);
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }
    .payout-table thead th:last-child { width: 24px; padding-left: 0; padding-right: var(--space-4); }

    .payout-table__summary-row {
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      transition: background-color var(--duration-fast) var(--ease-out);
    }
    .payout-table__summary-row:hover { background: var(--warm-white-alt); }
    .payout-table__summary-row:focus-visible {
      outline: 2px solid var(--coral);
      outline-offset: -2px;
    }
    .payout-table__summary-row td {
      padding: 14px var(--space-6);
      color: var(--near-black);
      vertical-align: middle;
    }
    .payout-table__summary-row td:last-child {
      padding-left: 0;
      padding-right: var(--space-4);
      text-align: right;
      width: 24px;
    }
    .payout-table__amount {
      font-family: var(--font-display);
      font-weight: 600;
    }
    .payout-table__method {
      color: var(--mid-gray);
      font-size: 0.8125rem;
    }
    .payout-table__chevron {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--mid-gray);
      border-bottom: 1.5px solid var(--mid-gray);
      transform: rotate(45deg);
      transition: transform 150ms var(--ease-out);
      vertical-align: middle;
    }
    .payout-table__summary-row[aria-expanded="true"] .payout-table__chevron {
      transform: rotate(-135deg);
    }
    .payout-table__summary-row[aria-expanded="true"] {
      background: var(--warm-white-alt);
      border-bottom-color: transparent;
    }

    .payout-table__detail-row { background: var(--warm-white); }
    .payout-table__detail-row[hidden] { display: none; }
    .payout-table__detail-row > td {
      padding: 0;
      border-bottom: 1px solid var(--border-color);
    }
    .payout-detail {
      padding: var(--space-2) var(--space-6) var(--space-4);
    }
    .payout-detail__list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .payout-detail__item {
      display: grid;
      grid-template-columns: 74px minmax(0, 1.2fr) minmax(0, 1.5fr) auto;
      column-gap: var(--space-3);
      padding: 10px 0;
      align-items: baseline;
      border-bottom: 1px solid #F0F0EB;
    }
    .payout-detail__item:last-child { border-bottom: 0; }
    .payout-detail__date {
      color: var(--mid-gray);
      font-size: 0.8125rem;
    }
    .payout-detail__guest {
      color: var(--near-black);
      font-weight: 500;
      font-size: 0.875rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .payout-detail__tour {
      color: var(--mid-gray);
      font-size: 0.8125rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .payout-detail__amount {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--near-black);
      text-align: right;
      font-size: 0.875rem;
    }

    /* Responsive trims */
    @media (max-width: 640px) {
      :root { --dash-header-height: 56px; }
      .dash-brand__name { max-width: 140px; }
      .date-toggle__option { padding: 5px 10px; font-size: 0.75rem; }
      .booking-modal__body { padding: var(--space-6) var(--space-5) var(--space-5); }
      .booking-modal__row { grid-template-columns: 1fr; row-gap: 2px; }

      .payout-modal__header { padding-left: var(--space-4); padding-right: 48px; }
      .payout-table thead th,
      .payout-table__summary-row td { padding-left: var(--space-4); padding-right: var(--space-4); }
      .payout-table__col-period,
      .payout-table__col-method { display: none; }
      .payout-detail { padding: var(--space-2) var(--space-4) var(--space-4); }
      .payout-detail__item { grid-template-columns: 1fr auto; column-gap: var(--space-2); }
      .payout-detail__date,
      .payout-detail__tour { display: none; }
    }
  </style>
</head>
<body>

  <div class="dash-page">

    <!-- ========== STICKY HEADER BAR ========== -->
    <header class="dash-header" role="banner">
      <div class="dash-header__inner">

        <!-- Left: Hotel property name + avatar (populated from HorizonData) -->
        <div class="dash-brand">
          <span class="dash-brand__avatar" data-property-initials aria-hidden="true"></span>
          <span class="dash-brand__name" data-property-name></span>
        </div>

        <!-- Right: date range toggle + settings -->
        <div class="dash-header__right">
          <div class="date-toggle" role="group" aria-label="Date range">
            <button type="button" class="date-toggle__option" data-range="7d"     aria-pressed="false">7d</button>
            <button type="button" class="date-toggle__option" data-range="30d"    aria-pressed="true">30d</button>
            <button type="button" class="date-toggle__option" data-range="90d"    aria-pressed="false">90d</button>
            <button type="button" class="date-toggle__option" data-range="custom" aria-pressed="false">Custom</button>
          </div>

          <button type="button" class="dash-icon-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>

      </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="dash-main" id="dash-main" role="main">

      <!-- Benchmark ribbon — the psychological hook: every visit
           frames performance in competitive terms against the
           regional cohort. Populated from HorizonData.benchmark. -->
      <aside class="benchmark-ribbon" role="complementary" aria-label="Benchmark vs. regional partners">
        <svg class="benchmark-ribbon__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 3v18h18"/>
          <polyline points="7 14 11 10 14 13 20 7"/>
        </svg>
        <p class="benchmark-ribbon__text" data-benchmark-text>—</p>
      </aside>

      <!-- KPI summary cards — exactly four. A fifth card would
           dilute the hierarchy and GMs stop registering which
           number matters most. Coral appears only on the
           commission value; deltas are green/red, never coral. -->
      <section class="kpi-grid" aria-label="Commission summary">
        <article class="kpi-card kpi-card--commission" data-kpi="total-commission">
          <p class="kpi-card__label">Commission Earned</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend" data-kpi-trend></span>
            <span class="kpi-card__sparkline" data-kpi-sparkline aria-hidden="true"></span>
          </div>
        </article>
        <article class="kpi-card" data-kpi="scan-book-rate">
          <p class="kpi-card__label">Scan → Book Rate</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend" data-kpi-trend></span>
            <span class="kpi-card__sparkline" data-kpi-sparkline aria-hidden="true"></span>
          </div>
        </article>
        <article class="kpi-card" data-kpi="avg-commission">
          <p class="kpi-card__label">Avg. per Booking</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend" data-kpi-trend></span>
            <span class="kpi-card__sparkline" data-kpi-sparkline aria-hidden="true"></span>
          </div>
        </article>
        <article class="kpi-card" data-kpi="next-payout">
          <p class="kpi-card__label">Next Payout</p>
          <p class="kpi-card__value" data-kpi-value>—</p>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend" data-kpi-trend></span>
          </div>
          <button type="button" class="kpi-card__link" data-open-payout-history>View payout history</button>
        </article>
      </section>

      <!-- Chart + Leaderboard row (70/30 on desktop) -->
      <div class="chart-row" data-chart-row>

        <!-- Commission Over Time chart -->
        <section class="chart-panel" aria-label="Commission over time">
          <header class="chart-panel__header">
            <h2 class="chart-panel__title">Commission Over Time</h2>
            <span class="chart-panel__meta">Hover a bar for details</span>
          </header>
          <div class="chart-panel__canvas-wrap">
            <canvas id="commission-chart" aria-label="Commission earned per day" role="img"></canvas>
          </div>
        </section>

        <!-- Top Staff leaderboard (collapses to accordion on mobile) -->
        <details class="leaderboard" data-leaderboard open>
          <summary class="leaderboard__summary">
            <span>
              <span class="leaderboard__title">Top Staff</span>
              <span class="leaderboard__meta" data-leaderboard-meta>Last 30 days</span>
            </span>
            <span class="leaderboard__chevron" aria-hidden="true"></span>
          </summary>
          <ol class="leaderboard__list" data-leaderboard-list></ol>
        </details>

      </div>

      <!-- Filter bar (sits above the transaction table, to be added next) -->
      <section class="filter-bar" data-filter-bar aria-label="Filter bookings">
        <div class="filter-pill-wrap" data-filter-wrap data-filter="staffId">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
        <div class="filter-pill-wrap" data-filter-wrap data-filter="tourId">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
        <div class="filter-pill-wrap" data-filter-wrap data-filter="status">
          <button type="button" class="filter-pill" data-filter-toggle
                  aria-haspopup="menu" aria-expanded="false"></button>
          <div class="filter-dropdown" role="menu" hidden data-filter-dropdown></div>
        </div>
      </section>

      <!-- Transaction table -->
      <section class="txn-section" aria-label="Bookings">
        <div class="txn-card">
          <table class="txn-table" data-txn-table>
            <thead>
              <tr>
                <th class="txn-table__th txn-col-date"       scope="col">Date</th>
                <th class="txn-table__th txn-col-guest"      scope="col">Guest Name</th>
                <th class="txn-table__th txn-col-tour"       scope="col">Tour</th>
                <th class="txn-table__th txn-col-referrer"   scope="col">Referred By</th>
                <th class="txn-table__th txn-col-value"      scope="col">Booking Value</th>
                <th class="txn-table__th txn-col-commission" scope="col">Commission</th>
                <th class="txn-table__th txn-col-status"     scope="col">Status</th>
              </tr>
            </thead>
            <tbody data-txn-body></tbody>
          </table>
          <p class="txn-empty" data-txn-empty hidden>No bookings match your filters.</p>
        </div>
        <div class="txn-footer">
          <button type="button" class="txn-load-more" data-txn-loadmore hidden>
            <span data-txn-loadmore-label>Load more</span>
          </button>
        </div>
      </section>

    </main>

  </div>

  <!-- Booking Detail lightbox (populated on row click) -->
  <dialog class="booking-modal" data-booking-modal aria-label="Booking details">
    <button type="button" class="booking-modal__close" data-booking-modal-close aria-label="Close">&times;</button>
    <div class="booking-modal__body" data-booking-modal-body></div>
  </dialog>

  <!-- Payout History lightbox -->
  <dialog class="payout-modal" data-payout-modal aria-labelledby="payout-modal-title">
    <header class="payout-modal__header">
      <h2 class="payout-modal__title" id="payout-modal-title">Payout History</h2>
      <p class="payout-modal__subtitle" data-payout-modal-subtitle></p>
      <button type="button" class="booking-modal__close" data-payout-modal-close aria-label="Close">&times;</button>
    </header>
    <div class="payout-modal__body" data-payout-modal-body></div>
  </dialog>

  <!-- Mock data layer (single source of truth for every component) -->
  <script src="/dashboard/data.js"></script>

  <script>
    // Hydrate the header from the mock data layer.
    (function () {
      const data = window.HorizonData;
      if (!data) return;
      const nameEl = document.querySelector('[data-property-name]');
      const initEl = document.querySelector('[data-property-initials]');
      if (nameEl) nameEl.textContent = data.property.name;
      if (initEl) initEl.textContent = data.property.initials;
    })();

    // Date range toggle — updates aria-pressed and broadcasts
    // a 'dash:range-change' event that every downstream widget
    // (KPIs, chart, table) can subscribe to.
    (function () {
      const toggle = document.querySelector('.date-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', function (e) {
        const btn = e.target.closest('.date-toggle__option');
        if (!btn) return;
        toggle.querySelectorAll('.date-toggle__option').forEach(b => {
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
        });
        window.dispatchEvent(new CustomEvent('dash:range-change', {
          detail: { range: btn.dataset.range }
        }));
      });
    })();
  </script>

  <!-- Filter bar (must load before widgets so they can read filter state) -->
  <script src="/dashboard/filters.js"></script>

  <!-- KPI summary cards -->
  <script src="/dashboard/kpis.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="/dashboard/chart.js" defer></script>

  <!-- Top Staff leaderboard -->
  <script src="/dashboard/leaderboard.js"></script>

  <!-- Transaction table -->
  <script src="/dashboard/table.js"></script>

  <!-- Booking Detail lightbox -->
  <script src="/dashboard/modal.js"></script>

  <!-- Payout History lightbox -->
  <script src="/dashboard/payouts.js"></script>

</body>
