<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner dashboard — Horizon Tours</title>
  <meta name="description" content="Hotel partner dashboard — bookings and revenue for the current period.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://gowithhorizon.com/dashboard/hotel/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">
  <style>
    body { background: var(--warm-white); }

    /* ── Header (minimal — no nav, no big marketing) ───────────────── */
    .hd-header {
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      padding: var(--space-4) 0;
    }
    .hd-header__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 var(--space-4);
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-4); flex-wrap: wrap;
    }
    .hd-header__logo {
      display: inline-flex; align-items: center; gap: var(--space-2);
      text-decoration: none; color: var(--near-black);
    }
    .hd-header__logo-icon { width: 32px; height: 32px; }
    .hd-header__logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.3rem; font-weight: 700; color: var(--coral);
    }
    .hd-header__sub { font-size: var(--text-sm); color: var(--mid-gray); margin-left: 6px; }
    .hd-header__hotel {
      text-align: right; line-height: 1.3;
    }
    .hd-header__hotel-eyebrow {
      display: block; font-size: var(--text-xs);
      color: var(--mid-gray); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .hd-header__hotel-name {
      display: block; font-family: var(--font-display);
      font-size: var(--text-lg); font-weight: 600; color: var(--near-black);
    }

    /* ── Page layout ────────────────────────────────────────────────── */
    .hd-page {
      max-width: 1200px; margin: 0 auto;
      padding: var(--space-6) var(--space-4) var(--space-12);
    }

    .hd-controls {
      display: flex; flex-wrap: wrap; gap: var(--space-3);
      align-items: center; justify-content: space-between;
      margin-bottom: var(--space-5);
    }
    .hd-range {
      display: inline-flex;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      padding: 4px;
      gap: 2px;
    }
    .hd-range__btn {
      background: none; border: 0;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font: inherit; font-size: var(--text-sm); font-weight: 500;
      color: var(--mid-gray);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }
    .hd-range__btn:hover { color: var(--near-black); }
    .hd-range__btn--active {
      background: var(--coral); color: #fff;
    }
    .hd-range__btn--active:hover { color: #fff; }

    .hd-refresh {
      background: none; border: 1px solid var(--border-color);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font: inherit; font-size: var(--text-sm); color: var(--mid-gray);
      cursor: pointer;
    }
    .hd-refresh:hover { background: var(--warm-white-alt); color: var(--near-black); }

    /* ── KPI tiles ──────────────────────────────────────────────────── */
    .hd-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .hd-kpi {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
    }
    .hd-kpi__label {
      display: block;
      font-size: var(--text-xs);
      color: var(--mid-gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .hd-kpi__value {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--near-black);
      line-height: 1.1;
    }
    .hd-kpi__sub {
      display: block;
      font-size: var(--text-xs);
      color: var(--mid-gray);
      margin-top: 4px;
    }

    /* ── Bookings table ─────────────────────────────────────────────── */
    .hd-table-wrap {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .hd-table-wrap h2 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--near-black);
      margin: 0;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--border-color);
    }
    .hd-table-scroll { overflow-x: auto; }
    .hd-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }
    .hd-table th, .hd-table td {
      padding: var(--space-3) var(--space-5);
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }
    .hd-table tbody tr:last-child td { border-bottom: 0; }
    .hd-table th {
      font-weight: 600;
      color: var(--mid-gray);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--warm-white-alt);
    }
    .hd-table td { color: var(--near-black); }
    .hd-table td.hd-num { text-align: right; font-variant-numeric: tabular-nums; }
    .hd-table th.hd-num { text-align: right; }
    .hd-table tbody tr:hover td { background: rgba(255, 107, 74, 0.03); }
    .hd-table__code {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 0.78rem;
      color: var(--mid-gray);
    }

    .hd-empty {
      padding: var(--space-8) var(--space-5);
      text-align: center;
      color: var(--mid-gray);
      font-size: var(--text-sm);
    }
    .hd-empty strong { display: block; color: var(--near-black); margin-bottom: 4px; font-size: var(--text-base); }

    .hd-error {
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      color: #991B1B;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
    }

    .hd-skeleton .hd-kpi__value,
    .hd-skeleton .hd-kpi__sub { color: transparent; background: var(--warm-white-alt); border-radius: 4px; }

    /* ── Mobile ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .hd-header__hotel { text-align: left; flex-basis: 100%; }
      .hd-controls { flex-direction: column; align-items: stretch; }
      .hd-range { justify-content: center; }
      .hd-kpi__value { font-size: var(--text-2xl); }
    }
  </style>
</head>
<body>

  <!-- Minimal header — no full nav. Audience is the hotel concierge / GM,
       not a tour shopper. Logo + cobranded hotel name + that's it. -->
  <header class="hd-header">
    <div class="hd-header__inner">
      <a href="/" class="hd-header__logo">
        <span class="hd-header__logo-icon">
          <svg width="32" height="32" viewBox="0 0 36 36" aria-hidden="true">
            <rect width="36" height="36" rx="8" fill="#FF6B4A"/>
            <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
          </svg>
        </span>
        <span class="hd-header__logo-text">horizon</span>
        <span class="hd-header__sub">partner dashboard</span>
      </a>
      <div class="hd-header__hotel">
        <span class="hd-header__hotel-eyebrow">Viewing</span>
        <span class="hd-header__hotel-name" id="hdHotelName">—</span>
      </div>
    </div>
  </header>

  <main class="hd-page">
    <div class="hd-error" id="hdError" hidden></div>

    <div class="hd-controls">
      <div class="hd-range" role="group" aria-label="Date range">
        <button type="button" class="hd-range__btn" data-range="7">7 days</button>
        <button type="button" class="hd-range__btn hd-range__btn--active" data-range="30">30 days</button>
        <button type="button" class="hd-range__btn" data-range="90">90 days</button>
        <button type="button" class="hd-range__btn" data-range="all">All time</button>
      </div>
      <button type="button" class="hd-refresh" id="hdRefresh">Refresh</button>
    </div>

    <section class="hd-kpi-grid hd-skeleton" id="hdKpiGrid">
      <div class="hd-kpi"><span class="hd-kpi__label">Bookings</span><strong class="hd-kpi__value" id="hdBookings">—</strong><span class="hd-kpi__sub" id="hdBookingsSub">—</span></div>
      <div class="hd-kpi"><span class="hd-kpi__label">Revenue</span><strong class="hd-kpi__value" id="hdRevenue">—</strong><span class="hd-kpi__sub" id="hdRevenueSub">—</span></div>
      <div class="hd-kpi"><span class="hd-kpi__label">Travelers</span><strong class="hd-kpi__value" id="hdTravelers">—</strong><span class="hd-kpi__sub" id="hdTravelersSub">—</span></div>
      <div class="hd-kpi"><span class="hd-kpi__label">Estimated commission</span><strong class="hd-kpi__value" id="hdCommission">—</strong><span class="hd-kpi__sub" id="hdCommissionSub">—</span></div>
    </section>

    <section class="hd-table-wrap">
      <h2>Bookings</h2>
      <div class="hd-table-scroll">
        <table class="hd-table" id="hdTable">
          <thead>
            <tr>
              <th>Booked</th>
              <th>Tour date</th>
              <th>Tour</th>
              <th>Guest</th>
              <th class="hd-num">Travelers</th>
              <th class="hd-num">Amount</th>
              <th class="hd-num">Commission</th>
              <th>Confirmation</th>
            </tr>
          </thead>
          <tbody id="hdTableBody"></tbody>
        </table>
      </div>
      <div class="hd-empty" id="hdEmpty" hidden>
        <strong>No bookings yet</strong>
        Bookings will appear here as soon as guests book through your QR code or referral link.
      </div>
    </section>
  </main>

  <script>
    (function () {
      var BOKUN_API_BASE = 'https://horizon-bokun.ivan-mueller02.workers.dev';

      var els = {
        hotelName:     document.getElementById('hdHotelName'),
        kpiGrid:       document.getElementById('hdKpiGrid'),
        bookings:      document.getElementById('hdBookings'),
        bookingsSub:   document.getElementById('hdBookingsSub'),
        revenue:       document.getElementById('hdRevenue'),
        revenueSub:    document.getElementById('hdRevenueSub'),
        travelers:     document.getElementById('hdTravelers'),
        travelersSub:  document.getElementById('hdTravelersSub'),
        commission:    document.getElementById('hdCommission'),
        commissionSub: document.getElementById('hdCommissionSub'),
        tableBody:     document.getElementById('hdTableBody'),
        empty:         document.getElementById('hdEmpty'),
        error:         document.getElementById('hdError'),
        refresh:       document.getElementById('hdRefresh'),
        rangeBtns:     document.querySelectorAll('.hd-range__btn'),
      };

      // ── State ──────────────────────────────────────────────────────
      var hotelSlug = (new URLSearchParams(window.location.search).get('hotel') || '').trim().toLowerCase();
      var hotelRecord = null;       // Resolved from /partners.json
      var currentRangeDays = 30;    // 7, 30, 90, or 'all'

      // ── Boot ───────────────────────────────────────────────────────
      if (!hotelSlug || !/^[a-z0-9-]{2,40}$/.test(hotelSlug)) {
        showError('Add ?hotel=<slug> to the URL to view a partner dashboard. Example: /dashboard/hotel/?hotel=fairmont-ll');
        return;
      }

      Promise.all([
        fetch('/partners.json', { cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }),
      ]).then(function (results) {
        var partners = results[0];
        if (!partners || !partners.hotels) {
          showError('Could not load partner directory. Try refreshing.');
          return;
        }
        hotelRecord = partners.hotels.find(function (h) {
          return h.code === hotelSlug && h.status === 'active';
        });
        if (!hotelRecord) {
          showError('Hotel slug "' + hotelSlug + '" is not an active partner. Check the URL or contact Horizon.');
          return;
        }
        els.hotelName.textContent = hotelRecord.name;
        document.title = hotelRecord.name + ' — Partner dashboard';
        loadBookings();
      }).catch(function (err) {
        console.error('partners.json fetch failed', err);
        showError('Could not load partner directory.');
      });

      // ── Range buttons ──────────────────────────────────────────────
      els.rangeBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          els.rangeBtns.forEach(function (b) { b.classList.remove('hd-range__btn--active'); });
          btn.classList.add('hd-range__btn--active');
          var v = btn.getAttribute('data-range');
          currentRangeDays = v === 'all' ? 'all' : parseInt(v, 10);
          loadBookings();
        });
      });

      els.refresh.addEventListener('click', loadBookings);

      // ── Fetch + render ─────────────────────────────────────────────
      function loadBookings() {
        var qs = '?hotel=' + encodeURIComponent(hotelSlug);
        if (currentRangeDays !== 'all') {
          var to = new Date();
          var from = new Date(); from.setDate(from.getDate() - currentRangeDays + 1);
          qs += '&from=' + ymd(from) + '&to=' + ymd(to);
        }
        hideError();
        els.kpiGrid.classList.add('hd-skeleton');
        fetch(BOKUN_API_BASE + '/api/dashboard/bookings' + qs, { cache: 'no-store' })
          .then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
          .then(function (res) {
            if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
            renderKpis(res.body.kpis || { bookings: 0, revenue: 0, travelers: 0 });
            renderTable(res.body.records || []);
            els.kpiGrid.classList.remove('hd-skeleton');
          })
          .catch(function (err) {
            console.error('bookings fetch failed', err);
            showError('Could not load bookings: ' + (err && err.message || 'unknown error'));
            els.kpiGrid.classList.remove('hd-skeleton');
          });
      }

      function renderKpis(kpis) {
        var commissionPct = (hotelRecord && hotelRecord.commission_pct) || 0;
        var commission = (kpis.revenue || 0) * commissionPct / 100;
        var rangeLabel = currentRangeDays === 'all' ? 'all time' : 'last ' + currentRangeDays + ' days';

        els.bookings.textContent     = String(kpis.bookings || 0);
        els.bookingsSub.textContent  = rangeLabel;
        els.revenue.textContent      = formatMoney(kpis.revenue || 0);
        els.revenueSub.textContent   = rangeLabel;
        els.travelers.textContent    = String(kpis.travelers || 0);
        els.travelersSub.textContent = rangeLabel;
        els.commission.textContent   = formatMoney(commission);
        els.commissionSub.textContent = commissionPct + '% of revenue';
      }

      function renderTable(records) {
        els.tableBody.innerHTML = '';
        if (!records.length) {
          els.empty.hidden = false;
          return;
        }
        els.empty.hidden = true;
        var commissionPct = (hotelRecord && hotelRecord.commission_pct) || 0;

        var frag = document.createDocumentFragment();
        records.forEach(function (r) {
          var tr = document.createElement('tr');
          var travelers = (r.adults || 0) + (r.youth || 0) + (r.infants || 0);
          var commission = (r.amount || 0) * commissionPct / 100;
          tr.innerHTML =
            '<td>' + escapeHtml(formatShortDate(r.created_at)) + '</td>' +
            '<td>' + escapeHtml(formatTourDate(r.date)) + '</td>' +
            '<td>' + escapeHtml(r.tour_title || tourTitleFromId(r.tour_id) || '—') + '</td>' +
            '<td>' + escapeHtml(r.lead_name || '—') + '</td>' +
            '<td class="hd-num">' + travelers + '</td>' +
            '<td class="hd-num">' + escapeHtml(r.amount != null ? formatMoney(r.amount) : '—') + '</td>' +
            '<td class="hd-num">' + escapeHtml(r.amount != null ? formatMoney(commission) : '—') + '</td>' +
            '<td><span class="hd-table__code">' + escapeHtml(r.confirmation_code || '—') + '</span></td>';
          frag.appendChild(tr);
        });
        els.tableBody.appendChild(frag);
      }

      // ── Helpers ────────────────────────────────────────────────────
      function showError(msg) {
        els.error.textContent = msg;
        els.error.hidden = false;
      }
      function hideError() {
        els.error.hidden = true;
        els.error.textContent = '';
      }
      function ymd(d) {
        return d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
      }
      function formatShortDate(ms) {
        if (!ms) return '—';
        var d = new Date(ms);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }
      function formatTourDate(ymd) {
        if (!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return '—';
        var p = ymd.split('-').map(Number);
        var d = new Date(p[0], p[1] - 1, p[2]);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate();
      }
      function formatMoney(n) {
        return 'CA$' + (Math.round(n * 100) / 100).toFixed(2);
      }
      function tourTitleFromId(id) {
        if (id == 1162721) return 'Banff Hidden Gem Canoe Tour';
        return null;
      }
      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (m) {
          return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
        });
      }
    })();
  </script>
</body>
</html>
