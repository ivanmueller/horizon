<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Horizon partner dashboard</title>
  <meta name="description" content="Sign in to your hotel's Horizon partner dashboard.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://gowithhorizon.com/dashboard/login/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">

  <!-- Hide the page until the session check decides whether to show
       the sign-in form or redirect a logged-in visitor straight to
       the dashboard. Avoids flashing the form for one frame. -->
  <style>body { visibility: hidden; }</style>

  <style>
    body {
      background: var(--warm-white);
      min-height: 100vh;
      margin: 0;
      display: flex; flex-direction: column;
    }

    .hl-page {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-6) var(--space-4);
    }
    .hl-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .hl-logo {
      display: flex; flex-direction: column; align-items: center;
      gap: var(--space-2); margin-bottom: var(--space-4);
    }
    .hl-logo__icon {
      width: 48px; height: 48px;
    }
    .hl-logo__text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem; font-weight: 700; color: var(--coral);
    }
    .hl-title {
      text-align: center;
      font-family: var(--font-display);
      font-size: var(--text-xl); font-weight: 600;
      color: var(--near-black);
      margin: 0 0 var(--space-1);
    }
    .hl-sub {
      text-align: center;
      font-size: var(--text-sm); color: var(--mid-gray);
      margin: 0 0 var(--space-5);
    }

    .hl-form { display: flex; flex-direction: column; gap: var(--space-3); }
    .hl-form label {
      font-size: var(--text-sm); font-weight: 600; color: var(--near-black);
      margin-bottom: -2px;
    }
    .hl-form input[type="email"],
    .hl-form input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font: inherit; font-size: var(--text-base);
      box-sizing: border-box;
      background: #fff;
    }
    .hl-form input[type="email"]:focus,
    .hl-form input[type="password"]:focus {
      outline: 2px solid var(--coral);
      outline-offset: -1px;
    }
    .hl-btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--coral); color: #fff;
      border: 0; border-radius: var(--radius-md);
      font: inherit; font-size: var(--text-base); font-weight: 600;
      cursor: pointer;
      margin-top: var(--space-2);
    }
    .hl-btn:hover { background: var(--coral-hover); }
    .hl-btn:disabled { opacity: 0.6; cursor: progress; }

    /* Continue with Google — neutral chip per Google's brand guidance. */
    .hl-btn--google {
      background: #fff; color: var(--near-black);
      border: 1px solid var(--border-color);
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--space-2);
      margin-top: 0;
    }
    .hl-btn--google:hover { background: var(--warm-white-alt); }
    .hl-btn--google svg { flex-shrink: 0; }

    /* "or" divider between Google and the email row. */
    .hl-divider {
      display: flex; align-items: center; gap: var(--space-3);
      margin: var(--space-3) 0 var(--space-1);
      color: var(--mid-gray); font-size: var(--text-xs);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .hl-divider::before, .hl-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border-color);
    }

    /* Forgot-password link sits under the password field, right-aligned. */
    .hl-forgot-row {
      text-align: right;
      margin-top: -2px;
    }

    /* Inline link button (text styled, button semantics). */
    .hl-link {
      background: none; border: 0; padding: 0;
      font: inherit; font-size: var(--text-sm); color: var(--coral);
      cursor: pointer; text-decoration: underline;
      text-underline-offset: 2px;
    }
    .hl-link:hover { color: var(--coral-hover); }

    /* "Use password instead" / "Use a magic link instead" toggle row. */
    .hl-toggle {
      text-align: center;
      margin: var(--space-3) 0 0;
      font-size: var(--text-sm); color: var(--mid-gray);
    }

    .hl-error {
      background: #FEF2F2; border: 1px solid #FCA5A5; color: #991B1B;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin: 0 0 var(--space-3);
    }
    .hl-error[hidden] { display: none; }

    .hl-footer {
      text-align: center;
      font-size: var(--text-xs); color: var(--mid-gray);
      margin: var(--space-5) 0 0;
    }
    .hl-footer a { color: var(--mid-gray); text-decoration: underline; }
    .hl-footer a:hover { color: var(--near-black); }

    /* Success state — replaces the form once the email is sent. */
    .hl-success { text-align: center; }
    .hl-success__icon {
      width: 56px; height: 56px;
      background: rgba(255, 107, 74, 0.12);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: var(--space-4);
    }
    .hl-success__icon svg { stroke: var(--coral); }
    .hl-success__email {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: var(--text-sm); color: var(--near-black);
      background: var(--warm-white-alt);
      padding: 2px 8px; border-radius: 4px;
    }
    .hl-success__back {
      display: inline-block; margin-top: var(--space-4);
      background: none; border: 0; padding: 0;
      font: inherit; font-size: var(--text-sm); color: var(--coral);
      cursor: pointer; text-decoration: underline;
    }
    .hl-success__back:hover { color: var(--coral-hover); }
  </style>
</head>
<body>

  <main class="hl-page">

    <!-- ── Sign-in form ────────────────────────────────────────────── -->
    <section class="hl-card" id="hlForm">
      <div class="hl-logo">
        <span class="hl-logo__icon">
          <svg width="48" height="48" viewBox="0 0 36 36" aria-hidden="true">
            <rect width="36" height="36" rx="8" fill="#FF6B4A"/>
            <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
          </svg>
        </span>
        <span class="hl-logo__text">horizon</span>
      </div>

      <h1 class="hl-title">Sign in to Horizon</h1>
      <p class="hl-sub">Partner dashboard</p>

      <p class="hl-error" id="hlError" hidden></p>

      <button type="button" class="hl-btn hl-btn--google" id="hlGoogle">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <div class="hl-divider"><span>or</span></div>

      <form class="hl-form" id="hlSignInForm" autocomplete="on">
        <label for="hlEmail">Email</label>
        <input type="email" id="hlEmail" name="email" autocomplete="email" required autofocus>

        <div id="hlPasswordSection" hidden>
          <label for="hlPassword">Password</label>
          <input type="password" id="hlPassword" name="password" autocomplete="current-password">
          <div class="hl-forgot-row">
            <button type="button" class="hl-link" id="hlForgot">Forgot password?</button>
          </div>
        </div>

        <button type="submit" class="hl-btn" id="hlSubmit">Send magic link</button>
      </form>

      <p class="hl-toggle">
        <button type="button" class="hl-link" id="hlToggleMode">Use password instead</button>
      </p>

      <p class="hl-footer">
        Need help? <a href="mailto:hello@gowithhorizon.com">hello@gowithhorizon.com</a>
      </p>
    </section>

    <!-- ── Success card (toggled visible once the email is sent) ───── -->
    <section class="hl-card hl-success" id="hlSuccess" hidden>
      <div class="hl-success__icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="hl-title">Check your email</h1>
      <p class="hl-sub" id="hlSuccessBody">
        We sent a sign-in link to <span class="hl-success__email" id="hlSuccessEmail">—</span>.
        Click it to land on your dashboard.
      </p>
      <button type="button" class="hl-success__back" id="hlBack">Back to sign in</button>
    </section>

  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    // Public Supabase config. anon key is designed to be exposed in
    // browser bundles — it's gated by the RLS policies in 0003.
    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true },
    });

    // Magic-link / password-recovery emails land on /dashboard/setup/
    // first, where the user picks a password before reaching their
    // dashboard. Google sign-in skips that step (the OAuth provider is
    // already a strong second factor) and goes straight to /hotel/.
    const SETUP_REDIRECT = window.location.origin + '/dashboard/setup/';
    const HOME_REDIRECT  = window.location.origin + '/dashboard/hotel/';
    const LAST_MODE_KEY  = 'horizon-last-signin-mode';

    const els = {
      form:           document.getElementById('hlForm'),
      success:        document.getElementById('hlSuccess'),
      successBody:    document.getElementById('hlSuccessBody'),
      successEmail:   document.getElementById('hlSuccessEmail'),
      signInForm:     document.getElementById('hlSignInForm'),
      email:          document.getElementById('hlEmail'),
      passwordSect:   document.getElementById('hlPasswordSection'),
      password:       document.getElementById('hlPassword'),
      submit:         document.getElementById('hlSubmit'),
      error:          document.getElementById('hlError'),
      back:           document.getElementById('hlBack'),
      google:         document.getElementById('hlGoogle'),
      toggle:         document.getElementById('hlToggleMode'),
      forgot:         document.getElementById('hlForgot'),
    };

    // If they're already signed in, skip straight to the dashboard.
    // The dashboard page will route them to their hotel.
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.replace('/dashboard/hotel/');
      throw new Error('redirecting to /dashboard/hotel/');
    }

    // Past the redirect gate — safe to reveal the page.
    document.body.style.visibility = 'visible';

    // First-time visitor (no password ever saved on this browser):
    //   show only the magic-link entry point + Google. The password
    //   toggle stays hidden — there's nothing to sign in with yet.
    // Returning visitor (localStorage carries the 'password' flag,
    //   set when they save a password in /dashboard/setup/ or via
    //   the dashboard Account modal): default to password mode and
    //   reveal the "Use a magic link instead" toggle so they can
    //   flip back if they want.
    const hasPassword = localStorage.getItem(LAST_MODE_KEY) === 'password';
    let mode = hasPassword ? 'password' : 'magic';
    els.toggle.parentElement.hidden = !hasPassword;
    applyMode();

    function applyMode() {
      if (mode === 'password') {
        els.passwordSect.hidden = false;
        els.password.required = true;
        els.submit.textContent = 'Sign in';
        els.toggle.textContent = 'Use a magic link instead';
      } else {
        els.passwordSect.hidden = true;
        els.password.required = false;
        els.password.value = '';
        els.submit.textContent = 'Send magic link';
        els.toggle.textContent = 'Use password instead';
      }
    }

    function showError(msg) {
      els.error.textContent = msg;
      els.error.hidden = false;
    }
    function clearError() {
      els.error.hidden = true;
      els.error.textContent = '';
    }
    function lockForm(label) {
      els.submit.disabled = true;
      els.submit.textContent = label;
      els.google.disabled = true;
    }
    function unlockForm() {
      els.submit.disabled = false;
      els.google.disabled = false;
      applyMode(); // restores submit-button text for current mode
    }
    function showCheckEmail(email, body) {
      els.successEmail.textContent = email;
      els.successBody.innerHTML = body;
      els.form.hidden = true;
      els.success.hidden = false;
    }

    // ── Mode toggle ──────────────────────────────────────────────────
    els.toggle.addEventListener('click', () => {
      mode = mode === 'password' ? 'magic' : 'password';
      clearError();
      applyMode();
      if (mode === 'password') els.password.focus();
    });

    // ── Continue with Google ─────────────────────────────────────────
    els.google.addEventListener('click', async () => {
      clearError();
      lockForm('Redirecting…');
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: HOME_REDIRECT },
        });
        if (error) throw error;
        // signInWithOAuth navigates the browser to Google; no need to
        // do anything else here. If we DO end up running past this
        // point, something kept us on the page — unlock so the button
        // is usable again.
        unlockForm();
      } catch (err) {
        console.error('signInWithOAuth failed', err);
        showError(err.message || 'Could not start Google sign-in. Try again.');
        unlockForm();
      }
    });

    // ── Email form: branches on mode ─────────────────────────────────
    els.signInForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = els.email.value.trim();
      if (!email) return;

      if (mode === 'password') {
        const password = els.password.value;
        if (!password) {
          showError('Enter your password, or use a magic link instead.');
          return;
        }
        lockForm('Signing in…');
        try {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          // No localStorage write here — the flag flips to 'password'
          // when the user actually saves a password in /dashboard/setup/
          // or via the Account modal. Successful password sign-in by
          // itself doesn't change their preference.
          window.location.replace('/dashboard/hotel/');
        } catch (err) {
          console.error('signInWithPassword failed', err);
          showError(
            err.message && err.message.toLowerCase().indexOf('invalid login') !== -1
              ? 'Wrong email or password. Forgot password?'
              : (err.message || 'Could not sign in. Try again.'),
          );
          unlockForm();
        }
        return;
      }

      // Magic-link mode (default for first-timers).
      lockForm('Sending…');
      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: SETUP_REDIRECT,
            shouldCreateUser: true,
          },
        });
        if (error) throw error;
        showCheckEmail(
          email,
          'We sent a sign-in link to <span class="hl-success__email" id="hlSuccessEmail">' +
            escapeHtml(email) + '</span>. Click it to land on your dashboard.',
        );
      } catch (err) {
        console.error('signInWithOtp failed', err);
        showError(err.message || 'Could not send link. Try again.');
        unlockForm();
      }
    });

    // ── Forgot password? ─────────────────────────────────────────────
    els.forgot.addEventListener('click', async () => {
      clearError();
      const email = els.email.value.trim();
      if (!email) {
        showError('Enter your email above first, then click "Forgot password?".');
        els.email.focus();
        return;
      }
      lockForm('Sending…');
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: SETUP_REDIRECT,
        });
        if (error) throw error;
        showCheckEmail(
          email,
          'We sent a password-reset link to <span class="hl-success__email">' +
            escapeHtml(email) + '</span>. Click it, then set a new password from your dashboard.',
        );
      } catch (err) {
        console.error('resetPasswordForEmail failed', err);
        showError(err.message || 'Could not send reset link. Try again.');
        unlockForm();
      }
    });

    els.back.addEventListener('click', () => {
      els.success.hidden = true;
      els.form.hidden = false;
      unlockForm();
      els.email.focus();
      els.email.select();
    });

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (m) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }
  </script>

</body>
</html>
