name               = "horizon-bokun"
main               = "index.js"
compatibility_date = "2024-09-23"

# Cron trigger — sync Short.io click counts into short_links.click_count_cached.
# Runs hourly. The handler is `export default { scheduled(...) }` in index.js.
# Test locally: wrangler dev --test-scheduled (then curl http://localhost:8787/__scheduled)
# Trigger manually from the admin UI: POST /api/admin/sync-clicks.
[triggers]
crons = ["0 * * * *"]

# Vars (committed):
[vars]
BOKUN_API_BASE = "https://api.bokun.io"
# Supabase project URL — non-secret. Service-role key goes in `wrangler
# secret put SUPABASE_SERVICE_KEY` (see below). Replace this with your
# project URL from Supabase → Settings → API → Project URL.
SUPABASE_URL   = "https://lxdltzrntphnkhsniwin.supabase.co"
# Public site origin — used when minting Short.io target URLs at
# hotel/staff creation. Override per-environment if you ever spin up
# a staging deployment that needs to point at a different origin.
PUBLIC_SITE_BASE = "https://gowithhorizon.com"
# Branded short domain. Must be added in the Short.io dashboard and
# CNAME'd in DNS before short links can resolve under it. Until then,
# leave SHORT_IO_API_KEY unset and the worker silently skips Short.io
# calls — hotel/staff creation still succeeds, only the short_links
# row is omitted (admins can create one retroactively via the
# /api/admin/short-links POST endpoint once Short.io is wired up).
SHORT_IO_DOMAIN = "link.gowithhorizon.com"

# Secrets (NOT committed; set via CLI from inside workers/bokun/):
#   wrangler secret put BOKUN_ACCESS_KEY      # Bokun HMAC signing
#   wrangler secret put BOKUN_SECRET_KEY      # Bokun HMAC signing
#   wrangler secret put STRIPE_SECRET_KEY     # sk_test_... (then sk_live_... for prod)
#   wrangler secret put SUPABASE_SERVICE_KEY  # Supabase service_role; bypasses RLS
#   wrangler secret put CF_PAGES_DEPLOY_HOOK  # CF Pages webhook URL for /api/admin/republish
#   wrangler secret put SHORT_IO_API_KEY      # Short.io API key — generate at
#                                              #   Short.io → Integrations → API
#                                              # Worker silently no-ops short
#                                              # link creation until this is set.
#
# Auth gates (both partner + admin) verify Supabase Auth JWTs against
# the public JWKS at $SUPABASE_URL/auth/v1/.well-known/jwks.json — no
# worker-side secret needed; SUPABASE_URL above is sufficient. The
# admin surface additionally checks horizon_admins for the JWT email.
#
# The retired HORIZON_ADMIN_PASSWORD secret can be deleted from the
# worker once you've confirmed /admin/ works end-to-end:
#   wrangler secret delete HORIZON_ADMIN_PASSWORD
#
# The page also needs the Stripe publishable key (pk_test_... / pk_live_...) —
# that one is public and lives inline in tours/Banff-Hidden-Gem-Canoe-Tour/index.html
# (look for STRIPE_PUBLISHABLE_KEY).

# KV namespace for caching product config + pickup places + availability.
#
# One-time setup, from inside workers/bokun/:
#   1. wrangler kv namespace create CACHE
#   2. Copy the printed `id` (32-char hex)
#   3. Uncomment the [[kv_namespaces]] block below and paste the id
#   4. wrangler deploy
#
# (Wrangler validates the whole config before running any subcommand,
#  so the block needs to stay commented until you have a real id —
#  an empty `id = ""` fails validation.)
#
# [[kv_namespaces]]
# binding = "CACHE"
# id      = "PASTE_ID_HERE"

# KV namespace for the checkout booking_id state pouch (cart + hotel held
# during the surface handoff between the tour page and /checkout/?id=...).
# 45-min TTL is enforced per-record at write time; do not set a namespace TTL.
#
# One-time setup, from inside workers/bokun/:
#   1. wrangler kv namespace create BOOKINGS
#   2. Copy the printed `id` (32-char hex)
#   3. Uncomment the [[kv_namespaces]] block below and paste the id
#   4. wrangler deploy
#
[[kv_namespaces]]
binding = "BOOKINGS"
id      = "09014fdc2f54492993b27401f576c9a3"

# Note: the BOOKINGS_LEDGER KV namespace was retired in favour of the
# Supabase `bookings` table (see supabase/migrations/0001_init.sql and
# docs/database.md). Drop the namespace from your account once the
# Supabase migration is verified end-to-end:
#   wrangler kv namespace delete --namespace-id 0b7f4dfd9bf247e9abcdb36480bb5fb0
# (Run from inside workers/bokun/. There are no records to migrate —
#  the cutover happened before any real bookings were captured.)
