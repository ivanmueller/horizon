name               = "horizon-bokun"
main               = "index.js"
compatibility_date = "2024-09-23"

# Vars (committed):
[vars]
BOKUN_API_BASE = "https://api.bokun.io"

# Secrets (NOT committed; set via CLI from inside workers/bokun/):
#   wrangler secret put BOKUN_ACCESS_KEY
#   wrangler secret put BOKUN_SECRET_KEY

# KV namespace for caching product config + pickup places + availability.
#
# One-time setup, from inside workers/bokun/:
#   1. wrangler kv namespace create CACHE
#   2. Copy the printed `id` (32-char hex)
#   3. Uncomment the [[kv_namespaces]] block below and paste the id
#   4. wrangler deploy
#
# (Wrangler validates the whole config before running any subcommand,
#  so the block needs to stay commented until you have a real id —
#  an empty `id = ""` fails validation.)
#
# [[kv_namespaces]]
# binding = "CACHE"
# id      = "PASTE_ID_HERE"
