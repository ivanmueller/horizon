<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account submitted — Horizon</title>
  <meta name="description" content="Your banking details have been submitted to Stripe for verification.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://gowithhorizon.com/connect/return/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">
  <style>
    .connect-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-6);
      text-align: center;
    }
    .connect-card { max-width: 480px; }
    .connect-card__badge {
      width: 64px; height: 64px;
      margin: 0 auto var(--space-4);
      border-radius: 50%;
      background: rgba(74,222,128,0.12);
      display: flex; align-items: center; justify-content: center;
      color: #16A34A;
    }
    .connect-card__title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      margin-bottom: var(--space-3);
    }
    .connect-card__body {
      color: var(--text-secondary, #555);
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="connect-wrap">
    <div class="connect-card">
      <div class="connect-card__badge" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="connect-card__title">Thanks — details submitted</h1>
      <p class="connect-card__body">
        Your banking information has been sent to Stripe for verification.
        This usually completes within a few minutes. Once approved, your
        Horizon referral commission will be paid out automatically each
        month — there's nothing more you need to do here. You can close
        this tab.
      </p>
    </div>
  </main>
</body>
</html>
