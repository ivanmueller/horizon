<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon admin</title>
  <meta name="description" content="Internal commission dashboard — Horizon team only.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://gowithhorizon.com/admin/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Admin design system. Isolated from /css/style.css on purpose
       so neither stylesheet's churn affects the other until the
       site-wide refresh. -->
  <link rel="stylesheet" href="/css/admin.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%23FF6B4A'/><path d='M13 7v22M13 18c0-6 12-6 12 0v11' stroke='white' stroke-width='4' stroke-linecap='round' fill='none'/></svg>">

  <!-- Hide until the auth gate decides where to send the user. -->
  <style>body { visibility: hidden; }</style>
</head>
<body>

  <div class="app">

    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <aside class="app__sidebar">

      <div class="app-brand">
        <span class="app-brand__icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 36 36" fill="none">
            <path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
          </svg>
        </span>
        <span class="app-brand__name">Horizon Tours</span>
      </div>

      <nav class="app-nav" aria-label="Admin navigation">

        <div class="app-nav__group" id="navMain"></div>

        <div>
          <div class="app-nav__heading">Finance</div>
          <div class="app-nav__group" id="navFinance"></div>
        </div>

      </nav>

      <div class="app-userchip">
        <div class="app-userchip__email" id="appEmail">—</div>
        <div class="app-userchip__actions">
          <button type="button" class="app-userchip__btn" id="appAccount">Account</button>
          <button type="button" class="app-userchip__btn" id="appSignout">Sign out</button>
        </div>
      </div>

    </aside>

    <!-- ── Main content ─────────────────────────────────────── -->
    <main class="app__main">
      <div class="app__content" id="appContent">
        <!-- Route content swapped in by JS. -->
      </div>
    </main>

  </div>

  <!-- ── Account modal (set / change password) ────────────── -->
  <div class="modal" id="acctModal" hidden>
    <form class="modal__card" id="acctForm">
      <div class="modal__head">
        <h2 class="modal__title">Account</h2>
        <button type="button" class="modal__close" id="acctClose" aria-label="Close">×</button>
      </div>
      <p class="modal__sub" id="acctSub">Set a password to sign in faster next time.</p>
      <div class="alert alert--bad" id="acctError" hidden></div>
      <div class="alert alert--ok"  id="acctSuccess" hidden></div>

      <label class="muted" style="display:block;margin-bottom:6px;font-size:var(--t-sm);font-weight:600;color:var(--text)">Email</label>
      <input class="input" type="email" id="acctEmail" disabled style="margin-bottom:var(--s4)">

      <label class="muted" style="display:block;margin-bottom:6px;font-size:var(--t-sm);font-weight:600;color:var(--text)">New password</label>
      <input class="input" type="password" id="acctPassword" autocomplete="new-password" minlength="8" required style="margin-bottom:var(--s4)">

      <label class="muted" style="display:block;margin-bottom:6px;font-size:var(--t-sm);font-weight:600;color:var(--text)">Confirm new password</label>
      <input class="input" type="password" id="acctConfirm" autocomplete="new-password" minlength="8" required style="margin-bottom:var(--s5)">

      <div class="modal__actions">
        <button type="button" class="btn" id="acctCancel">Cancel</button>
        <button type="submit" class="btn btn--primary" id="acctSave">Save password</button>
      </div>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    /* ── Supabase client ─────────────────────────────────── */
    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    /* ── Auth gate ───────────────────────────────────────── */
    const sessionResp = await supabase.auth.getSession();
    const session = sessionResp.data && sessionResp.data.session;
    if (!session) {
      window.location.replace('/dashboard/login/');
      throw new Error('redirecting to /dashboard/login/');
    }

    const adminCheck = await supabase
      .from('horizon_admins')
      .select('id')
      .eq('status', 'active')
      .limit(1)
      .maybeSingle();
    if (!adminCheck.data) {
      window.location.replace('/dashboard/hotel/');
      throw new Error('redirecting to /dashboard/hotel/');
    }

    if (window.location.hash && window.location.hash.indexOf('access_token=') !== -1) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    document.body.style.visibility = 'visible';

    /* ── Sidebar nav ─────────────────────────────────────── */
    const ROUTES = [
      { id: 'home',     label: 'Home',         group: 'main',    icon: iconHome },
      { id: 'bookings', label: 'Bookings',     group: 'main',    icon: iconBookings },
      { id: 'hotels',   label: 'Hotels',       group: 'main',    icon: iconHotels },
      { id: 'tours',    label: 'Tour catalog', group: 'main',    icon: iconCompass },
      { id: 'payments', label: 'Payments',     group: 'finance', icon: iconCard },
      { id: 'billing',  label: 'Billing',      group: 'finance', icon: iconReceipt },
      { id: 'invoices', label: 'Invoices',     group: 'finance', icon: iconFile },
    ];

    const navMain    = document.getElementById('navMain');
    const navFinance = document.getElementById('navFinance');
    const navItems   = {};

    for (const route of ROUTES) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'app-nav__item';
      btn.dataset.route = route.id;
      btn.innerHTML =
        '<span class="app-nav__icon">' + route.icon() + '</span>' +
        '<span>' + route.label + '</span>';
      btn.addEventListener('click', () => navigate(route.id));
      navItems[route.id] = btn;
      (route.group === 'finance' ? navFinance : navMain).appendChild(btn);
    }

    function navigate(routeId) {
      window.location.hash = '#/' + routeId;
    }

    function currentRoute() {
      const m = window.location.hash.match(/^#\/([a-z]+)/);
      const id = m && m[1];
      return ROUTES.find(r => r.id === id) ? id : 'home';
    }

    function render() {
      const id = currentRoute();
      for (const r of ROUTES) {
        navItems[r.id].classList.toggle('app-nav__item--active', r.id === id);
      }
      const renderer = renderers[id] || renderers.home;
      document.getElementById('appContent').innerHTML = renderer();
      document.title = 'Horizon admin — ' + (ROUTES.find(r => r.id === id) || ROUTES[0]).label;
    }

    window.addEventListener('hashchange', render);
    render();

    /* ── Route renderers (stubs for now; commits 2+ fill them in) ── */
    const renderers = {
      home() {
        return `
          <header class="page-head">
            <div>
              <h1 class="page-head__title">Home</h1>
              <p class="page-head__sub">Snapshot of activity across all partners.</p>
            </div>
          </header>
          <div class="empty">
            <div class="empty__title">Coming next</div>
            <p class="empty__body">Today's bookings, this month's revenue, and a recent-activity feed land here in the next commit.</p>
          </div>
        `;
      },
      bookings() {
        return `
          <header class="page-head">
            <div>
              <h1 class="page-head__title">Bookings</h1>
              <p class="page-head__sub">Cross-hotel commission rollup with per-partner detail.</p>
            </div>
          </header>
          <div class="empty">
            <div class="empty__title">Re-skinning in progress</div>
            <p class="empty__body">The existing summary, kickback breakdown, status mutation, and invoice button move into this view in the next commit. Behaviour stays identical; just the chrome changes.</p>
          </div>
        `;
      },
      hotels() {
        return placeholderPage(
          'Hotels',
          'Active partner directory.',
          'List of partner hotels with their commission %, employees, and status. Coming in a follow-up sprint.',
        );
      },
      tours() {
        return placeholderPage(
          'Tour catalog',
          'Tours we currently sell.',
          'Catalog of every tour Horizon runs — Bokun product id, base price, durations. Currently just the Banff Hidden Gem Canoe Tour. Detail view + add-tour flow lands here.',
        );
      },
      payments() {
        return placeholderPage(
          'Payments',
          'Stripe transactions and authorisation status.',
          'Per-booking payment status, refund history, capture state. Will pull from a Stripe webhook + match against bookings.',
        );
      },
      billing() {
        return placeholderPage(
          'Billing',
          'Horizon\'s own billing — Stripe + Bokun fees, etc.',
          'Operating-cost view: what Stripe and Bokun deduct, monthly run-rate, etc. Read-only summary fed by Stripe + Bokun statements.',
        );
      },
      invoices() {
        return placeholderPage(
          'Invoices',
          'Per-hotel monthly commission statements.',
          'Generate invoices for any hotel and any period. Today this lives on the Bookings view; it gets its own surface here in a follow-up sprint.',
        );
      },
    };

    function placeholderPage(title, sub, body) {
      return `
        <header class="page-head">
          <div>
            <h1 class="page-head__title">${escapeHtml(title)}</h1>
            <p class="page-head__sub">${escapeHtml(sub)}</p>
          </div>
        </header>
        <div class="empty">
          <div class="empty__title">Coming soon</div>
          <p class="empty__body">${escapeHtml(body)}</p>
        </div>
      `;
    }

    /* ── Sidebar footer (email + Account + Sign out) ─────── */
    document.getElementById('appEmail').textContent =
      (session.user && session.user.email) || '—';

    const signoutBtn = document.getElementById('appSignout');
    signoutBtn.addEventListener('click', async () => {
      signoutBtn.disabled = true;
      await supabase.auth.signOut();
      window.location.replace('/dashboard/login/');
    });

    /* ── Account modal ───────────────────────────────────── */
    const acctModal   = document.getElementById('acctModal');
    const acctForm    = document.getElementById('acctForm');
    const acctEmail   = document.getElementById('acctEmail');
    const acctPwd     = document.getElementById('acctPassword');
    const acctConfirm = document.getElementById('acctConfirm');
    const acctSave    = document.getElementById('acctSave');
    const acctError   = document.getElementById('acctError');
    const acctSuccess = document.getElementById('acctSuccess');

    function openAcct() {
      acctEmail.value = (session.user && session.user.email) || '';
      acctPwd.value = ''; acctConfirm.value = '';
      acctError.hidden = true; acctSuccess.hidden = true;
      acctModal.hidden = false;
      setTimeout(() => acctPwd.focus(), 0);
    }
    function closeAcct() { acctModal.hidden = true; }

    document.getElementById('appAccount').addEventListener('click', openAcct);
    document.getElementById('acctClose').addEventListener('click', closeAcct);
    document.getElementById('acctCancel').addEventListener('click', closeAcct);
    acctModal.addEventListener('click', (e) => { if (e.target === acctModal) closeAcct(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !acctModal.hidden) closeAcct();
    });

    acctForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      acctError.hidden = true; acctSuccess.hidden = true;
      const pw = acctPwd.value, pw2 = acctConfirm.value;
      if (pw.length < 8) {
        acctError.textContent = 'Password must be at least 8 characters.';
        acctError.hidden = false; return;
      }
      if (pw !== pw2) {
        acctError.textContent = 'Passwords don’t match.';
        acctError.hidden = false; return;
      }
      acctSave.disabled = true; acctSave.textContent = 'Saving…';
      try {
        const res = await supabase.auth.updateUser({ password: pw });
        if (res.error) throw res.error;
        try { localStorage.setItem('horizon-last-signin-mode', 'password'); } catch (e) {}
        acctSuccess.textContent = 'Password saved. You can sign in with it next time.';
        acctSuccess.hidden = false;
        acctPwd.value = ''; acctConfirm.value = '';
      } catch (err) {
        console.error('updateUser failed', err);
        acctError.textContent = err.message || 'Could not save password.';
        acctError.hidden = false;
      } finally {
        acctSave.disabled = false; acctSave.textContent = 'Save password';
      }
    });

    /* ── Icons (Lucide-style line, 18px viewBox=24) ──────── */
    function svg(d) {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + d + '</svg>';
    }
    function iconHome()     { return svg('<path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/>'); }
    function iconBookings() { return svg('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'); }
    function iconHotels()   { return svg('<path d="M5 22V4a1 1 0 011-1h12a1 1 0 011 1v18"/><path d="M3 22h18"/><circle cx="9"  cy="8"  r="0.5" fill="currentColor"/><circle cx="15" cy="8"  r="0.5" fill="currentColor"/><circle cx="9"  cy="13" r="0.5" fill="currentColor"/><circle cx="15" cy="13" r="0.5" fill="currentColor"/><path d="M10 22v-4h4v4"/>'); }
    function iconCompass()  { return svg('<circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 13.5 13.5 8.5 15.5 10.5 10.5"/>'); }
    function iconCard()     { return svg('<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>'); }
    function iconReceipt()  { return svg('<path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 1 2V2H4z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/>'); }
    function iconFile()     { return svg('<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>'); }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (m) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }
  </script>

</body>
</html>
