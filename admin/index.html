    function loadHotels(els) {
      els.error.hidden = true;
      return fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        cache: 'no-store',
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => {
          if (r.status === 401) { window.location.replace('/dashboard/login/'); throw new Error('unauthorized'); }
          return r.json().then((b) => ({ ok: r.ok, body: b }));
        })
        .then((res) => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          hotelsCache = res.body.hotels || [];
          renderHotelsTable(els.body, hotelsCache);
        })
        .catch((err) => {
          if (err && err.message === 'unauthorized') return;
          console.error('admin hotels fetch failed', err);
          els.error.textContent = 'Could not load hotels: ' + (err && err.message || 'unknown error');
          els.error.hidden = false;
          els.body.innerHTML =
            '<tr><td colspan="11" class="bk-empty"><div class="bk-empty__title">Failed to load</div><p class="bk-empty__body">Try again in a moment.</p></td></tr>';
        });
    }

    function renderHotelsTable(body, hotels) {
      // Update stat-card counts from the full unfiltered list every
      // render — counts always reflect totals, not the current filter.
      updateHotelsStatcardCounts(hotels);

      const filtered = hotels.filter((h) => matchesHotelsFilter(h, hotelsFilter));

      if (hotelsEls && hotelsEls.checkAll) hotelsEls.checkAll.checked = false;

      if (!filtered.length) {
        const msg = hotels.length
          ? 'No partners match this filter.'
          : 'No partners yet. Add the first one with the + Add hotel button.';
        body.innerHTML =
          '<tr><td colspan="11" class="bk-empty">' +
            '<div class="bk-empty__title">' + escapeHtml(msg) + '</div>' +
          '</td></tr>';
        if (hotelsEls && hotelsEls.footer) hotelsEls.footer.textContent = '0 items';
        return;
      }

      const frag = document.createDocumentFragment();
      filtered.forEach((h) => {
        // Original index inside hotelsCache — preserved so the existing
        // row-click handler (data-hotel-idx) keeps resolving the right
        // record after the visible list is filtered.
        const idx = hotels.indexOf(h);
        const activeStaff = (h.staff    || []).filter((s) => s.status === 'active').length;
        const activeMngrs = (h.managers || []).filter((m) => m.status === 'active').length;
        const typeLabel   = h.type === 'kickback' ? 'Kickback'
                          : h.type === 'pool'     ? 'Pool'
                          : '—';

        const tr = document.createElement('tr');
        tr.dataset.hotelIdx = String(idx);
        tr.innerHTML =
          '<td class="bk-table__check"><input type="checkbox" data-hotels-row="' + escapeHtml(h.id || '') + '" aria-label="Select hotel"></td>' +
          '<td class="bk-table__name">' + escapeHtml(h.name) + '</td>' +
          '<td>' + escapeHtml(h.location || '—') + '</td>' +
          '<td>' + escapeHtml(typeLabel) + '</td>' +
          '<td>' + (h.commission_pct != null ? escapeHtml(h.commission_pct + '%') : '—') + '</td>' +
          '<td>' + activeStaff + '</td>' +
          '<td>' + activeMngrs + '</td>' +
          '<td>' + hotelStatusPill(h.status) + '</td>' +
          '<td>' + escapeHtml(formatHumanDate(h.effective_date) || '—') + '</td>' +
          '<td>' + escapeHtml(formatHumanDateTime(h.created_at)) + '</td>' +
          '<td class="bk-table__kebab"><button type="button" class="bk-kebab" aria-label="Row actions">⋯</button></td>';
        frag.appendChild(tr);
      });
      body.innerHTML = '';
      body.appendChild(frag);

      if (hotelsEls && hotelsEls.footer) {
        hotelsEls.footer.textContent =
          filtered.length + (filtered.length === 1 ? ' item' : ' items');
      }
    }

    function matchesHotelsFilter(h, filter) {
      if (filter === 'all')        return true;
      if (filter === 'active')     return h.status === 'active';
      if (filter === 'terminated') return h.status === 'terminated';
      if (filter === 'kickback')   return h.type === 'kickback';
      if (filter === 'pool')       return h.type === 'pool';
      if (filter === 'banff')      return (h.location || '').toLowerCase() === 'banff';
      if (filter === 'canmore')    return (h.location || '').toLowerCase() === 'canmore';
      return true;
    }

    function updateHotelsStatcardCounts(hotels) {
      if (!hotelsEls || !hotelsEls.statcards) return;
      const counts = {
        all:        hotels.length,
        active:     hotels.filter((h) => h.status === 'active').length,
        terminated: hotels.filter((h) => h.status === 'terminated').length,
        kickback:   hotels.filter((h) => h.type   === 'kickback').length,
        pool:       hotels.filter((h) => h.type   === 'pool').length,
      };
      hotelsEls.statcards.querySelectorAll('[data-count]').forEach((node) => {
        const k = node.dataset.count;
        node.textContent = String(counts[k] != null ? counts[k] : 0);
      });
    }

    function hotelStatusPill(status) {
      if (status === 'active')     return '<span class="bk-pill bk-pill--ok">Active</span>';
      if (status === 'terminated') return '<span class="bk-pill bk-pill--neutral">Terminated</span>';
      if (status === 'revoked')    return '<span class="bk-pill bk-pill--neutral">Revoked</span>';
      return '<span class="bk-pill bk-pill--neutral">' + escapeHtml(status || '—') + '</span>';
    }

    // Kept for any drawer-internal code that still references it. The
    // hotels list now renders types as plain text per the Stripe-style
    // table, but the drawer + detail-row breakdowns still call typePill.
    function typePill(type) {
      if (type === 'kickback') return '<span class="type-pill type-pill--kickback">kickback</span>';
      if (type === 'pool')     return '<span class="type-pill type-pill--pool">pool</span>';
      return '<span class="muted">—</span>';
    }
    function statusBadge(status) {
      if (status === 'active')     return '<span class="badge badge--ok">Active</span>';
      if (status === 'terminated') return '<span class="badge badge--neutral">Terminated</span>';
      if (status === 'revoked')    return '<span class="badge badge--bad">Revoked</span>';
      return '<span class="badge badge--neutral">' + escapeHtml(status || '—') + '</span>';
    }

    /* ── Hotel detail drawer ─────────────────────────────── */
    const hotelDrawer      = document.getElementById('hotelDrawer');
    const hotelDrawerTitle = document.getElementById('hotelDrawerTitle');
    const hotelDrawerSub   = document.getElementById('hotelDrawerSub');
    const hotelDrawerBody  = document.getElementById('hotelDrawerBody');
    const hotelDrawerClose = document.getElementById('hotelDrawerClose');

    // Drawer state — set when the drawer opens, used by the inline
    // staff/manager forms (commits 4c+) so we can re-render after a
    // CRUD op without refetching from the user's POV.
    let drawerCurrentHotelId = null;
    let drawerStaffForm      = null;  // null | 'add' | { editId: <staff.id> }
    let drawerManagerForm    = null;  // null | 'add' | { editId: <manager.id> }

    function openHotelDrawer(hotel) {
      drawerCurrentHotelId = hotel.id;
      drawerStaffForm = null;
      drawerManagerForm = null;
      hotelDrawerTitle.textContent = hotel.name;
      hotelDrawerSub.textContent = hotel.code;
      renderAndWireDrawer(hotel);
      hotelDrawer.hidden = false;
    }

    // Re-render the drawer body for the currently-open hotel using the
    // freshest object in hotelsCache. Used after any successful CRUD
    // op to reflect server state without a flash of empty UI.
    function refreshDrawerFromCache() {
      if (drawerCurrentHotelId == null) return;
      const hotel = hotelsCache.find((h) => h.id === drawerCurrentHotelId);
      if (!hotel) { closeHotelDrawer(); return; }
      hotelDrawerTitle.textContent = hotel.name;
      hotelDrawerSub.textContent = hotel.code;
      renderAndWireDrawer(hotel);
    }

    // Reload /api/admin/hotels and refresh both the drawer + the
    // hotel-detail page from the freshest cache. Used after every
    // staff/manager CRUD op so the two views can never drift. Works
    // whether or not the user is currently on the Hotels list route
    // (hotelsEls may be null when deep-linking into a detail page).
    function reloadHotelsCacheAndRefresh() {
      const after = () => { refreshDrawerFromCache(); refreshHotelDetailFromCache(); };
      if (hotelsEls) return loadHotels(hotelsEls).then(after);
      return fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        cache: 'no-store',
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => {
          if (r.status === 401) { window.location.replace('/dashboard/login/'); throw new Error('unauthorized'); }
          return r.json().then((b) => ({ ok: r.ok, body: b }));
        })
        .then((res) => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          hotelsCache = res.body.hotels || [];
          after();
        })
        .catch((err) => {
          if (err && err.message === 'unauthorized') return;
          console.error('hotels reload failed', err);
        });
    }

    function renderAndWireDrawer(hotel) {
      // Preserve scroll position across re-renders so users editing
      // halfway down the drawer aren't kicked back to the top.
      const panel = hotelDrawer.querySelector('.drawer__panel');
      const scrollTop = panel ? panel.scrollTop : 0;
      hotelDrawerBody.innerHTML = renderHotelDrawerBody(hotel);
      if (panel) panel.scrollTop = scrollTop;

      // ── Hotel-overview form
      const form = hotelDrawerBody.querySelector('#heForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitHotelEdit(form, hotel);
      });
      hotelDrawerBody.querySelector('#heCancel').addEventListener('click', closeHotelDrawer);

      const terminateBtn = hotelDrawerBody.querySelector('#heTerminate');
      if (terminateBtn) {
        terminateBtn.addEventListener('click', () => {
          if (!confirm(`Terminate "${hotel.name}"?\n\nNew bookings will stop earning commission. Existing bookings + invoices are preserved. You can reinstate later.`)) return;
          setHotelStatus(hotel, 'terminate');
        });
      }
      const reinstateBtn = hotelDrawerBody.querySelector('#heReinstate');
      if (reinstateBtn) {
        reinstateBtn.addEventListener('click', () => {
          setHotelStatus(hotel, 'active');
        });
      }

      // ── Staff section
      const addStaffBtn = hotelDrawerBody.querySelector('#heAddStaff');
      if (addStaffBtn) {
        addStaffBtn.addEventListener('click', () => {
          drawerStaffForm = 'add';
          renderAndWireDrawer(hotel);
        });
      }
      hotelDrawerBody.querySelectorAll('[data-staff-edit]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          drawerStaffForm = { editId: btn.dataset.staffEdit };
          renderAndWireDrawer(hotel);
        });
      });
      hotelDrawerBody.querySelectorAll('[data-staff-revoke]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const staffId = btn.dataset.staffRevoke;
          const staffName = btn.dataset.staffName || 'this staff member';
          if (!confirm(`Revoke ${staffName}?\n\nFuture bookings under their tracking code will stop earning kickback. Past bookings are preserved.`)) return;
          revokeStaff(hotel, staffId);
        });
      });
      // ── Managers section
      const addManagerBtn = hotelDrawerBody.querySelector('#heAddManager');
      if (addManagerBtn) {
        addManagerBtn.addEventListener('click', () => {
          drawerManagerForm = 'add';
          renderAndWireDrawer(hotel);
        });
      }
      hotelDrawerBody.querySelectorAll('[data-manager-edit]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          drawerManagerForm = { editId: btn.dataset.managerEdit };
          renderAndWireDrawer(hotel);
        });
      });
      hotelDrawerBody.querySelectorAll('[data-manager-revoke]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const managerId = btn.dataset.managerRevoke;
          const email = btn.dataset.managerEmail || 'this manager';
          if (!confirm(`Revoke access for ${email}?\n\nThey lose access to /dashboard/hotel/ immediately. You can re-invite later if needed.`)) return;
          revokeManager(hotel, managerId);
        });
      });
      const managerForm = hotelDrawerBody.querySelector('#hmForm');
      if (managerForm) {
        managerForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (drawerManagerForm === 'add') submitManagerInvite(managerForm, hotel);
          else if (drawerManagerForm && drawerManagerForm.editId)
            submitManagerEdit(managerForm, hotel, drawerManagerForm.editId);
        });
        const cancelBtn = hotelDrawerBody.querySelector('#hmCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', () => {
          drawerManagerForm = null;
          renderAndWireDrawer(hotel);
        });
      }

      const staffForm = hotelDrawerBody.querySelector('#hsForm');
      if (staffForm) {
        staffForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (drawerStaffForm === 'add') submitStaffCreate(staffForm, hotel);
          else if (drawerStaffForm && drawerStaffForm.editId)
            submitStaffEdit(staffForm, hotel, drawerStaffForm.editId);
        });
        const cancelBtn = hotelDrawerBody.querySelector('#hsCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', () => {
          drawerStaffForm = null;
          renderAndWireDrawer(hotel);
        });
        // No slug→tracking auto-derive: tracking codes are minted
        // server-side from the hotel's tracking_prefix + a per-hotel
        // sequence number (e.g. X7K2_E_0042). The slug remains a
        // separate internal identifier with no derivation relationship
        // to the public-facing code.
      }
    }
    function openHotelCreateDrawer() {
      hotelDrawerTitle.textContent = 'New hotel';
      hotelDrawerSub.textContent = '';
      hotelDrawerBody.innerHTML = renderHotelCreateForm();
      hotelDrawer.hidden = false;
      // Focus the first field for fast typing.
      const first = hotelDrawerBody.querySelector('input,select,textarea');
      if (first) first.focus();
      // Tracking prefix + default_tracking_code are minted server-side
      // at insert time (random 4-char alphanumeric, e.g. X7K2). No
      // client-side derivation needed.
      const form = hotelDrawerBody.querySelector('#hcForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitHotelCreate(form);
      });
      hotelDrawerBody.querySelector('#hcCancel').addEventListener('click', closeHotelDrawer);
    }
    function closeHotelDrawer() {
      hotelDrawer.hidden = true;
      drawerCurrentHotelId = null;
      drawerStaffForm = null;
      drawerManagerForm = null;

      document.querySelectorAll('.row--selected').forEach((r) => r.classList.remove('row--selected'));
    }

    hotelDrawer.addEventListener('click', (e) => {
      // Click on the backdrop (outside the panel) closes the drawer.
      if (e.target === hotelDrawer) closeHotelDrawer();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !hotelDrawer.hidden) closeHotelDrawer();
    });

    // "n" anywhere on the Hotels route opens the new-hotel drawer,
    // mirroring Stripe's keyboard shortcut on the Customers page.
    // Skipped while the user is typing in a field or the drawer is
    // already open, and only on /admin/hotels/ so it doesn't fire on
    // unrelated pages.
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'n' && e.key !== 'N') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (currentRoute() !== 'hotels') return;
      if (!hotelDrawer.hidden) return;
      const t = e.target;
      if (t && (t.matches('input, textarea, select') || t.isContentEditable)) return;
      e.preventDefault();
      openHotelCreateDrawer();
    });

    function submitHotelCreate(form) {
      const errEl = form.querySelector('#hcError');
      const saveBtn = form.querySelector('#hcSave');
      errEl.hidden = true;

      // Read + lightly normalise client-side. Server is authoritative
      // for validation; this is just to skip obvious round-trips.
      const code = form.querySelector('#hcCode').value.trim().toLowerCase();
      const name = form.querySelector('#hcName').value.trim();
      const location = form.querySelector('#hcLocation').value;
      const type = form.querySelector('#hcType').value;
      const commission = form.querySelector('#hcCommission').value.trim();
      const pool = form.querySelector('#hcPool').value.trim();
      const effective = form.querySelector('#hcEffective').value.trim();
      const notes = form.querySelector('#hcNotes').value.trim();

      if (!/^[a-z0-9-]{2,60}$/.test(code)) {
        return showInline(errEl, 'Slug must be 2–60 lowercase letters, digits, or hyphens.');
      }
      if (!name) return showInline(errEl, 'Name is required.');
      if (!location) return showInline(errEl, 'Pick a location.');
      if (!type) return showInline(errEl, 'Pick a type.');

      // tracking_prefix + default_tracking_code are minted by the worker.
      const body = { code, name, location, type };
      if (commission !== '') body.commission_pct = Number(commission);
      if (pool !== '')       body.kickback_pool_pct = Number(pool);
      if (effective)         body.effective_date = effective;
      if (notes)             body.notes = notes;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Creating…';

      fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 409 ? 'A hotel with this slug already exists.' :
               res.status === 401 ? 'Session expired — please sign in again.' :
                                    'Could not create hotel (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          // Fire-and-forget the deploy hook. We don't block the UI on
          // it; the build takes ~30–60s and the user already sees the
          // new hotel in the list immediately from the local refresh.
          triggerRepublish();
          closeHotelDrawer();
          flashHotelsNotice('Hotel created. Republishing partners.json (~30s)…');
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
        })
        .finally(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Create hotel';
        });
    }
    function showInline(errEl, msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
      errEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function triggerRepublish() {
      fetch(BOKUN_API_BASE + '/api/admin/republish', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + session.access_token },
      }).catch((err) => {
        console.warn('republish trigger failed', err);
      });
    }

    function submitHotelEdit(form, hotel) {
      const errEl     = form.querySelector('#heError');
      const successEl = form.querySelector('#heSuccess');
      const saveBtn   = form.querySelector('#heSave');
      errEl.hidden = true;
      successEl.hidden = true;

      const name      = form.querySelector('#heName').value.trim();
      const location  = form.querySelector('#heLocation').value;
      const type      = form.querySelector('#heType').value;
      const commission = form.querySelector('#heCommission').value.trim();
      const pool      = form.querySelector('#hePool').value.trim();
      const effective = form.querySelector('#heEffective').value.trim();
      const notes     = form.querySelector('#heNotes').value;

      if (!name) return showInline(errEl, 'Name is required.');
      if (!location) return showInline(errEl, 'Pick a location.');
      if (!type) return showInline(errEl, 'Pick a type.');

      // Build a patch body. tracking_prefix + default_tracking_code
      // are auto-managed and locked — the worker silently strips them
      // even if they ever leak into a request body.
      const body = { name, location, type };
      body.commission_pct    = commission !== '' ? Number(commission) : 0;
      body.kickback_pool_pct = pool !== '' ? Number(pool) : null;
      body.effective_date    = effective || null;
      body.notes             = notes ? notes : null;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      fetch(BOKUN_API_BASE + '/api/admin/hotels/' + encodeURIComponent(hotel.id), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 401 ? 'Session expired — please sign in again.' :
               res.status === 404 ? 'Hotel not found — refresh the list.' :
                                    'Save failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          triggerRepublish();
          successEl.textContent = 'Saved. Republishing partners.json (~30s)…';
          successEl.hidden = false;
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
        })
        .finally(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
    }

    function setHotelStatus(hotel, action) {
      // action: 'terminate' → DELETE (worker flips status to 'terminated')
      //         'active'    → PATCH { status: 'active' } (reinstate)
      const isTerminate = action === 'terminate';
      const opts = isTerminate
        ? { method: 'DELETE' }
        : {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'active' }),
          };
      opts.headers = Object.assign(
        { Authorization: 'Bearer ' + session.access_token },
        opts.headers || {},
      );

      fetch(BOKUN_API_BASE + '/api/admin/hotels/' + encodeURIComponent(hotel.id), opts)
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) || ('Action failed (HTTP ' + res.status + ').');
            flashHotelsError(msg);
            return;
          }
          triggerRepublish();
          flashHotelsNotice(
            isTerminate
              ? `"${hotel.name}" terminated. Republishing partners.json (~30s)…`
              : `"${hotel.name}" reinstated. Republishing partners.json (~30s)…`,
          );
          closeHotelDrawer();
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          flashHotelsError(err && err.message || 'Unknown error');
        });
    }
    function flashHotelsError(msg) {
      if (!hotelsEls || !hotelsEls.error) return;
      hotelsEls.error.textContent = msg;
      hotelsEls.error.hidden = false;
      setTimeout(() => { if (hotelsEls && hotelsEls.error) hotelsEls.error.hidden = true; }, 6000);
    }

    // ── Staff sub-form (add or edit, rendered below the staff table)
    function renderStaffForm(staff /* null = add mode */) {
      const isAdd = !staff;
      // Tracking code is auto-minted by the worker on create (format:
      // {hotel.tracking_prefix}_E_{padded sequence}) and locked
      // thereafter. On add we don't render it; on edit we render it
      // read-only so admins can see the value but never change it.
      const trackingRow = isAdd
        ? ''
        : `<label class="drawer-form__row">
             <span class="drawer-form__label">Tracking code <span class="drawer-form__req">permanent</span></span>
             <input class="input" type="text" disabled
                    value="${escapeHtml(staff.tracking_code || '—')}"
                    style="font-family: var(--font-mono); font-size: 0.9em;">
             <span class="drawer-form__hint">Auto-assigned at creation. Encoded in this employee's QR code.</span>
           </label>`;
      return `
        <form id="hsForm" class="drawer-subform" novalidate>
          <h4 class="drawer-subform__title">${isAdd ? 'Add staff member' : 'Edit ' + escapeHtml(staff.name)}</h4>
          <div class="alert alert--bad" id="hsError" hidden></div>
          <div class="drawer-form">
            <label class="drawer-form__row">
              <span class="drawer-form__label">Name <span class="drawer-form__req">required</span></span>
              <input class="input" id="hsName" type="text" required maxlength="120"
                     value="${isAdd ? '' : escapeHtml(staff.name)}"
                     placeholder="Jane Smith">
            </label>
            <label class="drawer-form__row">
              <span class="drawer-form__label">Slug ${isAdd
                ? '<span class="drawer-form__req">required · permanent</span>'
                : '<span class="drawer-form__req">permanent</span>'}</span>
              <input class="input" id="hsCode" type="text"
                     ${isAdd ? 'required' : 'disabled'}
                     autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                     pattern="[a-z0-9-]{2,60}" maxlength="60"
                     value="${isAdd ? '' : escapeHtml(staff.code)}"
                     placeholder="jane-smith"
                     style="font-family: var(--font-mono); font-size: 0.9em;">
              ${isAdd ? '<span class="drawer-form__hint">Internal identifier only. The tracking code (used in QR codes) is auto-assigned.</span>' : ''}
            </label>
            ${trackingRow}
            <label class="drawer-form__row">
              <span class="drawer-form__label">Kickback %</span>
              <input class="input" id="hsKickback" type="number" min="0" max="100" step="0.1"
                     value="${isAdd ? '' : (staff.kickback_pct != null ? staff.kickback_pct : '')}"
                     placeholder="5">
            </label>
          </div>
          <div class="drawer-subform__actions">
            <button type="button" class="btn btn--sm" id="hsCancel">Cancel</button>
            <button type="submit" class="btn btn--primary btn--sm" id="hsSave">${isAdd ? 'Add staff' : 'Save changes'}</button>
          </div>
        </form>
      `;
    }

    function submitStaffCreate(form, hotel) {
      const errEl   = form.querySelector('#hsError');
      const saveBtn = form.querySelector('#hsSave');
      errEl.hidden = true;

      const code     = form.querySelector('#hsCode').value.trim().toLowerCase();
      const name     = form.querySelector('#hsName').value.trim();
      const kickback = form.querySelector('#hsKickback').value.trim();

      if (!/^[a-z0-9-]{2,60}$/.test(code)) {
        return showInline(errEl, 'Slug must be 2–60 lowercase letters, digits, or hyphens.');
      }
      if (!name) return showInline(errEl, 'Name is required.');

      // tracking_code is minted by the worker (hotel.tracking_prefix
      // + per-hotel sequence). Don't send it from the client.
      const body = { hotel_id: hotel.id, code, name };
      if (kickback !== '') body.kickback_pct = Number(kickback);

      saveBtn.disabled = true;
      saveBtn.textContent = 'Adding…';

      fetch(BOKUN_API_BASE + '/api/admin/staff', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 409 ? 'A staff member with this slug already exists for this hotel.' :
                                    'Could not add staff (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          drawerStaffForm = null;
          triggerRepublish();
          flashHotelsNotice('Staff added. Republishing partners.json (~30s)…');
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Add staff';
        });
    }

    function submitStaffEdit(form, hotel, staffId) {
      const errEl   = form.querySelector('#hsError');
      const saveBtn = form.querySelector('#hsSave');
      errEl.hidden = true;

      const name     = form.querySelector('#hsName').value.trim();
      const kickback = form.querySelector('#hsKickback').value.trim();

      if (!name) return showInline(errEl, 'Name is required.');

      // tracking_code + sequence_number are immutable post-create.
      const body = { name };
      body.kickback_pct  = kickback !== '' ? Number(kickback) : 0;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      fetch(BOKUN_API_BASE + '/api/admin/staff/' + encodeURIComponent(staffId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 404 ? 'Staff not found — refresh and retry.' :
                                    'Save failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          drawerStaffForm = null;
          triggerRepublish();
          flashHotelsNotice('Staff updated. Republishing partners.json (~30s)…');
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
    }

    function revokeStaff(hotel, staffId) {
      fetch(BOKUN_API_BASE + '/api/admin/staff/' + encodeURIComponent(staffId), {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            flashHotelsError((res.body && res.body.error) || 'Revoke failed (HTTP ' + res.status + ').');
            return;
          }
          triggerRepublish();
          flashHotelsNotice('Staff revoked. Republishing partners.json (~30s)…');
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => flashHotelsError(err.message || 'Unknown error'));
    }

    // ── Manager (hotel_users) sub-form (invite or edit role)
    // The manager API lives at /api/admin/hotel-users — note the dash.
    // Revoke is a PATCH { status: 'revoked' } since the worker has no
    // DELETE handler; the partial unique index lets us re-invite the
    // same email later.
    function renderManagerForm(manager /* null = invite mode */) {
      const isInvite = !manager;
      const role = isInvite ? 'manager' : (manager.role || 'manager');
      return `
        <form id="hmForm" class="drawer-subform" novalidate>
          <h4 class="drawer-subform__title">${isInvite ? 'Invite manager' : 'Edit ' + escapeHtml(manager.email)}</h4>
          <div class="alert alert--bad" id="hmError" hidden></div>
          <div class="drawer-form">
            <label class="drawer-form__row">
              <span class="drawer-form__label">Email <span class="drawer-form__req">${isInvite ? 'required · permanent' : 'permanent'}</span></span>
              <input class="input" id="hmEmail" type="email"
                     ${isInvite ? 'required' : 'disabled'}
                     autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                     value="${isInvite ? '' : escapeHtml(manager.email)}"
                     placeholder="manager@hotel.com">
              ${isInvite ? '<span class="drawer-form__hint">An invite email will be sent. They\'ll set a password on first sign-in.</span>' : ''}
            </label>
            <label class="drawer-form__row">
              <span class="drawer-form__label">Role</span>
              <select class="input" id="hmRole">
                <option value="manager" ${role === 'manager' ? 'selected' : ''}>manager (can view bookings + invoices)</option>
                <option value="admin"   ${role === 'admin'   ? 'selected' : ''}>admin (can also manage staff at this hotel)</option>
              </select>
            </label>
          </div>
          <div class="drawer-subform__actions">
            <button type="button" class="btn btn--sm" id="hmCancel">Cancel</button>
            <button type="submit" class="btn btn--primary btn--sm" id="hmSave">${isInvite ? 'Send invite' : 'Save changes'}</button>
          </div>
        </form>
      `;
    }

    function submitManagerInvite(form, hotel) {
      const errEl   = form.querySelector('#hmError');
      const saveBtn = form.querySelector('#hmSave');
      errEl.hidden = true;

      const email = form.querySelector('#hmEmail').value.trim();
      const role  = form.querySelector('#hmRole').value;

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return showInline(errEl, 'Enter a valid email address.');
      }

      const body = { hotel_id: hotel.id, email, role };

      saveBtn.disabled = true;
      saveBtn.textContent = 'Inviting…';

      fetch(BOKUN_API_BASE + '/api/admin/hotel-users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 409 ? `${email} is already an active manager for this hotel.` :
                                    'Invite failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          drawerManagerForm = null;
          const inviteMsg = res.body.invite_sent
            ? `Invite sent to ${email}. They'll receive an email to set their password.`
            : `${email} added. They already have an account and can sign in at /dashboard/login/.`;
          flashHotelsNotice(inviteMsg);
          // No republish needed — managers are an auth concern, not
          // partners.json content.
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Send invite';
        });
    }

    function submitManagerEdit(form, hotel, managerId) {
      const errEl   = form.querySelector('#hmError');
      const saveBtn = form.querySelector('#hmSave');
      errEl.hidden = true;

      const role = form.querySelector('#hmRole').value;
      if (!['manager', 'admin'].includes(role)) {
        return showInline(errEl, 'Pick a valid role.');
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      fetch(BOKUN_API_BASE + '/api/admin/hotel-users/' + encodeURIComponent(managerId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ role }),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 404 ? 'Manager not found — refresh and retry.' :
                                    'Save failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          drawerManagerForm = null;
          flashHotelsNotice('Manager role updated.');
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
    }

    function revokeManager(hotel, managerId) {
      fetch(BOKUN_API_BASE + '/api/admin/hotel-users/' + encodeURIComponent(managerId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ status: 'revoked' }),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            flashHotelsError((res.body && res.body.error) || 'Revoke failed (HTTP ' + res.status + ').');
            return;
          }
          flashHotelsNotice('Manager access revoked.');
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => flashHotelsError(err.message || 'Unknown error'));
    }

    /* ── Period / range / formatting helpers ─────────────── */
    function startOfDay(d) { const c = new Date(d); c.setHours(0, 0, 0, 0); return c; }
    function endOfDay(d)   { const c = new Date(d); c.setHours(23, 59, 59, 999); return c; }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function monthLong(m) {
      return ['January','February','March','April','May','June',
              'July','August','September','October','November','December'][m] || '';
    }
    function makeRange(fromDate, toDate, opts) {
      const labelFrom = ymd(fromDate);
      const labelTo   = ymd(toDate);
      return {
        from:      fromDate.toISOString(),
        to:        toDate.toISOString(),
        labelFrom, labelTo,
        slug:  (opts && opts.slug)  || (labelFrom + '_' + labelTo),
        label: (opts && opts.label) || (formatHumanDate(labelFrom) + ' – ' + formatHumanDate(labelTo)),
      };
    }
    function rangeForPeriod() {
      const now = new Date();
      const y = now.getFullYear(), m = now.getMonth();
      if (currentPeriod === 'this-month') {
        return makeRange(startOfDay(new Date(y, m, 1)), now,
          { slug: y + '-' + pad2(m + 1), label: monthLong(m) + ' ' + y });
      }
      if (currentPeriod === 'last-month') {
        const firstThis = new Date(y, m, 1);
        const lastPrev  = endOfDay(new Date(firstThis.getTime() - 1));
        const firstPrev = startOfDay(new Date(lastPrev.getFullYear(), lastPrev.getMonth(), 1));
        return makeRange(firstPrev, lastPrev,
          { slug: lastPrev.getFullYear() + '-' + pad2(lastPrev.getMonth() + 1),
            label: monthLong(lastPrev.getMonth()) + ' ' + lastPrev.getFullYear() });
      }
      if (currentPeriod === 'ytd') {
        return makeRange(startOfDay(new Date(y, 0, 1)), now,
          { slug: y + '-ytd', label: y + ' year-to-date' });
      }
      if (currentPeriod === 'custom' && customRange) return customRange;
      return makeRange(startOfDay(new Date(y, m, 1)), now,
        { slug: y + '-' + pad2(m + 1), label: monthLong(m) + ' ' + y });
    }
    function ymd(d) {
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }
    function formatMoney(n) {
      return 'CA$' + (Math.round((n || 0) * 100) / 100).toFixed(2);
    }
    function formatRange(from, to) {
      return formatHumanDate(from) + ' – ' + formatHumanDate(to);
    }
    function formatHumanDate(s) {
      if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return s || '';
      const p = s.split('-').map(Number);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[p[1] - 1] + ' ' + p[2] + ', ' + p[0];
    }
    function formatHumanDateTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let hr = d.getHours(); const mer = hr >= 12 ? 'pm' : 'am';
      hr = hr % 12; if (hr === 0) hr = 12;
      const min = String(d.getMinutes()).padStart(2, '0');
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + hr + ':' + min + mer;
    }

    /* ── Icons (Lucide-style line, 16px viewBox=24) ──────── */
    function svg(d) {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + d + '</svg>';
    }
    function iconHome()     { return svg('<path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/>'); }
    function iconBookings() { return svg('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'); }
    function iconHotels()   { return svg('<path d="M5 22V4a1 1 0 011-1h12a1 1 0 011 1v18"/><path d="M3 22h18"/><circle cx="9"  cy="8"  r="0.5" fill="currentColor"/><circle cx="15" cy="8"  r="0.5" fill="currentColor"/><circle cx="9"  cy="13" r="0.5" fill="currentColor"/><circle cx="15" cy="13" r="0.5" fill="currentColor"/><path d="M10 22v-4h4v4"/>'); }
    function iconInbox()    { return svg('<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>'); }
    function iconCompass()  { return svg('<circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 13.5 13.5 8.5 15.5 10.5 10.5"/>'); }
    function iconCard()     { return svg('<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>'); }
    function iconReceipt()  { return svg('<path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 1 2V2H4z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/>'); }
    function iconFile()     { return svg('<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>'); }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (m) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }

    /* ── Initial render — last thing in the script so every const
         it consumes (renderers, BOKUN_API_BASE, helpers) is past
         its TDZ by now. ─────────────────────────────────────── */
    render();
  </script>
