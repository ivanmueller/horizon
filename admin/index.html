    <button type="button" class="bk-datepop__apply" id="bkDateApply">Apply</button>

  <!-- ── Account modal (set / change password) ────────────── -->
  <div class="modal" id="acctModal" hidden>
    <form class="modal__card" id="acctForm">

  <!-- pdfkit (browser bundle) for the in-dashboard invoice generator.
       Loaded ahead of the main module so window.PDFDocument is set
       by the time bookings render. ~600KB, internal page only. -->
  <script src="https://unpkg.com/pdfkit@0.15.0/js/pdfkit.standalone.js"></script>

  <!-- Minimal blob-stream replacement. The npm `blob-stream` package
       is published as Node CommonJS and won't load via a CDN <script>.
       This polyfill implements just enough of the Writable contract
       for pdfkit's pipe loop. -->
  <script>
    window.blobStream = function () {
      var chunks = [];
      var listeners = Object.create(null);
      function emit(ev) {
        var cbs = listeners[ev]; if (!cbs) return;
        var args = [].slice.call(arguments, 1);
        cbs.slice().forEach(function (cb) {
          try { cb.apply(null, args); } catch (err) { console.error(err); }
        });
      }
      return {
        writable: true,
        write: function (chunk) { if (chunk != null) chunks.push(chunk); return true; },
        end: function (chunk) {
          if (chunk != null) chunks.push(chunk);
          setTimeout(function () { emit('finish'); }, 0);
        },
        on: function (ev, cb) { (listeners[ev] = listeners[ev] || []).push(cb); return this; },
        once: function (ev, cb) {
          var self = this;
          var wrap = function () { self.off(ev, wrap); cb.apply(null, arguments); };
          return this.on(ev, wrap);
        },
        off: function (ev, cb) {
          if (!listeners[ev]) return this;
          listeners[ev] = listeners[ev].filter(function (x) { return x !== cb; });
          return this;
        },
        removeListener: function (ev, cb) { return this.off(ev, cb); },
        emit: emit,
        toBlob: function (type) { return new Blob(chunks, { type: type || 'application/octet-stream' }); },
      };
    };
  </script>

  <!-- Shared PDF rendering module. Same code path the Node CLI uses
       so dashboard-generated PDFs match the cron output byte-for-byte. -->
  <script type="module">
    import { renderInvoice, computeAggregates }
      from '/scripts/horizon/invoice-pdf.mjs';
    window.__horizonInvoice = { renderInvoice, computeAggregates };
    document.dispatchEvent(new Event('horizon-invoice-ready'));
  </script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    /* ── Supabase client ─────────────────────────────────── */
    const SUPABASE_URL  = 'https://lxdltzrntphnkhsniwin.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });

    /* ── Auth gate ───────────────────────────────────────── */
    const sessionResp = await supabase.auth.getSession();
    const session = sessionResp.data && sessionResp.data.session;
    if (!session) {
      window.location.replace('/dashboard/login/');
      throw new Error('redirecting to /dashboard/login/');
    }

    const adminCheck = await supabase
      .from('horizon_admins')
      .select('id')
      .eq('status', 'active')
      .limit(1)
      .maybeSingle();
    if (!adminCheck.data) {
      window.location.replace('/dashboard/hotel/');
      throw new Error('redirecting to /dashboard/hotel/');
    }

    if (window.location.hash && window.location.hash.indexOf('access_token=') !== -1) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    document.body.style.visibility = 'visible';

    /* ── Sidebar nav ─────────────────────────────────────── */
    const ROUTES = [
      { id: 'home',            label: 'Home',            group: 'main',    icon: iconHome },
      { id: 'bookings',        label: 'Bookings',        group: 'main',    icon: iconBookings },
      { id: 'hotels',          label: 'Hotels',          group: 'main',    icon: iconHotels },
      { id: 'access-requests', label: 'Access Requests', group: 'main',    icon: iconInbox, badge: 'arNavBadge' },
      { id: 'tours',           label: 'Tour catalog',    group: 'main',    icon: iconCompass },
      { id: 'payments',        label: 'Payments',        group: 'finance', icon: iconCard },
      { id: 'billing',         label: 'Billing',         group: 'finance', icon: iconReceipt },
      { id: 'invoices',        label: 'Invoices',        group: 'finance', icon: iconFile },
    ];

    const navMain    = document.getElementById('navMain');
    const navFinance = document.getElementById('navFinance');
    const navItems   = {};

    for (const route of ROUTES) {
      const a = document.createElement('a');
      a.className = 'app-nav__item';
      a.href = pathFor(route.id);
      a.dataset.route = route.id;
      const badgeHtml = route.badge
        ? '<span class="app-nav__badge" id="' + route.badge + '" hidden></span>'
        : '';
      a.innerHTML =
        '<span class="app-nav__icon">' + route.icon() + '</span>' +
        '<span>' + route.label + '</span>' +
        badgeHtml;
      a.addEventListener('click', (e) => {
        // Cmd/Ctrl/middle-click → let the browser open in a new tab.
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
        e.preventDefault();
        navigate(route.id);
      });
      navItems[route.id] = a;
      (route.group === 'finance' ? navFinance : navMain).appendChild(a);
    }

    // Update the Access Requests nav badge whenever the pending count changes.
    function updateArNavBadge(count) {
      const badge = document.getElementById('arNavBadge');
      if (!badge) return;
      if (count > 0) {
        badge.textContent = count;
        badge.hidden = false;
      } else {
        badge.hidden = true;
      }
    }

    function pathFor(routeId, opts) {
      if (routeId === 'home') return '/admin/';
      if (routeId === 'hotel-detail' && opts && opts.slug) {
        return '/admin/hotels/' + opts.slug + '/';
      }
      return '/admin/' + routeId + '/';
    }

    function navigate(routeId, opts) {
      const path = pathFor(routeId, opts);
      if (window.location.pathname === path) return;
      history.pushState(null, '', path);
      render();
    }

    // currentHotelSlug is set whenever the URL is /admin/hotels/<slug>/
    // so the hotel-detail renderer can pick it up. Cleared on every
    // non-detail route.
    let currentHotelSlug = null;

    function currentRoute() {
      const path = window.location.pathname;
      const detail = path.match(/^\/admin\/hotels\/([a-z0-9-]+)\/?$/);
      if (detail) {
        currentHotelSlug = detail[1];
        return 'hotel-detail';
      }
      currentHotelSlug = null;
      const m = path.match(/^\/admin\/([a-z][a-z0-9-]*)\/?$/);
      const id = m && m[1];
      return ROUTES.find(r => r.id === id) ? id : 'home';
    }

    // One-time migration of any old hash-based URLs to path-based URLs.
    // /admin/#/bookings  →  /admin/bookings/
    const oldHash = window.location.hash.match(/^#\/([a-z][a-z0-9-]*)$/);
    if (oldHash && ROUTES.find(r => r.id === oldHash[1])) {
      history.replaceState(null, '', pathFor(oldHash[1]));
    }

    function render() {
      const id = currentRoute();
      // Drop the detail-page handle on every navigation; mountHotelDetail
      // re-captures it when the route is /admin/hotels/<slug>/.
      if (id !== 'hotel-detail') hotelDetailEls = null;
      for (const r of ROUTES) {
        // Hotel-detail is a sub-route under Hotels — keep that nav row
        // highlighted while the user is on /admin/hotels/<slug>/.
        const isActive = r.id === id || (id === 'hotel-detail' && r.id === 'hotels');
        navItems[r.id].classList.toggle('app-nav__item--active', isActive);
      }
      const renderer = renderers[id] || renderers.home;
      const out = renderer();
      const container = document.getElementById('appContent');
      if (typeof out === 'string') {
        container.innerHTML = out;
      } else {
        container.innerHTML = out.html || '';
        if (typeof out.mount === 'function') out.mount(container);
      }
      const labelRoute = ROUTES.find(r => r.id === id);
      document.title = 'Horizon admin — ' + (
        labelRoute ? labelRoute.label : (id === 'hotel-detail' ? 'Hotel' : ROUTES[0].label)
      );
    }

    // Browser back/forward buttons walk pushState entries; popstate
    // fires for those navigations and we re-render. The first render
    // call moves to the bottom of the script so everything it needs
    // (renderers, BOKUN_API_BASE, helpers) is initialised first.
    window.addEventListener('popstate', render);

    /* ── Route renderers (stubs for now; commits 2+ fill them in) ── */
    const renderers = {
      home() {
        return `
          <!-- ── Today ─────────────────────────────────────── -->
          <section class="hm-section">
            <header class="hm-section__head">
              <h1 class="hm-section__title">Today</h1>
            </header>
            <div class="hm-today">
              <div class="hm-today__main">
                <div class="hm-today__kpis">
                  <button type="button" class="hm-kpi">
                    <span class="hm-kpi__label">
                      Gross volume
                      <svg class="hm-kpi__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                    <span class="hm-kpi__value">$0.00</span>

    // Home-page widget shell — renders one of the six metric cards

    function homeWidgetHtml(title, value, prev) {
      return `
        <article class="hm-widget">

          <div class="hm-widget__sub">${escapeHtml(prev)}</div>
          <div class="hm-widget__chart">
            <svg class="hm-widget__svg" viewBox="0 0 280 110" preserveAspectRatio="none" aria-hidden="true">
              <line x1="0" y1="20" x2="280" y2="20" stroke="#ecf1f6" stroke-width="1"/>

              <line x1="0" y1="90" x2="280" y2="90" stroke="#ecf1f6" stroke-width="1"/>
              <polyline points="0,110 280,110" fill="none" stroke="var(--accent)" stroke-width="2"/>

            <div class="hm-widget__yaxis">
              <span>$1.5K</span>
              <span>$1.0K</span>
              <span>$500</span>
              <span>$0</span>

        </article>
      `;
    }

    function placeholderPage(title, sub, body) {
      return `
        <header class="page-head">
          <div>
            <h1 class="page-head__title">${escapeHtml(title)}</h1>
            <p class="page-head__sub">${escapeHtml(sub)}</p>
          </div>
        </header>
        <div class="empty">

      `;
    }

    /* ── Sidebar brand + workspace dropdown ──────────────── */
    // Brand letter — first character of the signed-in admin's email.
    // Capitalised. Falls back to "H" if the session is somehow empty
    // so the icon never renders blank.
    const __brandSrc = (session.user && session.user.email) || 'H';
    const __brandLetter = (__brandSrc.trim()[0] || 'H').toUpperCase();
    document.getElementById('appBrandLetter').textContent = __brandLetter;

    // Email/name shown inside the workspace dropdown's user row.
    document.getElementById('brandMenuUserName').textContent =
      (session.user && session.user.email) || '—';

    const brandEl    = document.getElementById('appBrand');
    const brandMenu  = document.getElementById('brandMenu');
    function brandMenuOpen() {
      brandMenu.hidden = false;
      brandEl.setAttribute('aria-expanded', 'true');
      brandEl.classList.add('app-brand--open');
    }
    function brandMenuClose() {
      brandMenu.hidden = true;
      brandEl.setAttribute('aria-expanded', 'false');
      brandEl.classList.remove('app-brand--open');
    }
    function brandMenuToggle() {
      if (brandMenu.hidden) brandMenuOpen(); else brandMenuClose();
    }
    brandEl.addEventListener('click', (e) => {
      e.stopPropagation();
      brandMenuToggle();
    });
    brandEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        brandMenuToggle();
      }
    });
    // Click outside the menu/brand → close.
    document.addEventListener('click', (e) => {

    /* ── Bookings route ──────────────────────────────────── */

    // Module-level so period choice survives Refresh + sidebar

    function noopChip() { /* shell — future-feature placeholder */ }

    /* ── Date-and-time filter popover ────────────────────── */
    const BK_DATE_OPS = ['last', 'eq', 'between', 'after', 'before'];
    function freshBkPopForm() {
      return {
        op: 'last',
        lastN: 7,
        lastUnit: 'days',
        single: null,
        betweenA: null,
        betweenB: null,
        includeTime: false,
        tz: 'MT',

    let bkCalState = { viewY: 2026, viewM: 0, target: null };

    function openBkDatePop(anchor) {
      const pop = document.getElementById('bkDatePop');

      pop.style.top  = (r.bottom + window.scrollY + 6) + 'px';

    function renderBkPopForm() {
      const op = bkDatePopForm.op;
      document.getElementById('bkDateOp').value = op;
      // Show/hide rows depending on the operator.
      document.querySelectorAll('.bk-datepop__row').forEach((row) => {
        const k = row.dataset.row;

        if (k === 'last'    && op === 'last')                          show = true;
        if (k === 'single'  && (op === 'eq' || op === 'after' || op === 'before')) show = true;
        if (k === 'between' && op === 'between')                       show = true;
        row.hidden = !show;
      });
      document.getElementById('bkDateLastN').value = bkDatePopForm.lastN || '';
      document.getElementById('bkDateUnit').value  = bkDatePopForm.lastUnit;

      document.querySelectorAll('.bk-datepop__date-btn').forEach((btn) => {

                  : btn.dataset.target === 'a'      ? 'betweenA'

    function renderBkCal() {
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('bkCalMonth').textContent =
        monthNames[bkCalState.viewM] + ' ' + bkCalState.viewY;
      const grid = document.getElementById('bkCalGrid');
      const firstDay = new Date(bkCalState.viewY, bkCalState.viewM, 1);
      const daysInMonth = new Date(bkCalState.viewY, bkCalState.viewM + 1, 0).getDate();
      const startWeekday = firstDay.getDay();
      let html = '';
      for (let i = 0; i < startWeekday; i++) html += '<span class="bk-cal__day bk-cal__day--empty"></span>';
      for (let d = 1; d <= daysInMonth; d++) {
        html += '<button type="button" class="bk-cal__day" data-day="' + d + '">' + d + '</button>';
      }
      grid.innerHTML = html;
    }

    function pickBkCalDate(day) {
      const dateStr =
        bkCalState.viewY + '-' +
        String(bkCalState.viewM + 1).padStart(2, '0') + '-' +
        String(day).padStart(2, '0');
      const t = bkCalState.target;
      if (t === 'single') bkDatePopForm.single   = dateStr;
      if (t === 'a')      bkDatePopForm.betweenA = dateStr;
      if (t === 'b')      bkDatePopForm.betweenB = dateStr;
      document.getElementById('bkCal').hidden = true;
      bkCalState.target = null;
      renderBkPopForm();
    }

    // Convert a filter object → ISO range. Returns { from, to } where
    // either bound may be undefined (e.g. "is on or after" has no `to`).
    // Returns null when the filter is null.
    function bkFilterToRange(f) {
      if (!f) return null;
      const now = new Date();
      if (f.op === 'last') {
        const n = Number(f.lastN) || 0;
        if (n <= 0) return null;
        const ms =
          f.lastUnit === 'weeks'  ? n * 7  * 86400000
        : f.lastUnit === 'months' ? n * 30 * 86400000
        : f.lastUnit === 'years'  ? n * 365 * 86400000
        : n * 86400000;
        return { from: new Date(now.getTime() - ms).toISOString(), to: now.toISOString() };
      }
      if (f.op === 'eq' && f.single) {
        return {
          from: new Date(f.single + 'T00:00:00').toISOString(),
          to:   new Date(f.single + 'T23:59:59.999').toISOString(),
        };
      }
      if (f.op === 'after' && f.single) {
        return { from: new Date(f.single + 'T00:00:00').toISOString() };
      }
      if (f.op === 'before' && f.single) {
        return { to: new Date(f.single + 'T23:59:59.999').toISOString() };
      }
      if (f.op === 'between' && f.betweenA && f.betweenB) {
        const a = f.betweenA <= f.betweenB ? f.betweenA : f.betweenB;
        const b = f.betweenA <= f.betweenB ? f.betweenB : f.betweenA;
        return {
          from: new Date(a + 'T00:00:00').toISOString(),
          to:   new Date(b + 'T23:59:59.999').toISOString(),
        };
      }
      return null;
    }

    // Short label that appears inside the chip after Apply, e.g.
    // "Last 7 days" or "May 1 – May 7, 2026" or "On May 1, 2026".
    function bkFilterChipText(f) {
      if (!f) return '';
      if (f.op === 'last')   return 'Last ' + (f.lastN || 0) + ' ' + f.lastUnit;
      if (f.op === 'eq')     return f.single ? formatHumanDate(f.single) : '';
      if (f.op === 'after')  return f.single ? 'After ' + formatHumanDate(f.single) : '';
      if (f.op === 'before') return f.single ? 'Before ' + formatHumanDate(f.single) : '';
      if (f.op === 'between' && f.betweenA && f.betweenB) {
        return formatHumanDate(f.betweenA) + ' – ' + formatHumanDate(f.betweenB);
      }
      return '';
    }

    function updateBkDateChipUi() {
      const chip = document.getElementById('bkDateChip');
      if (!chip) return;
      const text = bkFilterChipText(bkDateFilter);
      if (!text) {
        chip.classList.remove('bk-chip--active');
        chip.innerHTML = '<span class="bk-chip__plus">+</span> <span class="bk-chip__text">Date and time</span>';
        return;
      }
      chip.classList.add('bk-chip--active');
      chip.innerHTML =
        '<span class="bk-chip__close" data-clear="1" aria-label="Clear filter">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' +
        '</span>' +
        '<span class="bk-chip__text">Date and time</span>' +
        '<span class="bk-chip__sep">|</span>' +
        '<span class="bk-chip__value">' + escapeHtml(text) + '</span>';
    }

    // Wiring — set up once, survives bookings re-mounts.
    document.getElementById('bkDateOp').addEventListener('change', (e) => {
      bkDatePopForm.op = e.target.value;
      document.getElementById('bkCal').hidden = true;
      bkCalState.target = null;
      renderBkPopForm();
    });
    document.getElementById('bkDateLastN').addEventListener('input', (e) => {
      bkDatePopForm.lastN = Number(e.target.value) || 0;
    });
    document.getElementById('bkDateUnit').addEventListener('change', (e) => {
      bkDatePopForm.lastUnit = e.target.value;
    });
    document.getElementById('bkDateIncludeTime').addEventListener('change', (e) => {
      bkDatePopForm.includeTime = e.target.checked;
    });
    document.querySelectorAll('input[name="bkDateTz"]').forEach((el) => {
      el.addEventListener('change', () => {
        if (el.checked) bkDatePopForm.tz = el.value;
      });
    });
    document.querySelectorAll('.bk-datepop__date-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        bkCalState.target = btn.dataset.target;
        const now = new Date();
        bkCalState.viewY = now.getFullYear();
        bkCalState.viewM = now.getMonth();
        renderBkCal();
        const cal = document.getElementById('bkCal');
        const btnRect = btn.getBoundingClientRect();
        // Anchor the calendar so it partially overlaps the popover —
        // top edge a hair above the clicked Select-date button, left
        // edge starting at the button's left so the calendar's date
        // input continues from where the button was.
        cal.hidden = false;     // need real dimensions for fit checks
        const calW = cal.offsetWidth || 280;
        const calH = cal.offsetHeight || 320;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let top  = btnRect.top  - 8 + window.scrollY;
        let left = btnRect.left - 8 + window.scrollX;
        if (left + calW > vw + window.scrollX - 8) {
          left = vw + window.scrollX - calW - 8;
        }
        if (top + calH > vh + window.scrollY - 8) {
          top = Math.max(window.scrollY + 8, vh + window.scrollY - calH - 8);
        }
        cal.style.top  = top  + 'px';
        cal.style.left = left + 'px';
      });
    });
    document.getElementById('bkCalPrev').addEventListener('click', () => {
      bkCalState.viewM -= 1;
      if (bkCalState.viewM < 0) { bkCalState.viewM = 11; bkCalState.viewY -= 1; }
      renderBkCal();
    });
    document.getElementById('bkCalNext').addEventListener('click', () => {
      bkCalState.viewM += 1;
      if (bkCalState.viewM > 11) { bkCalState.viewM = 0; bkCalState.viewY += 1; }
      renderBkCal();
    });
    document.getElementById('bkCalGrid').addEventListener('click', (e) => {
      const t = e.target.closest('button[data-day]');
      if (!t) return;
      pickBkCalDate(Number(t.dataset.day));
    });
    document.getElementById('bkDateApply').addEventListener('click', () => {
      bkDateFilter = Object.assign({}, bkDatePopForm);
      closeBkDatePop();
      updateBkDateChipUi();
      if (bkEls) loadBookings(bkEls);
    });
    // Click-outside closes the popover. Filter chip itself + the
    // floating calendar are excluded — the calendar lives in <body>
    // as a sibling rather than a child, so we have to guard it
    // explicitly or every click on a day would close the popover.
    document.addEventListener('click', (e) => {
      const pop = document.getElementById('bkDatePop');
      if (pop.hidden) return;
      if (pop.contains(e.target)) return;
      const cal = document.getElementById('bkCal');
      if (cal && !cal.hidden && cal.contains(e.target)) return;
      const chip = document.getElementById('bkDateChip');
      if (chip && chip.contains(e.target)) return;
      closeBkDatePop();
    });
    document.addEventListener('keydown', (e) => {
      const pop = document.getElementById('bkDatePop');
      if (e.key === 'Escape' && !pop.hidden) closeBkDatePop();
    });
    // Click the X on the active chip → clear the filter.
    document.body.addEventListener('click', (e) => {
      const x = e.target.closest && e.target.closest('[data-clear="1"]');
      if (!x) return;
      e.stopPropagation();
      bkDateFilter = null;
      updateBkDateChipUi();
      if (bkEls) loadBookings(bkEls);
    });

    function showBkError(els, msg) {
      els.error.textContent = msg;
      els.error.hidden = false;
    }
    function clearBkError(els) {
      els.error.hidden = true;
      els.error.textContent = '';
    }

    // Pulls a flat list of every booking across every hotel for the
    // current period. The worker doesn't expose an "all hotels" feed
    // yet, so we ask /api/admin/summary for the hotel list and fan out
    // /api/dashboard/bookings calls in parallel, then merge + sort.
    function loadBookings(els) {
      // bkDateFilter null → no constraint; we still need a range for
      // /api/admin/summary which requires from/to, so default to a
      // very wide window (year 2000 → +30 years from now).
      const r = bkFilterToRange(bkDateFilter);
      const summaryFrom = r && r.from ? r.from : '2000-01-01T00:00:00.000Z';
      const summaryTo   = r && r.to   ? r.to   : new Date(Date.now() + 30 * 365 * 86400000).toISOString();

      clearBkError(els);
      els.body.innerHTML = '<tr><td colspan="9" class="bk-empty"><div class="bk-empty__title">Loading…</div></td></tr>';
      els.footer.textContent = '— items';

      fetch(BOKUN_API_BASE + '/api/admin/summary' +
            '?from=' + encodeURIComponent(summaryFrom) +
            '&to='   + encodeURIComponent(summaryTo), {
        headers: { Authorization: 'Bearer ' + session.access_token },
        cache: 'no-store',
      })
        .then(res => {
          if (res.status === 401) {
            window.location.replace('/dashboard/login/');
            throw new Error('unauthorized');
          }
          if (res.status === 403) {
            showBkError(els, 'Your account isn’t authorised for the Horizon admin dashboard.');
            throw new Error('forbidden');
          }
          return res.json().then(b => ({ ok: res.ok, body: b }));
        })
        .then(res => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          const hotels = res.body.hotels || [];
          hotelByCode = {};
          hotels.forEach(h => { hotelByCode[h.code] = h; });

          if (!hotels.length) {
            bkRecords = [];
            renderStatcardCounts(els, []);
            renderBookingRows(els);
            return;
          }

          // For per-hotel bookings calls, only attach from/to when an
          // active filter actually has them (the worker treats both
          // params as optional and returns every row when omitted).
          let qs = '';
          if (r && r.from) qs += '&from=' + encodeURIComponent(r.from);
          if (r && r.to)   qs += '&to='   + encodeURIComponent(r.to);
          return Promise.all(hotels.map(h =>
            fetch(BOKUN_API_BASE + '/api/dashboard/bookings?hotel=' + encodeURIComponent(h.code) + qs, {
              cache: 'no-store',
              headers: { Authorization: 'Bearer ' + session.access_token },
            })
              .then(rr => rr.json().then(b => ({ ok: rr.ok, body: b, hotel: h })))
          )).then(results => {
            const merged = [];
            results.forEach(({ ok, body, hotel }) => {
              if (!ok) return;
              (body.records || []).forEach(rec => {
                merged.push(Object.assign({ _hotel: hotel }, rec));
              });
            });
            // Newest first.
            merged.sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
            bkRecords = merged;
            renderStatcardCounts(els, merged);
            renderBookingRows(els);
          });
        })
        .catch(err => {
          if (err && (err.message === 'unauthorized' || err.message === 'forbidden')) return;
          console.error('admin bookings fetch failed', err);
          showBkError(els, 'Could not load bookings: ' + (err && err.message || 'unknown error'));
          els.body.innerHTML = '<tr><td colspan="9" class="bk-empty"><div class="bk-empty__title">Could not load bookings</div><p class="bk-empty__body">Try again in a moment.</p></td></tr>';
        });
    }

    function renderStatcardCounts(els, records) {
      const counts = { all: records.length, confirmed: 0, refunded: 0, cancelled: 0, pending_refund: 0 };
      records.forEach(r => {
        const s = r.status || 'confirmed';
        if (counts[s] != null) counts[s] += 1;
      });
      els.statcards.querySelectorAll('[data-count]').forEach(node => {
        const k = node.dataset.count;
        node.textContent = String(counts[k] != null ? counts[k] : 0);
      });
    }

    function renderBookingRows(els) {
      const filtered = bkStatusFilter === 'all'
        ? bkRecords
        : bkRecords.filter(r => (r.status || 'confirmed') === bkStatusFilter);

      if (els.checkAll) els.checkAll.checked = false;

      if (!filtered.length) {
        els.body.innerHTML =
          '<tr><td colspan="9" class="bk-empty">' +
            '<div class="bk-empty__title">No bookings in this period</div>' +
            '<p class="bk-empty__body">Once partners start sending traffic, confirmed bookings will appear here.</p>' +
          '</td></tr>';
        els.footer.textContent = '0 items';
        return;
      }

      const rows = filtered.map(r => {
        const status   = r.status || 'confirmed';
        const amount   = r.amount != null ? Number(r.amount).toFixed(2) : '—';
        const currency = (r.currency || 'CAD').toUpperCase();
        const hotel    = r._hotel || {};
        const desc     = 'HGCT';
        const customer = r.lead_email || r.lead_name || '—';
        const dateStr  = formatHumanDateTime(r.created_at);
        const refunded = (status === 'refunded' || status === 'pending_refund')
          ? formatHumanDateTime(r.updated_at)
          : '—';

        return (
          '<tr>' +
            '<td class="bk-table__check"><input type="checkbox" data-bk-row="' + escapeHtml(r.id) + '" aria-label="Select booking"></td>' +
            '<td>' +
              '<span class="bk-table__amount">' + (amount === '—' ? '—' : '$' + escapeHtml(amount)) + '</span>' +
              '<span class="bk-table__currency">' + escapeHtml(currency) + '</span>' +
              renderBkPill(status) +
            '</td>' +
            '<td>' + escapeHtml(hotel.name || '—') + '</td>' +
            '<td class="bk-table__desc">' + escapeHtml(desc) + '</td>' +
            '<td>' + escapeHtml(customer) + '</td>' +
            '<td>' + escapeHtml(dateStr) + '</td>' +
            '<td class="bk-table__muted">' + escapeHtml(refunded) + '</td>' +
            '<td class="bk-table__muted">—</td>' +
            '<td class="bk-table__kebab"><button type="button" class="bk-kebab" aria-label="Row actions">⋯</button></td>' +
          '</tr>'
        );
      }).join('');

      els.body.innerHTML = rows;
      els.footer.textContent = filtered.length + (filtered.length === 1 ? ' item' : ' items');
    }

    function renderBkPill(status) {
      const refresh = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>';
      const check   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const cross   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      if (status === 'confirmed')      return '<span class="bk-pill bk-pill--ok">Confirmed ' + check + '</span>';
      if (status === 'refunded')       return '<span class="bk-pill bk-pill--neutral">Refunded ' + refresh + '</span>';
      if (status === 'cancelled')      return '<span class="bk-pill bk-pill--neutral">Cancelled ' + cross + '</span>';
      if (status === 'pending_refund') return '<span class="bk-pill bk-pill--warn">Pending refund ' + refresh + '</span>';
      return '<span class="bk-pill bk-pill--neutral">' + escapeHtml(status) + '</span>';
    }

    /* ── Delegated handlers — survive route re-renders ───── */
    document.body.addEventListener('change', (e) => {
      const sel = e.target;
      if (!sel || !sel.classList || !sel.classList.contains('status')) return;
      onStatusChange(sel);
    });

    document.body.addEventListener('click', (e) => {
      const btn = e.target && e.target.closest && e.target.closest('.invoice-btn');
      if (!btn) return;
      e.stopPropagation();
      e.preventDefault();
      onInvoiceClick(btn);
    });

    function onStatusChange(sel) {
      const id = sel.dataset.id;
      const prev = sel.dataset.prev;
      const next = sel.value;
      if (next === prev) return;
      if (!window.confirm('Change booking status from "' + prev + '" to "' + next +
                          '"? Totals on this page will be stale until you hit Refresh.')) {
        sel.value = prev;
        return;
      }
      sel.disabled = true;
      fetch(BOKUN_API_BASE + '/api/admin/bookings/' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ status: next }),
      })
        .then(r => {
          if (r.status === 401) {
            window.location.replace('/dashboard/login/');
            throw new Error('unauthorized');
          }
          return r.json().then(b => ({ ok: r.ok, body: b }));
        })
        .then(res => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'update_failed');
          sel.dataset.prev = next;
          sel.className = 'status status--' + next;
          sel.disabled = false;
        })
        .catch(err => {
          if (err && err.message === 'unauthorized') return;
          console.error('status update failed', err);
          window.alert('Could not update status: ' + (err && err.message || 'unknown error'));
          sel.value = prev;
          sel.disabled = false;
        });
    }

    function onInvoiceClick(btn) {
      const code = btn.dataset.hotel;
      const hotel = hotelByCode[code];
      if (!hotel) return window.alert('Hotel not loaded — refresh and try again.');
      const range = rangeForPeriod();
      if (!range || !range.slug) return window.alert('Pick a period first.');

      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Generating…';

      generateInvoice(hotel, range)
        .catch(err => {
          console.error('invoice generation failed', err);
          window.alert('Could not generate invoice: ' + (err && err.message || 'unknown error'));
        })
        .then(() => {
          btn.disabled = false;
          btn.textContent = orig;
        });
    }

    function whenInvoiceReady() {
      if (window.__horizonInvoice) return Promise.resolve();
      return new Promise(resolve => {
        document.addEventListener('horizon-invoice-ready', function onReady() {
          document.removeEventListener('horizon-invoice-ready', onReady);
          resolve();
        });
        setTimeout(resolve, 8000);
      });
    }

    function generateInvoice(hotel, range) {
      return whenInvoiceReady().then(() => {
        if (!window.__horizonInvoice) throw new Error('Invoice module did not load — check console for /scripts/horizon/invoice-pdf.mjs errors.');
        if (!window.PDFDocument)      throw new Error('pdfkit did not load — unpkg may be blocked.');
        if (!window.blobStream)       throw new Error('blob-stream polyfill missing.');

        const qs = '?hotel=' + encodeURIComponent(hotel.code) +
                   '&from=' + encodeURIComponent(range.from) +
                   '&to='   + encodeURIComponent(range.to);

        return fetch(BOKUN_API_BASE + '/api/dashboard/bookings' + qs, {
          cache: 'no-store',
          headers: { Authorization: 'Bearer ' + session.access_token },
        })
          .then(r => r.json().then(b => ({ ok: r.ok, body: b })))
          .then(res => {
            if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
            const records = (res.body.records || []).filter(r => r.status === 'confirmed');
            if (!records.length) throw new Error('No confirmed bookings in this period');

            const commissionPct = (res.body.hotel && Number(res.body.hotel.commission_pct)) || 0;
            const name = (res.body.hotel && res.body.hotel.name) || hotel.name;
            const aggregates = window.__horizonInvoice.computeAggregates(records, commissionPct);

            const doc = new window.PDFDocument({
              size: 'A4', margin: 50, bufferPages: true,
              info: {
                Title:   'Horizon commission ' + range.label + ' — ' + name,
                Author:  'Horizon Tours',
                Subject: 'Commission statement',
              },
            });
            const stream = doc.pipe(window.blobStream());

            window.__horizonInvoice.renderInvoice(doc, {
              hotel:     { code: hotel.code, name: name, commission_pct: commissionPct },
              range:     range,
              totals:    aggregates.totals,
              kickbacks: aggregates.kickbacks,
              records:   records,
            });
            doc.end();

            return new Promise((resolve, reject) => {
              stream.on('finish', () => {
                try {
                  const blob = stream.toBlob('application/pdf');
                  showPdfPreview(blob, hotel.code + '_' + range.slug + '.pdf', name, range.label);
                  resolve();
                } catch (err) { reject(err); }
              });
              stream.on('error', reject);
            });
          });
      });
    }

    /* ── PDF preview modal ───────────────────────────────── */
    let currentPdfPreview = null;
    const pdfModal    = document.getElementById('pdfModal');
    const pdfFrame    = document.getElementById('pdfFrame');
    const pdfTitle    = document.getElementById('pdfTitle');
    const pdfSub      = document.getElementById('pdfSub');

    function showPdfPreview(blob, filename, hotelName, periodLabel) {
      if (currentPdfPreview && currentPdfPreview.blobUrl) URL.revokeObjectURL(currentPdfPreview.blobUrl);
      const blobUrl = URL.createObjectURL(blob);
      currentPdfPreview = { blobUrl, filename };
      pdfTitle.textContent = hotelName;
      pdfSub.textContent   = periodLabel;
      pdfFrame.src         = blobUrl;
      pdfModal.hidden      = false;
    }
    function hidePdfPreview() {
      pdfModal.hidden = true;
      pdfFrame.src    = 'about:blank';
      if (currentPdfPreview && currentPdfPreview.blobUrl) URL.revokeObjectURL(currentPdfPreview.blobUrl);
      currentPdfPreview = null;
    }
    document.getElementById('pdfClose').addEventListener('click', hidePdfPreview);
    document.getElementById('pdfCancel').addEventListener('click', hidePdfPreview);
    document.getElementById('pdfDownload').addEventListener('click', () => {
      if (!currentPdfPreview) return;
      const a = document.createElement('a');
      a.href = currentPdfPreview.blobUrl;
      a.download = currentPdfPreview.filename;
      document.body.appendChild(a); a.click(); a.remove();
    });
    pdfModal.addEventListener('click', (e) => { if (e.target === pdfModal) hidePdfPreview(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !pdfModal.hidden) hidePdfPreview();
    });

    /* ── Hotels route ────────────────────────────────────── */
    let hotelsCache  = [];      // last list response, indexed by index
    let hotelsEls    = null;    // captured in mountHotels so handlers can reload
    let hotelsFilter = 'all';   // active stat-card filter

    function mountHotels(container) {
      hotelsEls = {
        body:       container.querySelector('#hotelsBody'),
        error:      container.querySelector('#hotelsError'),
        notice:     container.querySelector('#hotelsNotice'),
        add:        container.querySelector('#hotelsAdd'),
        statcards:  container.querySelector('#hotelsStatcards'),
        chips:      container.querySelectorAll('.bk-chip'),
        export:     container.querySelector('#hotelsExport'),
        editCols:   container.querySelector('#hotelsEditCols'),
        footer:     container.querySelector('#hotelsFooter'),
        checkAll:   container.querySelector('#hotelsCheckAll'),
      };

      // Reset filter to "All" on every mount so the page opens neutral.
      hotelsFilter = 'all';
      hotelsEls.statcards.querySelectorAll('.bk-statcard').forEach(card => {
        card.classList.toggle('bk-statcard--active', card.dataset.filter === 'all');
      });

      // Stat-card click → filter rows in-memory.
      hotelsEls.statcards.addEventListener('click', (e) => {
        const card = e.target.closest('.bk-statcard');
        if (!card) return;
        hotelsFilter = card.dataset.filter || 'all';
        hotelsEls.statcards.querySelectorAll('.bk-statcard').forEach(c => {
          c.classList.toggle('bk-statcard--active', c === card);
        });
        renderHotelsTable(hotelsEls.body, hotelsCache);
      });

      // Filter chips, Export, Edit columns, Analyze are shells for now.
      hotelsEls.chips.forEach(c => c.addEventListener('click', noopChip));
      hotelsEls.export.addEventListener('click',   noopChip);
      hotelsEls.editCols.addEventListener('click', noopChip);

      // Header "select all" — toggles every visible row checkbox.
      hotelsEls.checkAll.addEventListener('change', () => {
        hotelsEls.body.querySelectorAll('input[type="checkbox"][data-hotels-row]')
          .forEach(cb => { cb.checked = hotelsEls.checkAll.checked; });
      });

      // "+ Add hotel" still opens the create drawer (drawer code is
      // unchanged below). Clicking a row navigates to the new full
      // hotel-detail page at /admin/hotels/<slug>/. The detail drawer
      // (openHotelDrawer) stays defined so per-tab CRUD on the new
      // page can call into the same flows once those tabs are wired.
      hotelsEls.add.addEventListener('click', openHotelCreateDrawer);
      hotelsEls.body.addEventListener('click', (e) => {
        // Ignore clicks on the row checkbox + kebab.
        if (e.target.closest('input,button.bk-kebab')) return;
        const tr = e.target.closest('tr[data-hotel-idx]');
        if (!tr) return;
        const hotel = hotelsCache[Number(tr.dataset.hotelIdx)];
        if (!hotel) return;
        navigate('hotel-detail', { slug: hotel.code });
      });

      loadHotels(hotelsEls);
    }

    /* ── Tour catalog route ──────────────────────────────── */
    // Pure shell for now: stat cards + sub-tabs flip visually, every
    // chip + toolbar action is a no-op until the data layer ships.
    function mountTours(container) {
      const tabs      = container.querySelectorAll('.bk-tabs__btn');
      const statcards = container.querySelector('#toursStatcards');

    function openTourCreate() {

    // "n" anywhere on /admin/tours/ opens the create flow,

    /* ── Invoices route ──────────────────────────────────── */
    // Pure shell for now: stat cards filter visually, every other

    function mountInvoices(container) {

    // Placeholder for the invoice-creation flow. The "n" keyboard

    function openInvoiceCreate() {
      // Shell — alert keeps the affordance visible until wired.
      window.alert('Create invoice flow lands in the next sprint.');
    }

    // "n" anywhere on /admin/invoices/ opens the create flow,
    // mirroring the same shortcut on /admin/hotels/.
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'n' && e.key !== 'N') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (currentRoute() !== 'invoices') return;

    /* ── Access Requests route ───────────────────────────── */
    let arRequests   = [];     // full list fetched from the worker
    let arTabFilter  = 'all';  // 'all' | 'pending' | 'approved' | 'denied'
    let arContainer  = null;

    function mountAccessRequests(container) {
      arContainer = container;
      const tabs  = container.querySelector('#arTabs');

      tabs.addEventListener('click', (e) => {
        const btn = e.target.closest('.bk-tabs__btn');
        if (!btn) return;
        tabs.querySelectorAll('.bk-tabs__btn').forEach((b) => {
          b.classList.toggle('bk-tabs__btn--active', b === btn);
        });
        arTabFilter = btn.dataset.tab || 'all';
        renderArTable(container);
      });

      // Approve / deny via delegated click on the table body.
      container.querySelector('#arBody').addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-ar-action]');
        if (!btn) return;
        const id     = btn.dataset.arId;
        const action = btn.dataset.arAction; // 'approved' | 'denied'
        btn.disabled = true;
        btn.textContent = action === 'approved' ? 'Approving…' : 'Denying…';
        try {
          const res = await fetch(
            BOKUN_API_BASE + '/api/admin/access-requests/' + encodeURIComponent(id),
            {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + session.access_token,
              },
              body: JSON.stringify({ status: action }),
            },
          );
          if (!res.ok) throw new Error('HTTP ' + res.status);
          // Update the local row so re-render is instant, no refetch.
          const idx = arRequests.findIndex((r) => r.id === id);
          if (idx !== -1) {
            arRequests[idx] = { ...arRequests[idx], status: action, reviewed_at: new Date().toISOString() };
          }
          // Recount pending and refresh the nav badge.
          updateArNavBadge(arRequests.filter((r) => r.status === 'pending').length);
          renderArTable(container);
          arFlash(container, action === 'approved' ? 'Request approved.' : 'Request denied.');
        } catch (err) {
          btn.disabled = false;
          btn.textContent = action === 'approved' ? 'Approve' : 'Deny';
          arFlash(container, 'Action failed: ' + (err.message || 'unknown error'), true);
        }
      });

      loadArRequests(container);
    }

    function loadArRequests(container) {
      const body = container.querySelector('#arBody');
      body.innerHTML = '<tr><td colspan="7" class="bk-empty"><div class="bk-empty__title">Loading…</div></td></tr>';
      fetch(BOKUN_API_BASE + '/api/admin/access-requests', {
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => r.json())
        .then((data) => {
          arRequests = data.requests || [];
          if (data.pending_count !== null) updateArNavBadge(data.pending_count);
          renderArTable(container);
        })
        .catch(() => {
          body.innerHTML = '<tr><td colspan="7" class="bk-empty"><div class="bk-empty__title">Failed to load requests.</div></td></tr>';
        });
    }

    function renderArTable(container) {
      const body   = container.querySelector('#arBody');
      const footer = container.querySelector('#arFooter');

      const visible = arTabFilter === 'all'
        ? arRequests
        : arRequests.filter((r) => r.status === arTabFilter);

      footer.textContent = visible.length + ' item' + (visible.length === 1 ? '' : 's');

      if (!visible.length) {
        const label = arTabFilter === 'all' ? 'No access requests yet.' : 'No ' + arTabFilter + ' requests.';
        body.innerHTML = '<tr><td colspan="7" class="bk-empty"><div class="bk-empty__title">' + escapeHtml(label) + '</div></td></tr>';
        return;
      }

      body.innerHTML = visible.map((r) => {
        const isPending = r.status === 'pending';
        const dateStr   = r.created_at ? new Date(r.created_at).toLocaleDateString('en-CA') : '—';
        const actions   = isPending
          ? `<button class="btn btn--sm btn--primary" data-ar-action="approved" data-ar-id="${escapeHtml(r.id)}">Approve</button>
             <button class="btn btn--sm btn--danger"  data-ar-action="denied"   data-ar-id="${escapeHtml(r.id)}" style="margin-left:6px">Deny</button>`
          : '';
        return `<tr>
          <td>${escapeHtml(r.email)}</td>
          <td>${escapeHtml(r.name)}</td>
          <td>${escapeHtml(r.property_requested || '—')}</td>
          <td style="max-width:200px;white-space:normal">${escapeHtml(r.reason || '—')}</td>
          <td>${arStatusBadge(r.status)}</td>
          <td>${dateStr}</td>
          <td class="bk-table__kebab">${actions}</td>
        </tr>`;
      }).join('');
    }

    function arStatusBadge(status) {
      if (status === 'pending')  return '<span class="badge badge--warn">Pending</span>';
      if (status === 'approved') return '<span class="badge badge--ok">Approved</span>';
      if (status === 'denied')   return '<span class="badge badge--bad">Denied</span>';
      return '<span class="badge badge--neutral">' + escapeHtml(status) + '</span>';
    }

    function arFlash(container, msg, isError) {
      const el = container.querySelector('#arNotice');
      if (!el) return;
      el.textContent = msg;
      el.className = 'hotels-notice' + (isError ? ' hotels-notice--error' : '');
      el.hidden = false;
      setTimeout(() => { el.hidden = true; }, 4000);
    }

    /* ── Hotel detail page (full route, /admin/hotels/<slug>/) ──── */
    // The detail page is a render of the same hotel objects used by the
    // list + the drawer (single source of truth in `hotelsCache`). The
    // header [Add Employee] button + the [+] in the Employees section
    // both open the existing pop-out drawer (openHotelDrawer) so the
    // employee management form, validation, and CRUD endpoints stay in
    // one place. After any drawer-driven change, the detail page is
    // re-rendered from the freshly-reloaded cache via
    // refreshHotelDetailFromCache().
    let hotelDetailEls = null; // captured in mountHotelDetail; null off-route

    function mountHotelDetail(container) {
      const slug = currentHotelSlug;
      const backEl = container.querySelector('#hotelDetailBack');

      hotelDetailEls = {
        container,
        slug,
        title:        container.querySelector('#hotelDetailTitle'),
        contact:      container.querySelector('#hotelDetailContact'),
        meta:         container.querySelector('#hotelDetailMeta'),
        empBody:      container.querySelector('#hdEmployeesBody'),
        linksBody:    container.querySelector('#hdLinksBody'),
        details:      container.querySelector('#hdDetails'),
        insights:     container.querySelector('#hdInsights'),
        financial:    container.querySelector('#hdFinancialBody'),
        notes:        container.querySelector('#hdNotes'),
        notesMeta:    container.querySelector('#hdNotesMeta'),
        addBtnHead:   container.querySelector('#hdAddEmployee'),
        addBtnSection:container.querySelector('#hdEmpAdd'),
      };

      // Back link → SPA navigate (no full reload). Cmd/Ctrl-click still
      // opens in a new tab via the native href.
      backEl.addEventListener('click', (e) => {
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
        e.preventDefault();
        navigate('hotels');
      });

      // One-click copy on any element with [data-copy]. The button can
      // have a [data-detail-text] child (used by the Hotel ID, Stripe
      // ID, and Master Referral URL widgets so the inline copy icon
      // survives a label swap) — feedback writes to the inner span
      // when present, falling back to the button's textContent.
      container.addEventListener('click', (e) => {
        const t = e.target.closest('[data-copy]');
        if (!t) return;
        const val = t.dataset.copy || t.textContent;
        if (!val || val === '—') return;
        navigator.clipboard && navigator.clipboard.writeText(val).catch(() => {});
        const labelEl = t.querySelector('[data-detail-text]') || t;
        const prev = labelEl.textContent;
        labelEl.textContent = 'Copied';
        setTimeout(() => { labelEl.textContent = prev; }, 1100);
      });

      if (!slug) {
        hotelDetailEls.title.textContent = 'Hotel';
        return;
      }

      // Cache hit → render immediately. Otherwise fetch first.
      const cached = hotelsCache.find((h) => h.code === slug);
      if (cached) { renderHotelDetail(cached); return; }

      fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        cache: 'no-store',
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => {
          if (r.status === 401) { window.location.replace('/dashboard/login/'); throw new Error('unauthorized'); }
          return r.json().then((b) => ({ ok: r.ok, body: b }));
        })
        .then((res) => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          hotelsCache = res.body.hotels || [];
          const found = hotelsCache.find((h) => h.code === slug);
          if (found) renderHotelDetail(found);
          else hotelDetailEls.title.textContent = 'Hotel not found';
        })
        .catch((err) => {
          if (err && err.message === 'unauthorized') return;
          console.error('hotel detail fetch failed', err);
          hotelDetailEls.title.textContent = 'Could not load hotel';
        });
    }

    // Re-render detail page using the freshest entry in hotelsCache.
    // Safe to call from anywhere — no-ops when the user isn't on the
    // detail route or the hotel is no longer in the cache.
    // PATCH only the notes field for a hotel. Used by the sidebar
    // "Internal notes" auto-save. Updates the textarea's last-saved
    // marker on success and stamps the meta line. Failure rolls back
    // the marker so the next blur will retry rather than skip.
    function saveHotelNotes(hotelId, value, metaEl, taEl) {
      if (!hotelId) return;
      const body = { notes: value ? value : null };
      if (taEl) taEl.classList.add('hd-notes--saving');
      fetch(BOKUN_API_BASE + '/api/admin/hotels/' + encodeURIComponent(hotelId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => {
          if (r.status === 401) { window.location.replace('/dashboard/login/'); throw new Error('unauthorized'); }
          return r.json().then((b) => ({ ok: r.ok, body: b }));
        })
        .then((res) => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'save_failed');
          if (taEl) taEl.dataset.lastSaved = value;
          if (metaEl) {
            metaEl.textContent = 'Last edited ' + formatHumanDateTime(new Date().toISOString());
            metaEl.hidden = !value;
          }
          // Keep the in-memory cache + drawer in sync.
          reloadHotelsCacheAndRefresh();
        })
        .catch((err) => {
          if (err && err.message === 'unauthorized') return;
          console.error('notes save failed', err);
          if (metaEl) {
            metaEl.textContent = 'Couldn\'t save — try again';
            metaEl.hidden = false;
          }
        })
        .finally(() => {
          if (taEl) taEl.classList.remove('hd-notes--saving');
        });
    }

    function refreshHotelDetailFromCache() {
      if (!hotelDetailEls || !hotelDetailEls.slug) return;
      const hotel = hotelsCache.find((h) => h.code === hotelDetailEls.slug);
      if (!hotel) return;
      renderHotelDetail(hotel);
    }

    // Country lookup is location-derived for now (Banff/Canmore → CA),
    // and falls back to h.country when present. Hard-coded mapping is
    // fine until we onboard hotels outside Alberta — see the prompt
    // note about driving everything from the hotel record going
    // forward.
    function hotelCountry(h) {
      if (h.country) return String(h.country).toUpperCase();
      const loc = (h.location || '').toLowerCase();
      if (loc === 'banff' || loc === 'canmore') return 'CA';
      return '';
    }
    function flagFor(country) {
      if (!country || country.length !== 2) return '';
      const A = 0x41, base = 0x1F1E6;
      const cps = country.toUpperCase().split('').map((c) => base + (c.charCodeAt(0) - A));
      return String.fromCodePoint.apply(null, cps);
    }
    // Region/province appended to the location label per the spec
    // ("Banff, AB"). Pulled from h.region when set; AB is a sensible
    // default for Banff/Canmore today.
    function hotelRegion(h) {
      if (h.region) return h.region;
      const loc = (h.location || '').toLowerCase();
      if (loc === 'banff' || loc === 'canmore') return 'AB';
      return '';
    }
    // Currency ISO code drives every dollar figure on the page so
    // hotels paid in USD/EUR/GBP don't show stale "CA$" prefixes once
    // we onboard outside Canada.
    function hotelCurrency(h) {
      return (h.currency ? String(h.currency) : 'CAD').toUpperCase();
    }
    function formatHotelMoney(n, currency) {
      const code = (currency || 'CAD').toUpperCase();
      const value = (Math.round((n || 0) * 100) / 100).toFixed(2);
      // Code-prefixed format ("CAD 12.50") — unambiguous, currency
      // agnostic, no "CA$" / "$" guessing across locales.
      return code + ' ' + value;
    }

    // Activity-row pattern for the "Recent activity" feed. Called by
    // the future renderer once the activity stream is wired; today
    // the section keeps its dashed empty state. Type controls the
    // icon color (booking=accent, email=blue, payout=ok-green,
    // other=gray); meta + time are optional.
    function renderActivityRow(item) {
      const type = item.type || 'other';
      const icon = item.icon || '';
      return (
        '<li class="hd-activity__item">' +
          '<span class="hd-activity__icon hd-activity__icon--' + escapeHtml(type) + '" aria-hidden="true">' + icon + '</span>' +
          '<div class="hd-activity__text">' +
            '<div class="hd-activity__title">' + (item.title || '') + '</div>' +
            (item.meta ? '<div class="hd-activity__meta">' + item.meta + '</div>' : '') +
          '</div>' +
          '<time class="hd-activity__time">' + escapeHtml(item.time || '') + '</time>' +
        '</li>'
      );
    }

    function renderHotelDetail(h) {
      const els = hotelDetailEls;
      if (!els) return;

      // Header — name + contact subtitle. Two states, both rendered in
      // quiet secondary text (no accent color — accent on an empty
      // state reads as an error). With a contact email: plain mono
      // address + a tiny copy icon. Without: "Add primary contact"
      // with a small inline + icon, no link styling.
      els.title.textContent = h.name || 'Hotel';
      const contactEmail = h.contact_email || h.email || '';
      const plusIcon =
        '<svg class="hd-head__plus" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">' +
          '<line x1="8" y1="3.5" x2="8" y2="12.5"/><line x1="3.5" y1="8" x2="12.5" y2="8"/>' +
        '</svg>';
      const copyIcon16 =
        '<svg class="hd-copy__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
          '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
        '</svg>';
      els.contact.hidden = false;
      if (contactEmail) {
        els.contact.innerHTML =
          '<button type="button" class="hd-head__contact hd-copy" data-copy="' + escapeHtml(contactEmail) + '" title="Copy email">' +
            '<span data-detail-text>' + escapeHtml(contactEmail) + '</span>' + copyIcon16 +
          '</button>';
      } else {
        els.contact.innerHTML =
          '<button type="button" class="hd-head__contact hd-head__contact--add" id="hdAddContact">' +
            plusIcon + '<span>Add primary contact</span>' +
          '</button>';
      }

      // Metadata strip
      const metaSet = (key, html) => {
        const node = els.meta.querySelector('[data-meta="' + key + '"]');
        if (node) node.innerHTML = html;
      };
      metaSet('onboarded', escapeHtml(formatHumanDate((h.created_at || '').slice(0, 10)) || '—'));
      metaSet('status',    hotelStatusPill(h.status));
      const tierBits = [];
      if (h.commission_pct != null)    tierBits.push(h.commission_pct + '%');
      if (h.kickback_pool_pct != null) tierBits.push(h.kickback_pool_pct + '%');
      const tierLabel = (h.type === 'kickback' ? 'Kickback' : h.type === 'pool' ? 'Pool' : '—')
                      + (tierBits.length ? ' · ' + tierBits.join(' / ') : '');
      metaSet('tier', escapeHtml(tierLabel));
      const currency = hotelCurrency(h);
      const flag = flagFor(hotelCountry(h));
      const region = hotelRegion(h);
      const locTextRaw = h.location || '—';
      const locTail    = region ? ', ' + region : '';
      const locInner   = (flag ? '<span class="hd-flag" aria-hidden="true">' + flag + '</span> ' : '')
                       + escapeHtml(locTextRaw + locTail);
      metaSet('location', locInner);

      // Employees & Referral Codes — primary working section. Reads
      // straight from h.staff (same source as the drawer) so the two
      // views can never diverge. Commission column is split into
      // "Rate" (effective % with an "override" tag if the employee's
      // rate differs from the hotel default) and "Earned" (lifetime
      // payout in the hotel's currency).
      const staff = (h.staff || []).filter((s) => s.status !== 'revoked');
      const hotelDefaultPct = (h.commission_pct != null && h.kickback_pool_pct == null)
        ? Number(h.commission_pct)
        : (h.kickback_pool_pct != null ? Number(h.kickback_pool_pct) : null);
      if (!staff.length) {
        els.empBody.innerHTML = '<div class="hd-empty">No employees yet.</div>';
      } else {
        const rows = staff.map((s) => {
          const initials = (s.name || '?')
            .split(/\s+/).filter(Boolean).slice(0, 2)
            .map((w) => w[0].toUpperCase()).join('') || '?';
          const statusPill = s.status === 'active'
            ? '<span class="bk-pill bk-pill--ok">Active</span>'
            : '<span class="bk-pill bk-pill--neutral">' + escapeHtml(s.status || '—') + '</span>';
          const rate = (s.kickback_pct != null) ? Number(s.kickback_pct) : null;
          const isOverride = rate != null && hotelDefaultPct != null && rate !== hotelDefaultPct;
          const rateCell = (rate != null ? rate + '%' : '—')
            + (isOverride ? ' <span class="hd-override-dot" title="Overrides hotel default" aria-label="Overrides hotel default"></span>' : '');
          const earned = formatHotelMoney(s.lifetime_commission || 0, currency);
          const refCode = s.tracking_code || s.code || '';
          return (
            '<tr data-staff-row="' + escapeHtml(s.id) + '">' +
              '<td class="hd-emp">' +
                '<span class="hd-avatar" aria-hidden="true">' + escapeHtml(initials) + '</span>' +
                '<span class="hd-emp__name">' + escapeHtml(s.name || '—') + '</span>' +
                (s.role ? '<span class="hd-emp__role">' + escapeHtml(s.role) + '</span>' : '') +
              '</td>' +
              '<td><button type="button" class="hd-copy mono" data-copy="' + escapeHtml(refCode) + '" title="Copy referral code">' +
                  '<span>' + escapeHtml(refCode || '—') + '</span>' +
                  '<svg class="hd-copy__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
              '</button></td>' +
              '<td>' + statusPill + '</td>' +
              '<td class="num hd-num">0</td>' +
              '<td class="num hd-num">' + rateCell + '</td>' +
              '<td class="num hd-num">' + escapeHtml(earned) + '</td>' +
              '<td class="muted">—</td>' +
              '<td class="bk-table__kebab">' +
                '<button type="button" class="bk-kebab" data-staff-edit-id="' + escapeHtml(s.id) + '" aria-label="Edit ' + escapeHtml(s.name || '') + '">⋯</button>' +
              '</td>' +
            '</tr>'
          );
        }).join('');
        els.empBody.innerHTML =
          '<div class="bk-table-wrap"><div class="bk-table-scroll">' +
            '<table class="bk-table">' +
              '<thead><tr>' +
                '<th>Employee</th><th>Referral code</th><th>Status</th>' +
                '<th class="num">Bookings</th><th class="num">Rate</th><th class="num">Commission</th>' +
                '<th>Last booking</th><th></th>' +
              '</tr></thead>' +
              '<tbody>' + rows + '</tbody>' +
            '</table>' +
          '</div></div>';
      }

      // Referral Links — master hotel link + one row per active
      // employee. Code is the most important field (it's what the QR
      // encodes) so it gets a fixed-width column and stays pinned;
      // the URL column truncates with ellipsis and a hover title for
      // the full string.
      const baseUrl = window.location.origin;
      const masterLink = baseUrl + '/partners/' + (h.code || '') + '/';
      const linkRows = [
        { code: h.default_tracking_code || h.code, url: masterLink, label: 'Master', mono: true },
      ].concat(
        staff.filter((s) => s.status === 'active').map((s) => ({
          code: s.tracking_code || s.code,
          url: masterLink + '?ref=' + encodeURIComponent(s.tracking_code || s.code || ''),
          label: s.name,
          mono: true,
        }))
      );
      const copyIconSvg =
        '<svg class="hd-copy__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
          '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
          '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>' +
        '</svg>';
      els.linksBody.innerHTML =
        '<div class="bk-table-wrap"><div class="bk-table-scroll">' +
          '<table class="bk-table hd-links-table">' +
            '<colgroup>' +
              '<col class="hd-links__code-col">' +
              '<col class="hd-links__url-col">' +
              '<col class="hd-links__num-col">' +
              '<col class="hd-links__num-col">' +
              '<col class="hd-links__time-col">' +
            '</colgroup>' +
            '<thead><tr><th>Code</th><th>Full URL</th>' +
              '<th class="num">Clicks</th><th class="num">Conversions</th><th>Last clicked</th>' +
            '</tr></thead>' +
            '<tbody>' +
              linkRows.map((r) =>
                '<tr>' +
                  '<td><button type="button" class="hd-copy mono" data-copy="' + escapeHtml(r.code || '') + '" title="Copy code">' +
                      '<span>' + escapeHtml(r.code || '—') + '</span>' + copyIconSvg + '</button></td>' +
                  '<td class="hd-links__url"><button type="button" class="hd-copy hd-copy--url" data-copy="' + escapeHtml(r.url) + '" title="' + escapeHtml(r.url) + '">' +
                      '<span class="hd-trunc">' + escapeHtml(r.url) + '</span>' + copyIconSvg + '</button></td>' +
                  '<td class="num hd-num">0</td>' +
                  '<td class="num hd-num">0</td>' +
                  '<td class="muted">—</td>' +
                '</tr>'
              ).join('') +
            '</tbody>' +
          '</table>' +
        '</div></div>';

      // Invoices & Payouts — promote the not-connected state into a
      // real CTA card (vs. a quiet empty state). Updates the existing
      // node from the route HTML; the button wires below.
      const payoutsBody = els.container.querySelector('#hdPayoutsBody');
      const stripeConnected = !!h.stripe_account_id && (h.stripe_status === 'connected' || h.stripe_status === 'active');
      if (payoutsBody && !stripeConnected) {
        payoutsBody.innerHTML =
          '<div class="hd-cta">' +
            '<div class="hd-cta__body">' +
              '<div class="hd-cta__title">Stripe Connect not configured</div>' +
              '<p class="hd-cta__sub">Payouts can\'t be processed until this hotel connects a Stripe account. No invoices will be generated.</p>' +
            '</div>' +
            '<button type="button" class="btn btn--primary" id="hdConnectStripe">Connect Stripe</button>' +
          '</div>';
      } else if (payoutsBody && stripeConnected) {
        payoutsBody.innerHTML = '<div class="hd-empty">No invoices yet</div>';
      }

      // Sidebar — Insights (currency-driven money formatting)
      const activeEmps = staff.filter((s) => s.status === 'active').length;
      const totalEmps  = staff.length;
      const aeNode = els.insights.querySelector('[data-insight="active-employees"]');
      if (aeNode) aeNode.textContent = activeEmps + ' of ' + totalEmps;
      const lcNode = els.insights.querySelector('[data-insight="lifetime-commission"]');
      if (lcNode) lcNode.textContent = formatHotelMoney(h.lifetime_commission || 0, currency);

      // Sidebar — Details. setDetail handles three node shapes:
      //  • plain element with [data-detail]
      //  • copy-button with a child [data-detail-text] (Hotel ID,
      //    Stripe account) — so we can update text + data-copy
      //    without losing the inline copy icon.
      const setDetail = (key, value, opts) => {
        const node = els.details.querySelector('[data-detail="' + key + '"]');
        if (!node) return;
        const textNode = node.querySelector('[data-detail-text]') || node;
        textNode.textContent = value;
        if (opts && opts.copy != null) node.dataset.copy = opts.copy;
      };
      setDetail('id',         h.code || '—', { copy: h.code || '' });
      setDetail('onboarded',  formatHumanDate((h.created_at || '').slice(0, 10)) || '—');
      setDetail('address',    h.address || '—');
      setDetail('phone',      h.phone || '—');
      setDetail('email',      contactEmail || '—');
      setDetail('website',    h.website || '—');
      setDetail('rooms',      h.total_rooms != null ? String(h.total_rooms) : '—');
      setDetail('created',    formatHumanDateTime(h.created_at));
      setDetail('updated',    formatHumanDateTime(h.updated_at || h.created_at));

      // Financial card — single consolidated home for Stripe status,
      // payout details, and the commission tier split. When Stripe
      // isn't connected, the top half collapses to a Connect CTA;
      // the tier split renders below regardless so the operator
      // share is visible day one.
      if (els.financial) {
        const stripeConnected = !!h.stripe_account_id && (h.stripe_status === 'connected' || h.stripe_status === 'active');
        const last4 = h.payout_account_last4 || h.bank_last4 || null;

        const statusPill = stripeConnected
          ? '<span class="bk-pill bk-pill--ok">Connected</span>'
          : '<span class="bk-pill bk-pill--neutral">Not connected</span>';

        const statusRow =
          '<dl class="hd-side__list">' +
            '<div class="hd-side__row"><dt class="hd-side__label">Stripe status</dt>' +
              '<dd class="hd-side__value">' + statusPill + '</dd></div>' +
          '</dl>';

        let bodyTop;
        if (!stripeConnected) {
          bodyTop = statusRow +
            '<div class="hd-fin__cta">' +
              '<button type="button" class="btn btn--primary" id="hdFinConnect">Connect Stripe</button>' +
            '</div>';
        } else {
          const pending  = formatHotelMoney(h.pending_payout || 0, currency);
          const schedule = h.payout_schedule || '—';
          bodyTop =
            '<dl class="hd-side__list">' +
              '<div class="hd-side__row"><dt class="hd-side__label">Stripe status</dt>' +
                '<dd class="hd-side__value">' + statusPill + '</dd></div>' +
              '<div class="hd-side__row"><dt class="hd-side__label">Stripe account</dt>' +
                '<dd class="hd-side__value">' +
                  '<button type="button" class="hd-copy mono" data-copy="' + escapeHtml(h.stripe_account_id || '') + '" title="Copy Stripe ID">' +
                    '<span data-detail-text>' + escapeHtml(h.stripe_account_id || '—') + '</span>' +
                    copyIconSvg +
                  '</button>' +
                '</dd></div>' +
              '<div class="hd-side__row"><dt class="hd-side__label">Pending payout</dt>' +
                '<dd class="hd-side__value hd-num">' + escapeHtml(pending) + '</dd></div>' +
              '<div class="hd-side__row"><dt class="hd-side__label">Next payout</dt>' +
                '<dd class="hd-side__value">' + escapeHtml(formatHumanDate(h.next_payout_date) || '—') + '</dd></div>' +
              '<div class="hd-side__row"><dt class="hd-side__label">Schedule</dt>' +
                '<dd class="hd-side__value">' + escapeHtml(schedule) + '</dd></div>' +
              '<div class="hd-side__row"><dt class="hd-side__label">Account ending</dt>' +
                '<dd class="hd-side__value mono">' + (last4 ? '•••• ' + escapeHtml(last4) : '—') + '</dd></div>' +
            '</dl>';
        }

        // Tier split — operator commission_pct (their share of total
        // revenue), hotel kickback_pool_pct (the slice the hotel
        // keeps), Horizon's share is the residual. Zero-width
        // segments + "—" legend values when either field is missing.
        const op    = (h.commission_pct     != null) ? Number(h.commission_pct)     : null;
        const hotelPct = (h.kickback_pool_pct != null) ? Number(h.kickback_pool_pct) : null;
        const platf = (op != null && hotelPct != null) ? Math.max(0, 100 - op - hotelPct) : null;
        const tierName = (h.tier_name || (h.type === 'kickback' ? 'Kickback' : h.type === 'pool' ? 'Pool' : '—'));
        const pctText = (v) => (v == null ? '—' : v + '%');
        const splitHtml =
          '<div class="hd-split">' +
            '<header class="hd-split__head">' +
              '<div class="hd-split__title">Tier — ' + escapeHtml(tierName) + '</div>' +
              '<button type="button" class="hd-card__edit" id="hdSplitEdit">Edit</button>' +
            '</header>' +
            '<div class="hd-split__bar" role="img" aria-label="Commission split">' +
              '<span class="hd-split__seg hd-split__seg--op"    style="width:' + (op       == null ? 0 : op)       + '%"></span>' +
              '<span class="hd-split__seg hd-split__seg--hotel" style="width:' + (hotelPct == null ? 0 : hotelPct) + '%"></span>' +
              '<span class="hd-split__seg hd-split__seg--platf" style="width:' + (platf    == null ? 0 : platf)    + '%"></span>' +
            '</div>' +
            '<dl class="hd-split__legend">' +
              '<div class="hd-split__row">' +
                '<span class="hd-split__swatch hd-split__swatch--op"></span>' +
                '<span class="hd-split__label">Operator</span>' +
                '<span class="hd-split__pct hd-num">' + pctText(op) + '</span>' +
              '</div>' +
              '<div class="hd-split__row">' +
                '<span class="hd-split__swatch hd-split__swatch--hotel"></span>' +
                '<span class="hd-split__label">Hotel</span>' +
                '<span class="hd-split__pct hd-num">' + pctText(hotelPct) + '</span>' +
              '</div>' +
              '<div class="hd-split__row">' +
                '<span class="hd-split__swatch hd-split__swatch--platf"></span>' +
                '<span class="hd-split__label">Horizon</span>' +
                '<span class="hd-split__pct hd-num">' + pctText(platf) + '</span>' +
              '</div>' +
            '</dl>' +
          '</div>';

        els.financial.innerHTML = bodyTop + splitHtml;
      }

      // Master Referral card — QR + canonical URL + actions. QR is
      // server-rendered via api.qrserver.com for now; swap for a
      // self-hosted endpoint once one exists. encodeURIComponent
      // covers slug edge-cases (uppercase, hyphens, future unicode).
      const masterRefBtn = els.container.querySelector('#hdMasterRefUrl');
      const masterRefImg = els.container.querySelector('#hdMasterRefQR');
      if (masterRefBtn) {
        masterRefBtn.dataset.copy = masterLink;
        masterRefBtn.querySelector('[data-detail-text]').textContent = masterLink;
        masterRefBtn.title = masterLink;
      }
      if (masterRefImg) {
        masterRefImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=176x176&margin=0&data=' +
                          encodeURIComponent(masterLink);
      }

      // Insights deltas — placeholder dashes until aggregation data
      // is wired up. Pattern stays in place so the renderer just
      // swaps in real numbers later. setDelta also flips the
      // positive class for green coloring on uplift.
      const setDelta = (key, text, opts) => {
        const node = els.insights.querySelector('[data-delta="' + key + '"]');
        if (!node) return;
        node.textContent = text;

      // second listener on every render by stashing the bound handler

      const notesEl = els.notes;

    function flashHotelsNotice(msg) {
      if (!hotelsEls || !hotelsEls.notice) return;
      hotelsEls.notice.textContent = msg;
      hotelsEls.notice.hidden = false;
      setTimeout(() => { if (hotelsEls && hotelsEls.notice) hotelsEls.notice.hidden = true; }, 5000);
