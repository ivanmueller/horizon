  <!-- Minimal blob-stream replacement. The npm `blob-stream` package
       is published as Node CommonJS and won't load via a CDN <script>.
       This polyfill implements just enough of the Writable contract
       for pdfkit's pipe loop. -->
  <script>
    window.blobStream = function () {
      var chunks = [];
      var listeners = Object.create(null);
      function emit(ev) {
        var cbs = listeners[ev]; if (!cbs) return;
        var args = [].slice.call(arguments, 1);
        cbs.slice().forEach(function (cb) {
          try { cb.apply(null, args); } catch (err) { console.error(err); }
        });
      }
      return {
        writable: true,
        write: function (chunk) { if (chunk != null) chunks.push(chunk); return true; },
        end: function (chunk) {
          if (chunk != null) chunks.push(chunk);
          setTimeout(function () { emit('finish'); }, 0);
        },
        on: function (ev, cb) { (listeners[ev] = listeners[ev] || []).push(cb); return this; },
        once: function (ev, cb) {
          var self = this;
          var wrap = function () { self.off(ev, wrap); cb.apply(null, arguments); };
          return this.on(ev, wrap);
        },
        off: function (ev, cb) {
          if (!listeners[ev]) return this;
          listeners[ev] = listeners[ev].filter(function (x) { return x !== cb; });
          return this;
        },
        removeListener: function (ev, cb) { return this.off(ev, cb); },
        emit: emit,
        toBlob: function (type) { return new Blob(chunks, { type: type || 'application/octet-stream' }); },
      };
    };
  </script>

    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZGx0enJudHBobmtoc25pd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjA0OTAsImV4cCI6MjA5MjYzNjQ5MH0.toebJTpWH-_tRLOmwPCeTprGfQfH_JU_ZKgbqkGuz3M';

    /* ── Auth gate ───────────────────────────────────────── */

    if (!session) {

      throw new Error('redirecting to /dashboard/login/');
    }

    const adminCheck = await supabase
      .from('horizon_admins')
      .select('id')
      .eq('status', 'active')
      .limit(1)
      .maybeSingle();
    if (!adminCheck.data) {
      window.location.replace('/dashboard/hotel/');
      throw new Error('redirecting to /dashboard/hotel/');
    }

    if (window.location.hash && window.location.hash.indexOf('access_token=') !== -1) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    document.body.style.visibility = 'visible';

    /* ── Sidebar nav ─────────────────────────────────────── */
    const ROUTES = [
      { id: 'home',     label: 'Home',         group: 'main',    icon: iconHome },
      { id: 'bookings', label: 'Bookings',     group: 'main',    icon: iconBookings },
      { id: 'hotels',   label: 'Hotels',       group: 'main',    icon: iconHotels },
      { id: 'tours',    label: 'Tour catalog', group: 'main',    icon: iconCompass },
      { id: 'payments', label: 'Payments',     group: 'finance', icon: iconCard },
      { id: 'billing',  label: 'Billing',      group: 'finance', icon: iconReceipt },
      { id: 'invoices', label: 'Invoices',     group: 'finance', icon: iconFile },
    ];

    const navMain    = document.getElementById('navMain');
    const navFinance = document.getElementById('navFinance');
    const navItems   = {};

    for (const route of ROUTES) {
      const a = document.createElement('a');
      a.className = 'app-nav__item';
      a.href = pathFor(route.id);
      a.dataset.route = route.id;
      a.innerHTML =
        '<span class="app-nav__icon">' + route.icon() + '</span>' +
        '<span>' + route.label + '</span>';
      a.addEventListener('click', (e) => {
        // Cmd/Ctrl/middle-click → let the browser open in a new tab.
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
        e.preventDefault();
        navigate(route.id);
      });
      navItems[route.id] = a;
      (route.group === 'finance' ? navFinance : navMain).appendChild(a);
    }

    function pathFor(routeId) {
      return routeId === 'home' ? '/admin/' : '/admin/' + routeId + '/';
    }

    function navigate(routeId) {
      const path = pathFor(routeId);
      if (window.location.pathname === path) return;
      history.pushState(null, '', path);
      render();
    }

    function currentRoute() {
      const m = window.location.pathname.match(/^\/admin\/([a-z]+)\/?$/);
      const id = m && m[1];
      return ROUTES.find(r => r.id === id) ? id : 'home';
    }

    // One-time migration of any old hash-based URLs to path-based URLs.
    // /admin/#/bookings  →  /admin/bookings/
    const oldHash = window.location.hash.match(/^#\/([a-z]+)$/);
    if (oldHash && ROUTES.find(r => r.id === oldHash[1])) {
      history.replaceState(null, '', pathFor(oldHash[1]));
    }

    function render() {
      const id = currentRoute();
      for (const r of ROUTES) {
        navItems[r.id].classList.toggle('app-nav__item--active', r.id === id);
      }
      const renderer = renderers[id] || renderers.home;
      const out = renderer();
      const container = document.getElementById('appContent');
      if (typeof out === 'string') {
        container.innerHTML = out;
      } else {
        container.innerHTML = out.html || '';
        if (typeof out.mount === 'function') out.mount(container);
      }
      document.title = 'Horizon admin — ' + (ROUTES.find(r => r.id === id) || ROUTES[0]).label;
    }

    // Browser back/forward buttons walk pushState entries; popstate
    // fires for those navigations and we re-render. The first render
    // call moves to the bottom of the script so everything it needs
    // (renderers, BOKUN_API_BASE, helpers) is initialised first.
    window.addEventListener('popstate', render);

                  Edit columns

          `,

    function placeholderPage(title, sub, body) {
      return `

    /* ── Sidebar footer (email + Account + Sign out) ─────── */
    document.getElementById('appEmail').textContent =
      (session.user && session.user.email) || '—';

    const signoutBtn = document.getElementById('appSignout');
    signoutBtn.addEventListener('click', async () => {
      signoutBtn.disabled = true;
      await supabase.auth.signOut();
      window.location.replace('/dashboard/login/');
    });

    /* ── Account modal ───────────────────────────────────── */
    const acctModal   = document.getElementById('acctModal');
    const acctForm    = document.getElementById('acctForm');
    const acctEmail   = document.getElementById('acctEmail');
    const acctPwd     = document.getElementById('acctPassword');
    const acctConfirm = document.getElementById('acctConfirm');
    const acctSave    = document.getElementById('acctSave');
    const acctError   = document.getElementById('acctError');
    const acctSuccess = document.getElementById('acctSuccess');

    function openAcct() {
      acctEmail.value = (session.user && session.user.email) || '';
      acctPwd.value = ''; acctConfirm.value = '';
      acctError.hidden = true; acctSuccess.hidden = true;
      acctModal.hidden = false;
      setTimeout(() => acctPwd.focus(), 0);
    }
    function closeAcct() { acctModal.hidden = true; }

    document.getElementById('appAccount').addEventListener('click', openAcct);
    document.getElementById('acctClose').addEventListener('click', closeAcct);
    document.getElementById('acctCancel').addEventListener('click', closeAcct);
    acctModal.addEventListener('click', (e) => { if (e.target === acctModal) closeAcct(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !acctModal.hidden) closeAcct();
    });

    acctForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      acctError.hidden = true; acctSuccess.hidden = true;
      const pw = acctPwd.value, pw2 = acctConfirm.value;
      if (pw.length < 8) {
        acctError.textContent = 'Password must be at least 8 characters.';
        acctError.hidden = false; return;
      }
      if (pw !== pw2) {
        acctError.textContent = 'Passwords don’t match.';
        acctError.hidden = false; return;
      }
      acctSave.disabled = true; acctSave.textContent = 'Saving…';
      try {
        const res = await supabase.auth.updateUser({ password: pw });
        if (res.error) throw res.error;
        try { localStorage.setItem('horizon-last-signin-mode', 'password'); } catch (e) {}
        acctSuccess.textContent = 'Password saved. You can sign in with it next time.';
        acctSuccess.hidden = false;
        acctPwd.value = ''; acctConfirm.value = '';
      } catch (err) {
        console.error('updateUser failed', err);
        acctError.textContent = err.message || 'Could not save password.';
        acctError.hidden = false;
      } finally {
        acctSave.disabled = false; acctSave.textContent = 'Save password';
      }
    });

    /* ── Bookings route ──────────────────────────────────── */
    const BOKUN_API_BASE = 'https://horizon-bokun.ivan-mueller02.workers.dev';

    // Module-level so period choice survives Refresh + sidebar
    // re-renders within the bookings route.
    let currentPeriod = 'this-month';
    let customRange = null;
    let hotelByCode = {};

    // In-memory cache of all bookings for the current period, plus the
    // active status filter selected via the stat cards. Module-scoped so
    // the route can re-render itself without re-fetching.
    let bkRecords = [];
    let bkStatusFilter = 'all';

    function mountBookings(container) {
      const els = {
        error:      container.querySelector('#bkError'),
        statcards:  container.querySelector('#bkStatcards'),
        tabs:       container.querySelectorAll('.bk-tabs__btn'),
        body:       container.querySelector('#bkBody'),
        footer:     container.querySelector('#bkFooter'),
        checkAll:   container.querySelector('#bkCheckAll'),
        export:     container.querySelector('#bkExport'),
        editCols:   container.querySelector('#bkEditCols'),
        create:     container.querySelector('#bkCreate'),
        analyze:    container.querySelector('#bkAnalyze'),
        chips:      container.querySelectorAll('.bk-chip'),
      };

      // Reset filter to "All" on every mount so the page opens neutral.
      bkStatusFilter = 'all';
      els.statcards.querySelectorAll('.bk-statcard').forEach(card => {
        card.classList.toggle('bk-statcard--active', card.dataset.status === 'all');
      });

      // Stat-card click → filter rows by booking status.
      els.statcards.addEventListener('click', (e) => {
        const card = e.target.closest('.bk-statcard');
        if (!card) return;
        bkStatusFilter = card.dataset.status || 'all';
        els.statcards.querySelectorAll('.bk-statcard').forEach(c => {
          c.classList.toggle('bk-statcard--active', c === card);
        });
        renderBookingRows(els);
      });

      // Sub-tabs: Bookings / Payouts / All activity.
      // Payouts + All activity are shells until those surfaces ship.
      els.tabs.forEach(btn => {
        btn.addEventListener('click', () => {
          els.tabs.forEach(b => b.classList.toggle('bk-tabs__btn--active', b === btn));
        });
      });

      // Filter chips + Export + Edit columns + Create + Analyze are all
      // shells for now — wired in the next pass per the rebuild plan.
      els.chips.forEach(c => c.addEventListener('click', noopChip));
      els.export.addEventListener('click',   noopChip);
      els.editCols.addEventListener('click', noopChip);
      els.create.addEventListener('click',   noopChip);
      els.analyze.addEventListener('click',  noopChip);

      // Header "select all" — toggles every row checkbox.
      els.checkAll.addEventListener('change', () => {
        els.body.querySelectorAll('input[type="checkbox"][data-bk-row]')
          .forEach(cb => { cb.checked = els.checkAll.checked; });
      });

      loadBookings(els);
    }

    function noopChip() { /* shell — future-feature placeholder */ }

    function showBkError(els, msg) {
      els.error.textContent = msg;
      els.error.hidden = false;
    }
    function clearBkError(els) {
      els.error.hidden = true;
      els.error.textContent = '';
    }

    // Pulls a flat list of every booking across every hotel for the
    // current period. The worker doesn't expose an "all hotels" feed
    // yet, so we ask /api/admin/summary for the hotel list and fan out
    // /api/dashboard/bookings calls in parallel, then merge + sort.
    function loadBookings(els) {
      const r = rangeForPeriod();
      if (!r) return;
      clearBkError(els);
      els.body.innerHTML = '<tr><td colspan="9" class="bk-empty"><div class="bk-empty__title">Loading…</div></td></tr>';
      els.footer.textContent = '— items';

      fetch(BOKUN_API_BASE + '/api/admin/summary' +
            '?from=' + encodeURIComponent(r.from) +
            '&to='   + encodeURIComponent(r.to), {
        headers: { Authorization: 'Bearer ' + session.access_token },
        cache: 'no-store',
      })
        .then(res => {
          if (res.status === 401) {
            window.location.replace('/dashboard/login/');
            throw new Error('unauthorized');
          }
          if (res.status === 403) {
            showBkError(els, 'Your account isn’t authorised for the Horizon admin dashboard.');
            throw new Error('forbidden');
          }
          return res.json().then(b => ({ ok: res.ok, body: b }));
        })
        .then(res => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          const hotels = res.body.hotels || [];
          hotelByCode = {};
          hotels.forEach(h => { hotelByCode[h.code] = h; });

          if (!hotels.length) {
            bkRecords = [];
            renderStatcardCounts(els, []);
            renderBookingRows(els);
            return;
          }

          const qs = '&from=' + encodeURIComponent(r.from) + '&to=' + encodeURIComponent(r.to);
          return Promise.all(hotels.map(h =>
            fetch(BOKUN_API_BASE + '/api/dashboard/bookings?hotel=' + encodeURIComponent(h.code) + qs, {
              cache: 'no-store',
              headers: { Authorization: 'Bearer ' + session.access_token },
            })
              .then(rr => rr.json().then(b => ({ ok: rr.ok, body: b, hotel: h })))
          )).then(results => {
            const merged = [];
            results.forEach(({ ok, body, hotel }) => {
              if (!ok) return;
              (body.records || []).forEach(rec => {
                merged.push(Object.assign({ _hotel: hotel }, rec));
              });
            });
            // Newest first.
            merged.sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
            bkRecords = merged;
            renderStatcardCounts(els, merged);
            renderBookingRows(els);
          });
        })
        .catch(err => {
          if (err && (err.message === 'unauthorized' || err.message === 'forbidden')) return;
          console.error('admin bookings fetch failed', err);
          showBkError(els, 'Could not load bookings: ' + (err && err.message || 'unknown error'));
          els.body.innerHTML = '<tr><td colspan="9" class="bk-empty"><div class="bk-empty__title">Could not load bookings</div><p class="bk-empty__body">Try again in a moment.</p></td></tr>';
        });
    }

    function renderStatcardCounts(els, records) {
      const counts = { all: records.length, confirmed: 0, refunded: 0, cancelled: 0, pending_refund: 0 };
      records.forEach(r => {
        const s = r.status || 'confirmed';
        if (counts[s] != null) counts[s] += 1;
      });
      els.statcards.querySelectorAll('[data-count]').forEach(node => {
        const k = node.dataset.count;
        node.textContent = String(counts[k] != null ? counts[k] : 0);
      });
    }

    function renderBookingRows(els) {
      const filtered = bkStatusFilter === 'all'
        ? bkRecords
        : bkRecords.filter(r => (r.status || 'confirmed') === bkStatusFilter);

      if (els.checkAll) els.checkAll.checked = false;

      if (!filtered.length) {
        els.body.innerHTML =
          '<tr><td colspan="9" class="bk-empty">' +
            '<div class="bk-empty__title">No bookings in this period</div>' +
            '<p class="bk-empty__body">Once partners start sending traffic, confirmed bookings will appear here.</p>' +
          '</td></tr>';
        els.footer.textContent = '0 items';
        return;
      }

      const rows = filtered.map(r => {
        const status   = r.status || 'confirmed';
        const amount   = r.amount != null ? Number(r.amount).toFixed(2) : '—';
        const currency = (r.currency || 'CAD').toUpperCase();
        const hotel    = r._hotel || {};
        const desc     = 'HGCT';
        const customer = r.lead_email || r.lead_name || '—';
        const dateStr  = formatHumanDateTime(r.created_at);
        const refunded = (status === 'refunded' || status === 'pending_refund')
          ? formatHumanDateTime(r.updated_at)
          : '—';

        return (
          '<tr>' +
            '<td class="bk-table__check"><input type="checkbox" data-bk-row="' + escapeHtml(r.id) + '" aria-label="Select booking"></td>' +
            '<td>' +
              '<span class="bk-table__amount">' + (amount === '—' ? '—' : '$' + escapeHtml(amount)) + '</span>' +
              '<span class="bk-table__currency">' + escapeHtml(currency) + '</span>' +
              renderBkPill(status) +
            '</td>' +
            '<td>' + escapeHtml(hotel.name || '—') + '</td>' +
            '<td class="bk-table__desc">' + escapeHtml(desc) + '</td>' +
            '<td>' + escapeHtml(customer) + '</td>' +
            '<td>' + escapeHtml(dateStr) + '</td>' +
            '<td class="bk-table__muted">' + escapeHtml(refunded) + '</td>' +
            '<td class="bk-table__muted">—</td>' +
            '<td class="bk-table__kebab"><button type="button" class="bk-kebab" aria-label="Row actions">⋯</button></td>' +
          '</tr>'
        );
      }).join('');

      els.body.innerHTML = rows;
      els.footer.textContent = filtered.length + (filtered.length === 1 ? ' item' : ' items');
    }

    function renderBkPill(status) {
      const refresh = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>';
      const check   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const cross   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      if (status === 'confirmed')      return '<span class="bk-pill bk-pill--ok">Confirmed ' + check + '</span>';
      if (status === 'refunded')       return '<span class="bk-pill bk-pill--neutral">Refunded ' + refresh + '</span>';
      if (status === 'cancelled')      return '<span class="bk-pill bk-pill--neutral">Cancelled ' + cross + '</span>';
      if (status === 'pending_refund') return '<span class="bk-pill bk-pill--warn">Pending refund ' + refresh + '</span>';
      return '<span class="bk-pill bk-pill--neutral">' + escapeHtml(status) + '</span>';
    }

    /* ── Delegated handlers — survive route re-renders ───── */
    document.body.addEventListener('change', (e) => {
      const sel = e.target;
      if (!sel || !sel.classList || !sel.classList.contains('status')) return;
      onStatusChange(sel);
    });

    document.body.addEventListener('click', (e) => {
      const btn = e.target && e.target.closest && e.target.closest('.invoice-btn');
      if (!btn) return;
      e.stopPropagation();
      e.preventDefault();
      onInvoiceClick(btn);
    });

    function onStatusChange(sel) {
      const id = sel.dataset.id;
      const prev = sel.dataset.prev;
      const next = sel.value;
      if (next === prev) return;
      if (!window.confirm('Change booking status from "' + prev + '" to "' + next +
                          '"? Totals on this page will be stale until you hit Refresh.')) {
        sel.value = prev;
        return;
      }
      sel.disabled = true;
      fetch(BOKUN_API_BASE + '/api/admin/bookings/' + encodeURIComponent(id), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ status: next }),
      })
        .then(r => {
          if (r.status === 401) {
            window.location.replace('/dashboard/login/');
            throw new Error('unauthorized');
          }
          return r.json().then(b => ({ ok: r.ok, body: b }));
        })
        .then(res => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'update_failed');
          sel.dataset.prev = next;
          sel.className = 'status status--' + next;
          sel.disabled = false;
        })
        .catch(err => {
          if (err && err.message === 'unauthorized') return;
          console.error('status update failed', err);
          window.alert('Could not update status: ' + (err && err.message || 'unknown error'));
          sel.value = prev;
          sel.disabled = false;
        });
    }

    function onInvoiceClick(btn) {
      const code = btn.dataset.hotel;
      const hotel = hotelByCode[code];
      if (!hotel) return window.alert('Hotel not loaded — refresh and try again.');
      const range = rangeForPeriod();
      if (!range || !range.slug) return window.alert('Pick a period first.');

      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Generating…';

      generateInvoice(hotel, range)
        .catch(err => {
          console.error('invoice generation failed', err);
          window.alert('Could not generate invoice: ' + (err && err.message || 'unknown error'));
        })
        .then(() => {
          btn.disabled = false;
          btn.textContent = orig;
        });
    }

    function whenInvoiceReady() {
      if (window.__horizonInvoice) return Promise.resolve();
      return new Promise(resolve => {
        document.addEventListener('horizon-invoice-ready', function onReady() {
          document.removeEventListener('horizon-invoice-ready', onReady);
          resolve();
        });
        setTimeout(resolve, 8000);
      });
    }

    function generateInvoice(hotel, range) {
      return whenInvoiceReady().then(() => {
        if (!window.__horizonInvoice) throw new Error('Invoice module did not load — check console for /scripts/horizon/invoice-pdf.mjs errors.');
        if (!window.PDFDocument)      throw new Error('pdfkit did not load — unpkg may be blocked.');
        if (!window.blobStream)       throw new Error('blob-stream polyfill missing.');

        const qs = '?hotel=' + encodeURIComponent(hotel.code) +
                   '&from=' + encodeURIComponent(range.from) +
                   '&to='   + encodeURIComponent(range.to);

        return fetch(BOKUN_API_BASE + '/api/dashboard/bookings' + qs, {
          cache: 'no-store',
          headers: { Authorization: 'Bearer ' + session.access_token },
        })
          .then(r => r.json().then(b => ({ ok: r.ok, body: b })))
          .then(res => {
            if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
            const records = (res.body.records || []).filter(r => r.status === 'confirmed');
            if (!records.length) throw new Error('No confirmed bookings in this period');

            const commissionPct = (res.body.hotel && Number(res.body.hotel.commission_pct)) || 0;
            const name = (res.body.hotel && res.body.hotel.name) || hotel.name;
            const aggregates = window.__horizonInvoice.computeAggregates(records, commissionPct);

            const doc = new window.PDFDocument({
              size: 'A4', margin: 50, bufferPages: true,
              info: {
                Title:   'Horizon commission ' + range.label + ' — ' + name,
                Author:  'Horizon Tours',
                Subject: 'Commission statement',
              },
            });
            const stream = doc.pipe(window.blobStream());

            window.__horizonInvoice.renderInvoice(doc, {
              hotel:     { code: hotel.code, name: name, commission_pct: commissionPct },
              range:     range,
              totals:    aggregates.totals,
              kickbacks: aggregates.kickbacks,
              records:   records,
            });
            doc.end();

            return new Promise((resolve, reject) => {
              stream.on('finish', () => {
                try {
                  const blob = stream.toBlob('application/pdf');
                  showPdfPreview(blob, hotel.code + '_' + range.slug + '.pdf', name, range.label);
                  resolve();
                } catch (err) { reject(err); }
              });
              stream.on('error', reject);
            });
          });
      });
    }

    /* ── PDF preview modal ───────────────────────────────── */
    let currentPdfPreview = null;
    const pdfModal    = document.getElementById('pdfModal');
    const pdfFrame    = document.getElementById('pdfFrame');
    const pdfTitle    = document.getElementById('pdfTitle');
    const pdfSub      = document.getElementById('pdfSub');

    function showPdfPreview(blob, filename, hotelName, periodLabel) {
      if (currentPdfPreview && currentPdfPreview.blobUrl) URL.revokeObjectURL(currentPdfPreview.blobUrl);
      const blobUrl = URL.createObjectURL(blob);
      currentPdfPreview = { blobUrl, filename };
      pdfTitle.textContent = hotelName;
      pdfSub.textContent   = periodLabel;
      pdfFrame.src         = blobUrl;
      pdfModal.hidden      = false;
    }
    function hidePdfPreview() {
      pdfModal.hidden = true;
      pdfFrame.src    = 'about:blank';
      if (currentPdfPreview && currentPdfPreview.blobUrl) URL.revokeObjectURL(currentPdfPreview.blobUrl);
      currentPdfPreview = null;
    }
    document.getElementById('pdfClose').addEventListener('click', hidePdfPreview);
    document.getElementById('pdfCancel').addEventListener('click', hidePdfPreview);
    document.getElementById('pdfDownload').addEventListener('click', () => {
      if (!currentPdfPreview) return;
      const a = document.createElement('a');
      a.href = currentPdfPreview.blobUrl;
      a.download = currentPdfPreview.filename;
      document.body.appendChild(a); a.click(); a.remove();
    });
    pdfModal.addEventListener('click', (e) => { if (e.target === pdfModal) hidePdfPreview(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !pdfModal.hidden) hidePdfPreview();
    });

    /* ── Hotels route ────────────────────────────────────── */
    let hotelsCache  = [];      // last list response, indexed by index
    let hotelsEls    = null;    // captured in mountHotels so handlers can reload
    let hotelsFilter = 'all';   // active stat-card filter

    function mountHotels(container) {
      hotelsEls = {
        body:       container.querySelector('#hotelsBody'),
        error:      container.querySelector('#hotelsError'),
        notice:     container.querySelector('#hotelsNotice'),
        add:        container.querySelector('#hotelsAdd'),
        statcards:  container.querySelector('#hotelsStatcards'),
        chips:      container.querySelectorAll('.bk-chip'),
        export:     container.querySelector('#hotelsExport'),
        editCols:   container.querySelector('#hotelsEditCols'),
        footer:     container.querySelector('#hotelsFooter'),
        checkAll:   container.querySelector('#hotelsCheckAll'),
      };

      // Reset filter to "All" on every mount so the page opens neutral.
      hotelsFilter = 'all';
      hotelsEls.statcards.querySelectorAll('.bk-statcard').forEach(card => {
        card.classList.toggle('bk-statcard--active', card.dataset.filter === 'all');
      });

      // Stat-card click → filter rows in-memory.
      hotelsEls.statcards.addEventListener('click', (e) => {
        const card = e.target.closest('.bk-statcard');
        if (!card) return;
        hotelsFilter = card.dataset.filter || 'all';
        hotelsEls.statcards.querySelectorAll('.bk-statcard').forEach(c => {
          c.classList.toggle('bk-statcard--active', c === card);
        });
        renderHotelsTable(hotelsEls.body, hotelsCache);
      });

      // Filter chips, Export, Edit columns, Analyze are shells for now.
      hotelsEls.chips.forEach(c => c.addEventListener('click', noopChip));
      hotelsEls.export.addEventListener('click',   noopChip);
      hotelsEls.editCols.addEventListener('click', noopChip);

      // Header "select all" — toggles every visible row checkbox.
      hotelsEls.checkAll.addEventListener('change', () => {
        hotelsEls.body.querySelectorAll('input[type="checkbox"][data-hotels-row]')
          .forEach(cb => { cb.checked = hotelsEls.checkAll.checked; });
      });

      // Existing flows: "+ Add hotel" opens the create drawer; clicking
      // a row opens the detail drawer + paints the row selected.
      hotelsEls.add.addEventListener('click', openHotelCreateDrawer);
      hotelsEls.body.addEventListener('click', (e) => {
        // Ignore clicks on the row checkbox + kebab so they don't open
        // the drawer.
        if (e.target.closest('input,button.bk-kebab')) return;
        const tr = e.target.closest('tr[data-hotel-idx]');
        if (!tr) return;
        const hotel = hotelsCache[Number(tr.dataset.hotelIdx)];
        if (!hotel) return;
        hotelsEls.body.querySelectorAll('tr').forEach((r) => r.classList.remove('row--selected'));
        tr.classList.add('row--selected');
        openHotelDrawer(hotel);
      });

      loadHotels(hotelsEls);
    }

    function flashHotelsNotice(msg) {
      if (!hotelsEls || !hotelsEls.notice) return;
      hotelsEls.notice.textContent = msg;
      hotelsEls.notice.hidden = false;
      setTimeout(() => { if (hotelsEls && hotelsEls.notice) hotelsEls.notice.hidden = true; }, 5000);
    }

    function loadHotels(els) {
      els.error.hidden = true;
      return fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        cache: 'no-store',
        headers: { Authorization: 'Bearer ' + session.access_token },
      })
        .then((r) => {
          if (r.status === 401) { window.location.replace('/dashboard/login/'); throw new Error('unauthorized'); }
          return r.json().then((b) => ({ ok: r.ok, body: b }));
        })
        .then((res) => {
          if (!res.ok) throw new Error((res.body && res.body.error) || 'fetch_failed');
          hotelsCache = res.body.hotels || [];
          renderHotelsTable(els.body, hotelsCache);
        })
        .catch((err) => {
          if (err && err.message === 'unauthorized') return;
          console.error('admin hotels fetch failed', err);
          els.error.textContent = 'Could not load hotels: ' + (err && err.message || 'unknown error');
          els.error.hidden = false;
          els.body.innerHTML =
            '<tr><td colspan="11" class="bk-empty"><div class="bk-empty__title">Failed to load</div><p class="bk-empty__body">Try again in a moment.</p></td></tr>';
        });
    }

    function renderHotelsTable(body, hotels) {
      // Update stat-card counts from the full unfiltered list every
      // render — counts always reflect totals, not the current filter.
      updateHotelsStatcardCounts(hotels);

      const filtered = hotels.filter((h) => matchesHotelsFilter(h, hotelsFilter));

      if (hotelsEls && hotelsEls.checkAll) hotelsEls.checkAll.checked = false;

      if (!filtered.length) {
        const msg = hotels.length
          ? 'No partners match this filter.'
          : 'No partners yet. Add the first one with the + Add hotel button.';
        body.innerHTML =
          '<tr><td colspan="11" class="bk-empty">' +
            '<div class="bk-empty__title">' + escapeHtml(msg) + '</div>' +
          '</td></tr>';
        if (hotelsEls && hotelsEls.footer) hotelsEls.footer.textContent = '0 items';
        return;
      }

      const frag = document.createDocumentFragment();
      filtered.forEach((h) => {
        // Original index inside hotelsCache — preserved so the existing
        // row-click handler (data-hotel-idx) keeps resolving the right
        // record after the visible list is filtered.
        const idx = hotels.indexOf(h);
        const activeStaff = (h.staff    || []).filter((s) => s.status === 'active').length;
        const activeMngrs = (h.managers || []).filter((m) => m.status === 'active').length;
        const typeLabel   = h.type === 'kickback' ? 'Kickback'
                          : h.type === 'pool'     ? 'Pool'
                          : '—';

        const tr = document.createElement('tr');
        tr.dataset.hotelIdx = String(idx);
        tr.innerHTML =
          '<td class="bk-table__check"><input type="checkbox" data-hotels-row="' + escapeHtml(h.id || '') + '" aria-label="Select hotel"></td>' +
          '<td class="bk-table__name">' + escapeHtml(h.name) + '</td>' +
          '<td>' + escapeHtml(h.location || '—') + '</td>' +
          '<td>' + escapeHtml(typeLabel) + '</td>' +
          '<td>' + (h.commission_pct != null ? escapeHtml(h.commission_pct + '%') : '—') + '</td>' +
          '<td>' + activeStaff + '</td>' +
          '<td>' + activeMngrs + '</td>' +
          '<td>' + hotelStatusPill(h.status) + '</td>' +
          '<td>' + escapeHtml(formatHumanDate(h.effective_date) || '—') + '</td>' +
          '<td>' + escapeHtml(formatHumanDateTime(h.created_at)) + '</td>' +
          '<td class="bk-table__kebab"><button type="button" class="bk-kebab" aria-label="Row actions">⋯</button></td>';
        frag.appendChild(tr);
      });
      body.innerHTML = '';
      body.appendChild(frag);

      if (hotelsEls && hotelsEls.footer) {
        hotelsEls.footer.textContent =
          filtered.length + (filtered.length === 1 ? ' item' : ' items');
      }
    }

    function matchesHotelsFilter(h, filter) {
      if (filter === 'all')        return true;
      if (filter === 'active')     return h.status === 'active';
      if (filter === 'terminated') return h.status === 'terminated';
      if (filter === 'kickback')   return h.type === 'kickback';
      if (filter === 'pool')       return h.type === 'pool';
      if (filter === 'banff')      return (h.location || '').toLowerCase() === 'banff';
      if (filter === 'canmore')    return (h.location || '').toLowerCase() === 'canmore';
      return true;
    }

    function updateHotelsStatcardCounts(hotels) {
      if (!hotelsEls || !hotelsEls.statcards) return;
      const counts = {
        all:        hotels.length,
        active:     hotels.filter((h) => h.status === 'active').length,
        terminated: hotels.filter((h) => h.status === 'terminated').length,
        kickback:   hotels.filter((h) => h.type   === 'kickback').length,
        pool:       hotels.filter((h) => h.type   === 'pool').length,
      };
      hotelsEls.statcards.querySelectorAll('[data-count]').forEach((node) => {
        const k = node.dataset.count;
        node.textContent = String(counts[k] != null ? counts[k] : 0);
      });
    }

    function hotelStatusPill(status) {
      if (status === 'active')     return '<span class="bk-pill bk-pill--ok">Active</span>';
      if (status === 'terminated') return '<span class="bk-pill bk-pill--neutral">Terminated</span>';
      if (status === 'revoked')    return '<span class="bk-pill bk-pill--neutral">Revoked</span>';
      return '<span class="bk-pill bk-pill--neutral">' + escapeHtml(status || '—') + '</span>';
    }

    // Kept for any drawer-internal code that still references it. The
    // hotels list now renders types as plain text per the Stripe-style
    // table, but the drawer + detail-row breakdowns still call typePill.
    function typePill(type) {
      if (type === 'kickback') return '<span class="type-pill type-pill--kickback">kickback</span>';
      if (type === 'pool')     return '<span class="type-pill type-pill--pool">pool</span>';
      return '<span class="muted">—</span>';
    }
    function statusBadge(status) {
      if (status === 'active')     return '<span class="badge badge--ok">Active</span>';
      if (status === 'terminated') return '<span class="badge badge--neutral">Terminated</span>';
      if (status === 'revoked')    return '<span class="badge badge--bad">Revoked</span>';
      return '<span class="badge badge--neutral">' + escapeHtml(status || '—') + '</span>';
    }

    /* ── Hotel detail drawer ─────────────────────────────── */
    const hotelDrawer      = document.getElementById('hotelDrawer');
    const hotelDrawerTitle = document.getElementById('hotelDrawerTitle');
    const hotelDrawerSub   = document.getElementById('hotelDrawerSub');
    const hotelDrawerBody  = document.getElementById('hotelDrawerBody');
    const hotelDrawerClose = document.getElementById('hotelDrawerClose');

    // Drawer state — set when the drawer opens, used by the inline
    // staff/manager forms (commits 4c+) so we can re-render after a
    // CRUD op without refetching from the user's POV.
    let drawerCurrentHotelId = null;
    let drawerStaffForm      = null;  // null | 'add' | { editId: <staff.id> }
    let drawerManagerForm    = null;  // null | 'add' | { editId: <manager.id> }

    function openHotelDrawer(hotel) {
      drawerCurrentHotelId = hotel.id;
      drawerStaffForm = null;
      drawerManagerForm = null;
      hotelDrawerTitle.textContent = hotel.name;
      hotelDrawerSub.textContent = hotel.code;
      renderAndWireDrawer(hotel);
      hotelDrawer.hidden = false;
    }

    // Re-render the drawer body for the currently-open hotel using the
    // freshest object in hotelsCache. Used after any successful CRUD
    // op to reflect server state without a flash of empty UI.
    function refreshDrawerFromCache() {
      if (drawerCurrentHotelId == null) return;
      const hotel = hotelsCache.find((h) => h.id === drawerCurrentHotelId);
      if (!hotel) { closeHotelDrawer(); return; }
      hotelDrawerTitle.textContent = hotel.name;
      hotelDrawerSub.textContent = hotel.code;
      renderAndWireDrawer(hotel);
    }

    function renderAndWireDrawer(hotel) {
      // Preserve scroll position across re-renders so users editing
      // halfway down the drawer aren't kicked back to the top.
      const panel = hotelDrawer.querySelector('.drawer__panel');
      const scrollTop = panel ? panel.scrollTop : 0;
      hotelDrawerBody.innerHTML = renderHotelDrawerBody(hotel);
      if (panel) panel.scrollTop = scrollTop;

      // ── Hotel-overview form
      const form = hotelDrawerBody.querySelector('#heForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitHotelEdit(form, hotel);
      });
      hotelDrawerBody.querySelector('#heCancel').addEventListener('click', closeHotelDrawer);

      const terminateBtn = hotelDrawerBody.querySelector('#heTerminate');
      if (terminateBtn) {
        terminateBtn.addEventListener('click', () => {
          if (!confirm(`Terminate "${hotel.name}"?\n\nNew bookings will stop earning commission. Existing bookings + invoices are preserved. You can reinstate later.`)) return;
          setHotelStatus(hotel, 'terminate');
        });
      }
      const reinstateBtn = hotelDrawerBody.querySelector('#heReinstate');
      if (reinstateBtn) {
        reinstateBtn.addEventListener('click', () => {
          setHotelStatus(hotel, 'active');
        });
      }

      // ── Staff section
      const addStaffBtn = hotelDrawerBody.querySelector('#heAddStaff');
      if (addStaffBtn) {
        addStaffBtn.addEventListener('click', () => {
          drawerStaffForm = 'add';
          renderAndWireDrawer(hotel);
        });
      }
      hotelDrawerBody.querySelectorAll('[data-staff-edit]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          drawerStaffForm = { editId: btn.dataset.staffEdit };
          renderAndWireDrawer(hotel);
        });
      });
      hotelDrawerBody.querySelectorAll('[data-staff-revoke]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const staffId = btn.dataset.staffRevoke;
          const staffName = btn.dataset.staffName || 'this staff member';
          if (!confirm(`Revoke ${staffName}?\n\nFuture bookings under their tracking code will stop earning kickback. Past bookings are preserved.`)) return;
          revokeStaff(hotel, staffId);
        });
      });
      // ── Managers section
      const addManagerBtn = hotelDrawerBody.querySelector('#heAddManager');
      if (addManagerBtn) {
        addManagerBtn.addEventListener('click', () => {
          drawerManagerForm = 'add';
          renderAndWireDrawer(hotel);
        });
      }
      hotelDrawerBody.querySelectorAll('[data-manager-edit]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          drawerManagerForm = { editId: btn.dataset.managerEdit };
          renderAndWireDrawer(hotel);
        });
      });
      hotelDrawerBody.querySelectorAll('[data-manager-revoke]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const managerId = btn.dataset.managerRevoke;
          const email = btn.dataset.managerEmail || 'this manager';
          if (!confirm(`Revoke access for ${email}?\n\nThey lose access to /dashboard/hotel/ immediately. You can re-invite later if needed.`)) return;
          revokeManager(hotel, managerId);
        });
      });
      const managerForm = hotelDrawerBody.querySelector('#hmForm');
      if (managerForm) {
        managerForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (drawerManagerForm === 'add') submitManagerInvite(managerForm, hotel);
          else if (drawerManagerForm && drawerManagerForm.editId)
            submitManagerEdit(managerForm, hotel, drawerManagerForm.editId);
        });
        const cancelBtn = hotelDrawerBody.querySelector('#hmCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', () => {
          drawerManagerForm = null;
          renderAndWireDrawer(hotel);
        });
      }

      const staffForm = hotelDrawerBody.querySelector('#hsForm');
      if (staffForm) {
        staffForm.addEventListener('submit', (e) => {
          e.preventDefault();
          if (drawerStaffForm === 'add') submitStaffCreate(staffForm, hotel);
          else if (drawerStaffForm && drawerStaffForm.editId)
            submitStaffEdit(staffForm, hotel, drawerStaffForm.editId);
        });
        const cancelBtn = hotelDrawerBody.querySelector('#hsCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', () => {
          drawerStaffForm = null;
          renderAndWireDrawer(hotel);
        });
        // Auto-derive tracking code from slug while typing (add mode only,
        // and only until the user touches the tracking field manually).
        const slugEl  = staffForm.querySelector('#hsCode');
        const trackEl = staffForm.querySelector('#hsTracking');
        if (slugEl && trackEl && drawerStaffForm === 'add') {
          let touched = false;
          trackEl.addEventListener('input', () => { touched = true; });
          slugEl.addEventListener('input', () => {
            if (touched) return;
            trackEl.value = (slugEl.value || '').toUpperCase().replace(/-/g, '_');
          });
        }
      }
    }
    function openHotelCreateDrawer() {
      hotelDrawerTitle.textContent = 'New hotel';
      hotelDrawerSub.textContent = '';
      hotelDrawerBody.innerHTML = renderHotelCreateForm();
      hotelDrawer.hidden = false;
      // Focus the first field for fast typing.
      const first = hotelDrawerBody.querySelector('input,select,textarea');
      if (first) first.focus();
      // Auto-derive default_tracking_code from slug as the user types,
      // unless they've manually edited the tracking field.
      const slugEl    = hotelDrawerBody.querySelector('#hcCode');
      const trackEl   = hotelDrawerBody.querySelector('#hcTracking');
      let trackTouched = false;
      trackEl.addEventListener('input', () => { trackTouched = true; });
      slugEl.addEventListener('input', () => {
        if (trackTouched) return;
        trackEl.value = (slugEl.value || '').toUpperCase().replace(/-/g, '_');
      });
      // Wire submit.
      const form = hotelDrawerBody.querySelector('#hcForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        submitHotelCreate(form);
      });
      hotelDrawerBody.querySelector('#hcCancel').addEventListener('click', closeHotelDrawer);
    }
    function closeHotelDrawer() {
      hotelDrawer.hidden = true;
      drawerCurrentHotelId = null;
      drawerStaffForm = null;
      drawerManagerForm = null;
      // Drop selected-row highlight.
      document.querySelectorAll('.row--selected').forEach((r) => r.classList.remove('row--selected'));
    }
    hotelDrawerClose.addEventListener('click', closeHotelDrawer);
    hotelDrawer.addEventListener('click', (e) => {
      // Click on the backdrop (outside the panel) closes the drawer.
      if (e.target === hotelDrawer) closeHotelDrawer();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !hotelDrawer.hidden) closeHotelDrawer();
    });

    // "n" anywhere on the Hotels route opens the new-hotel drawer,
    // mirroring Stripe's keyboard shortcut on the Customers page.
    // Skipped while the user is typing in a field or the drawer is
    // already open, and only on /admin/hotels/ so it doesn't fire on
    // unrelated pages.
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'n' && e.key !== 'N') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (currentRoute() !== 'hotels') return;
      if (!hotelDrawer.hidden) return;
      const t = e.target;
      if (t && (t.matches('input, textarea, select') || t.isContentEditable)) return;
      e.preventDefault();
      openHotelCreateDrawer();
    });

    function renderHotelDrawerBody(h) {
      const isActive = h.status === 'active';

      // Edit form for the Overview section. Slug is rendered disabled —
      // the worker rejects code changes anyway (see handleAdminHotelUpdate
      // in workers/bokun/index.js) because slug is the URL identity.
      const overview = `
        <form id="heForm" novalidate>

              <label class="drawer-form__row">
                <span class="drawer-form__label">Tracking code</span>
                <input class="input" id="heTracking" type="text"
                       autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false"
                       pattern="[A-Z0-9_]{2,40}" maxlength="40"

                       style="font-family: var(--font-mono); font-size: 0.9em;">
                <span class="drawer-form__hint">UPPERCASE_WITH_UNDERSCORES.</span>
              </label>

              <label class="drawer-form__row">
                <span class="drawer-form__label">Effective date</span>
                <input class="input" id="heEffective" type="date"
                       value="${escapeHtml(h.effective_date || '')}">
              </label>

              <label class="drawer-form__row">
                <span class="drawer-form__label">Notes</span>
                <textarea class="input" id="heNotes" rows="3"
                          placeholder="Internal notes — not shown to partners.">${escapeHtml(h.notes || '')}</textarea>
              </label>
            </div>
          </section>

          <div class="drawer-actions">
            <button type="button" class="btn" id="heCancel">Close</button>
            <button type="submit" class="btn btn--primary" id="heSave">Save changes</button>
          </div>
        </form>
      `;

      const staff = (h.staff || []).filter((s) => s.status === 'active');
      const editingStaff = drawerStaffForm && drawerStaffForm.editId
        ? staff.find((s) => s.id === drawerStaffForm.editId) || null
        : null;
      const staffSection = `
        <section class="drawer-section">
          <div class="drawer-section__head">
            <h3 class="drawer-section__title">Staff (${staff.length})</h3>
            <button type="button" class="btn btn--sm" id="heAddStaff"
                    ${drawerStaffForm ? 'disabled' : ''}>+ Add</button>
          </div>
          ${staff.length
            ? `<table class="table">
                 <thead><tr>
                   <th>Name</th><th>Slug</th><th>Tracking</th>
                   <th class="num">Kickback</th><th class="row-actions__col"></th>
                 </tr></thead>
                 <tbody>${staff.map((s) => `
                   <tr ${drawerStaffForm && drawerStaffForm.editId === s.id ? 'class="row--selected"' : ''}>
                     <td>${escapeHtml(s.name)}</td>
                     <td class="mono faint">${escapeHtml(s.code)}</td>
                     <td class="mono">${escapeHtml(s.tracking_code || '—')}</td>
                     <td class="num">${s.kickback_pct != null ? s.kickback_pct + '%' : '—'}</td>
                     <td class="row-actions">

                       <button type="button" class="row-actions__btn row-actions__btn--danger"
                               data-staff-revoke="${escapeHtml(s.id)}"

            : '<p class="muted" style="font-size: var(--t-sm)">No staff yet — click + Add to onboard the first one.</p>'}
          ${drawerStaffForm
            ? renderStaffForm(drawerStaffForm === 'add' ? null : editingStaff)
            : ''}
        </section>
      `;

      const managers = (h.managers || []).filter((m) => m.status === 'active');
      const editingManager = drawerManagerForm && drawerManagerForm.editId
        ? managers.find((m) => m.id === drawerManagerForm.editId) || null
        : null;
      const managersSection = `
        <section class="drawer-section">
          <div class="drawer-section__head">
            <h3 class="drawer-section__title">Managers (${managers.length})</h3>
            <button type="button" class="btn btn--sm" id="heAddManager"
                    ${drawerManagerForm ? 'disabled' : ''}>+ Invite</button>
          </div>
          ${managers.length
            ? `<table class="table">
                 <thead><tr>
                   <th>Email</th><th>Role</th><th>Added</th>
                   <th class="row-actions__col"></th>
                 </tr></thead>
                 <tbody>${managers.map((m) => `
                   <tr ${drawerManagerForm && drawerManagerForm.editId === m.id ? 'class="row--selected"' : ''}>
                     <td>${escapeHtml(m.email)}</td>
                     <td class="muted">${escapeHtml(m.role || 'manager')}</td>
                     <td class="muted">${escapeHtml(formatHumanDate((m.created_at || '').slice(0, 10)) || '—')}</td>
                     <td class="row-actions">
                       <button type="button" class="row-actions__btn"
                               data-manager-edit="${escapeHtml(m.id)}"
                               aria-label="Edit ${escapeHtml(m.email)}">Edit</button>
                       <button type="button" class="row-actions__btn row-actions__btn--danger"
                               data-manager-revoke="${escapeHtml(m.id)}"
                               data-manager-email="${escapeHtml(m.email)}"
                               aria-label="Revoke ${escapeHtml(m.email)}">Revoke</button>
                     </td>
                   </tr>`).join('')}
                 </tbody>
               </table>`
            : '<p class="muted" style="font-size: var(--t-sm)">No managers assigned yet — click + Invite to add one.</p>'}
          ${drawerManagerForm
            ? renderManagerForm(drawerManagerForm === 'add' ? null : editingManager)
            : ''}
        </section>
      `;

      // Danger zone — soft-delete (status='terminated') or restore.
      // Soft-delete preserves bookings + invoice history; only future
      // attribution stops. Reinstating just flips the status back.
      const dangerZone = `
        <section class="drawer-section drawer-danger">
          <div class="drawer-section__head">
            <h3 class="drawer-section__title">Danger zone</h3>
          </div>
          ${isActive
            ? `<div class="drawer-danger__row">
                 <div>
                   <div class="drawer-danger__label">Terminate hotel</div>
                   <div class="drawer-danger__hint">Marks the partner inactive. New bookings stop earning commission. Existing bookings + invoices are preserved.</div>
                 </div>
                 <button type="button" class="btn btn--danger" id="heTerminate">Terminate</button>
               </div>`
            : `<div class="drawer-danger__row">
                 <div>
                   <div class="drawer-danger__label">Reinstate hotel</div>
                   <div class="drawer-danger__hint">Flips status back to active so new bookings start attributing again.</div>
                 </div>
                 <button type="button" class="btn" id="heReinstate">Reinstate</button>
               </div>`}
        </section>
      `;

      return overview + staffSection + managersSection + dangerZone;
    }

    function submitHotelCreate(form) {
      const errEl = form.querySelector('#hcError');
      const saveBtn = form.querySelector('#hcSave');
      errEl.hidden = true;

      // Read + lightly normalise client-side. Server is authoritative
      // for validation; this is just to skip obvious round-trips.
      const code = form.querySelector('#hcCode').value.trim().toLowerCase();
      const name = form.querySelector('#hcName').value.trim();
      const location = form.querySelector('#hcLocation').value;
      const type = form.querySelector('#hcType').value;
      const commission = form.querySelector('#hcCommission').value.trim();
      const pool = form.querySelector('#hcPool').value.trim();
      const tracking = form.querySelector('#hcTracking').value.trim().toUpperCase();
      const effective = form.querySelector('#hcEffective').value.trim();
      const notes = form.querySelector('#hcNotes').value.trim();

      if (!/^[a-z0-9-]{2,40}$/.test(code)) {
        return showInline(errEl, 'Slug must be 2–40 lowercase letters, digits, or hyphens.');
      }
      if (!name) return showInline(errEl, 'Name is required.');
      if (!location) return showInline(errEl, 'Pick a location.');
      if (!type) return showInline(errEl, 'Pick a type.');

      const body = { code, name, location, type };
      if (commission !== '') body.commission_pct = Number(commission);
      if (pool !== '')       body.kickback_pool_pct = Number(pool);
      if (tracking)          body.default_tracking_code = tracking;
      if (effective)         body.effective_date = effective;
      if (notes)             body.notes = notes;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Creating…';

      fetch(BOKUN_API_BASE + '/api/admin/hotels', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 409 ? 'A hotel with this slug already exists.' :
               res.status === 401 ? 'Session expired — please sign in again.' :
                                    'Could not create hotel (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          // Fire-and-forget the deploy hook. We don't block the UI on
          // it; the build takes ~30–60s and the user already sees the
          // new hotel in the list immediately from the local refresh.
          triggerRepublish();
          closeHotelDrawer();
          flashHotelsNotice('Hotel created. Republishing partners.json (~30s)…');
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
        })
        .finally(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Create hotel';
        });
    }
    function showInline(errEl, msg) {
      errEl.textContent = msg;
      errEl.hidden = false;
      errEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function triggerRepublish() {
      fetch(BOKUN_API_BASE + '/api/admin/republish', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + session.access_token },
      }).catch((err) => {
        console.warn('republish trigger failed', err);
      });
    }

    function submitHotelEdit(form, hotel) {
      const errEl     = form.querySelector('#heError');
      const successEl = form.querySelector('#heSuccess');
      const saveBtn   = form.querySelector('#heSave');
      errEl.hidden = true;
      successEl.hidden = true;

      const name      = form.querySelector('#heName').value.trim();
      const location  = form.querySelector('#heLocation').value;
      const type      = form.querySelector('#heType').value;
      const commission = form.querySelector('#heCommission').value.trim();
      const pool      = form.querySelector('#hePool').value.trim();
      const tracking  = form.querySelector('#heTracking').value.trim().toUpperCase();
      const effective = form.querySelector('#heEffective').value.trim();
      const notes     = form.querySelector('#heNotes').value;

      if (!name) return showInline(errEl, 'Name is required.');
      if (!location) return showInline(errEl, 'Pick a location.');
      if (!type) return showInline(errEl, 'Pick a type.');

      // Build a patch body. Send fields that changed OR that the
      // worker requires for non-null values; null clears the field.
      const body = { name, location, type };
      body.commission_pct    = commission !== '' ? Number(commission) : 0;
      body.kickback_pool_pct = pool !== '' ? Number(pool) : null;
      body.default_tracking_code = tracking || null;
      body.effective_date    = effective || null;
      body.notes             = notes ? notes : null;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      fetch(BOKUN_API_BASE + '/api/admin/hotels/' + encodeURIComponent(hotel.id), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify(body),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 401 ? 'Session expired — please sign in again.' :
               res.status === 404 ? 'Hotel not found — refresh the list.' :
                                    'Save failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          triggerRepublish();
          successEl.textContent = 'Saved. Republishing partners.json (~30s)…';
          successEl.hidden = false;
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
        })
        .finally(() => {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
    }

    function setHotelStatus(hotel, action) {
      // action: 'terminate' → DELETE (worker flips status to 'terminated')
      //         'active'    → PATCH { status: 'active' } (reinstate)
      const isTerminate = action === 'terminate';
      const opts = isTerminate
        ? { method: 'DELETE' }
        : {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'active' }),
          };
      opts.headers = Object.assign(
        { Authorization: 'Bearer ' + session.access_token },
        opts.headers || {},
      );

      fetch(BOKUN_API_BASE + '/api/admin/hotels/' + encodeURIComponent(hotel.id), opts)
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) || ('Action failed (HTTP ' + res.status + ').');
            flashHotelsError(msg);
            return;
          }
          triggerRepublish();
          flashHotelsNotice(
            isTerminate
              ? `"${hotel.name}" terminated. Republishing partners.json (~30s)…`
              : `"${hotel.name}" reinstated. Republishing partners.json (~30s)…`,
          );
          closeHotelDrawer();
          if (hotelsEls) loadHotels(hotelsEls);
        })
        .catch((err) => {
          flashHotelsError(err && err.message || 'Unknown error');
        });
    }
    function flashHotelsError(msg) {
      if (!hotelsEls || !hotelsEls.error) return;
      hotelsEls.error.textContent = msg;
      hotelsEls.error.hidden = false;
      setTimeout(() => { if (hotelsEls && hotelsEls.error) hotelsEls.error.hidden = true; }, 6000);
    }

          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Send invite';
        });
    }

    function submitManagerEdit(form, hotel, managerId) {
      const errEl   = form.querySelector('#hmError');
      const saveBtn = form.querySelector('#hmSave');
      errEl.hidden = true;

      const role = form.querySelector('#hmRole').value;
      if (!['manager', 'admin'].includes(role)) {
        return showInline(errEl, 'Pick a valid role.');
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';

      fetch(BOKUN_API_BASE + '/api/admin/hotel-users/' + encodeURIComponent(managerId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ role }),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            const msg = (res.body && res.body.error) ||
              (res.status === 404 ? 'Manager not found — refresh and retry.' :
                                    'Save failed (HTTP ' + res.status + ').');
            throw new Error(msg);
          }
          drawerManagerForm = null;
          flashHotelsNotice('Manager role updated.');
          if (hotelsEls) loadHotels(hotelsEls).then(refreshDrawerFromCache);
        })
        .catch((err) => {
          showInline(errEl, err.message || 'Unknown error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
    }

    function revokeManager(hotel, managerId) {
      fetch(BOKUN_API_BASE + '/api/admin/hotel-users/' + encodeURIComponent(managerId), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + session.access_token,
        },
        body: JSON.stringify({ status: 'revoked' }),
      })
        .then((r) => r.json().then((b) => ({ ok: r.ok, status: r.status, body: b })))
        .then((res) => {
          if (!res.ok) {
            flashHotelsError((res.body && res.body.error) || 'Revoke failed (HTTP ' + res.status + ').');
            return;
          }
          flashHotelsNotice('Manager access revoked.');
          if (hotelsEls) loadHotels(hotelsEls).then(refreshDrawerFromCache);
        })
        .catch((err) => flashHotelsError(err.message || 'Unknown error'));
    }

    /* ── Period / range / formatting helpers ─────────────── */
    function startOfDay(d) { const c = new Date(d); c.setHours(0, 0, 0, 0); return c; }
    function endOfDay(d)   { const c = new Date(d); c.setHours(23, 59, 59, 999); return c; }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function monthLong(m) {
      return ['January','February','March','April','May','June',
              'July','August','September','October','November','December'][m] || '';
    }
    function makeRange(fromDate, toDate, opts) {
      const labelFrom = ymd(fromDate);
      const labelTo   = ymd(toDate);
      return {
        from:      fromDate.toISOString(),
        to:        toDate.toISOString(),
        labelFrom, labelTo,
        slug:  (opts && opts.slug)  || (labelFrom + '_' + labelTo),
        label: (opts && opts.label) || (formatHumanDate(labelFrom) + ' – ' + formatHumanDate(labelTo)),
      };
    }
    function rangeForPeriod() {
      const now = new Date();
      const y = now.getFullYear(), m = now.getMonth();
      if (currentPeriod === 'this-month') {
        return makeRange(startOfDay(new Date(y, m, 1)), now,
          { slug: y + '-' + pad2(m + 1), label: monthLong(m) + ' ' + y });
      }
      if (currentPeriod === 'last-month') {
        const firstThis = new Date(y, m, 1);
        const lastPrev  = endOfDay(new Date(firstThis.getTime() - 1));
        const firstPrev = startOfDay(new Date(lastPrev.getFullYear(), lastPrev.getMonth(), 1));
        return makeRange(firstPrev, lastPrev,
          { slug: lastPrev.getFullYear() + '-' + pad2(lastPrev.getMonth() + 1),
            label: monthLong(lastPrev.getMonth()) + ' ' + lastPrev.getFullYear() });
      }
      if (currentPeriod === 'ytd') {
        return makeRange(startOfDay(new Date(y, 0, 1)), now,
          { slug: y + '-ytd', label: y + ' year-to-date' });
      }
      if (currentPeriod === 'custom' && customRange) return customRange;
      return makeRange(startOfDay(new Date(y, m, 1)), now,
        { slug: y + '-' + pad2(m + 1), label: monthLong(m) + ' ' + y });
    }
    function ymd(d) {
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }
    function formatMoney(n) {
      return 'CA$' + (Math.round((n || 0) * 100) / 100).toFixed(2);
    }
    function formatRange(from, to) {
      return formatHumanDate(from) + ' – ' + formatHumanDate(to);
    }
    function formatHumanDate(s) {
      if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return s || '';
      const p = s.split('-').map(Number);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[p[1] - 1] + ' ' + p[2] + ', ' + p[0];
    }
    function formatHumanDateTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '—';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      let hr = d.getHours(); const mer = hr >= 12 ? 'pm' : 'am';
      hr = hr % 12; if (hr === 0) hr = 12;
      const min = String(d.getMinutes()).padStart(2, '0');
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + hr + ':' + min + mer;
    }

    /* ── Icons (Lucide-style line, 16px viewBox=24) ──────── */
    function svg(d) {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + d + '</svg>';
    }
    function iconHome()     { return svg('<path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/>'); }
    function iconBookings() { return svg('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'); }
    function iconHotels()   { return svg('<path d="M5 22V4a1 1 0 011-1h12a1 1 0 011 1v18"/><path d="M3 22h18"/><circle cx="9"  cy="8"  r="0.5" fill="currentColor"/><circle cx="15" cy="8"  r="0.5" fill="currentColor"/><circle cx="9"  cy="13" r="0.5" fill="currentColor"/><circle cx="15" cy="13" r="0.5" fill="currentColor"/><path d="M10 22v-4h4v4"/>'); }
    function iconCompass()  { return svg('<circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 13.5 13.5 8.5 15.5 10.5 10.5"/>'); }
    function iconCard()     { return svg('<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>'); }
    function iconReceipt()  { return svg('<path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 1 2V2H4z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/>'); }
    function iconFile()     { return svg('<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>'); }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (m) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
    }

    /* ── Initial render — last thing in the script so every const
         it consumes (renderers, BOKUN_API_BASE, helpers) is past
         its TDZ by now. ─────────────────────────────────────── */
    render();
  </script>
