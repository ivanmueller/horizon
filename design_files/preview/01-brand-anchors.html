<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Brand colours</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .sw{display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw__chip{height:60px;}
  .sw__meta{padding:8px 10px;}
  .sw__name{font:var(--weight-medium) 12px/1.2 var(--font-sans);color:var(--text-primary);}
  .sw__hex{font:400 11px/1.4 var(--font-mono);color:var(--text-secondary);margin-top:2px;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="sw__chip" style="background:#5B2DE8"></div><div class="sw__meta"><div class="sw__name">Horizon Violet</div><div class="sw__hex">violet-500 · #5B2DE8</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#4920C4"></div><div class="sw__meta"><div class="sw__name">Violet · hover</div><div class="sw__hex">violet-600 · #4920C4</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#F4B860"></div><div class="sw__meta"><div class="sw__name">Aurora</div><div class="sw__hex">warning-400 · #F4B860</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#0E0E14"></div><div class="sw__meta"><div class="sw__name">Obsidian</div><div class="sw__hex">neutral-900 · #0E0E14</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-subtle);"></div><div class="sw__meta"><div class="sw__name">Cloud</div><div class="sw__hex">page · #FFFFFF</div></div></div>
</div>
</body></html>
