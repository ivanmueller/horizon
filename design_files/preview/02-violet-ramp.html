<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Violet ramp</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;}
  .sw{display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw__chip{height:64px;}
  .sw__meta{padding:6px 8px;background:#fff;}
  .sw__name{font:var(--weight-medium) 11px/1.2 var(--font-sans);color:var(--text-primary);}
  .sw__hex{font:400 10px/1.4 var(--font-mono);color:var(--text-secondary);margin-top:2px;}
  .anchor{outline:2px solid var(--color-violet-500);outline-offset:-2px;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="sw__chip" style="background:#F5F2FE"></div><div class="sw__meta"><div class="sw__name">50</div><div class="sw__hex">F5F2FE</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#EBE4FD"></div><div class="sw__meta"><div class="sw__name">100</div><div class="sw__hex">EBE4FD</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#D4C4FA"></div><div class="sw__meta"><div class="sw__name">200</div><div class="sw__hex">D4C4FA</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#B69BF5"></div><div class="sw__meta"><div class="sw__name">300</div><div class="sw__hex">B69BF5</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#8C61EE"></div><div class="sw__meta"><div class="sw__name">400</div><div class="sw__hex">8C61EE</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#5B2DE8"></div><div class="sw__meta"><div class="sw__name">500 · anchor</div><div class="sw__hex">5B2DE8</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#4920C4"></div><div class="sw__meta"><div class="sw__name">600 · hover</div><div class="sw__hex">4920C4</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#3A189E"></div><div class="sw__meta"><div class="sw__name">700</div><div class="sw__hex">3A189E</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#2D1378"></div><div class="sw__meta"><div class="sw__name">800</div><div class="sw__hex">2D1378</div></div></div>
</div>
</body></html>
