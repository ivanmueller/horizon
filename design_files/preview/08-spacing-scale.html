<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:28px;}
  .row{display:grid;grid-template-columns:80px 80px 1fr;gap:14px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:0;}
  .tag{font:500 12px/1 var(--font-sans);color:var(--text-primary);}
  .val{font:400 11px/1 var(--font-mono);color:var(--text-secondary);}
  .bar{height:14px;background:var(--color-violet-200);border-radius:var(--radius-sm);}
  .bar.v{background:var(--color-violet-600);}
</style></head><body>
  <div class="row"><span class="tag">xs</span><span class="val">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tag">sm</span><span class="val">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tag">md</span><span class="val">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tag">lg</span><span class="val">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tag">xl</span><span class="val">24px</span><span class="bar v" style="width:24px"></span></div>
  <div class="row"><span class="tag">2xl</span><span class="val">32px</span><span class="bar v" style="width:32px"></span></div>
  <div class="row"><span class="tag">3xl</span><span class="val">48px</span><span class="bar v" style="width:48px"></span></div>
  <div class="row"><span class="tag">4xl</span><span class="val">64px</span><span class="bar v" style="width:64px"></span></div>
</body></html>
