<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Neutral ramp</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
  .sw{display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw__chip{height:64px;}
  .sw__meta{padding:6px 8px;background:#fff;}
  .sw__name{font:var(--weight-medium) 11px/1.2 var(--font-sans);color:var(--text-primary);}
  .sw__hex{font:400 10px/1.4 var(--font-mono);color:var(--text-secondary);margin-top:2px;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="sw__chip" style="background:#FAFAFC"></div><div class="sw__meta"><div class="sw__name">50</div><div class="sw__hex">FAFAFC</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#F4F3F8"></div><div class="sw__meta"><div class="sw__name">100</div><div class="sw__hex">F4F3F8</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#ECEAF4"></div><div class="sw__meta"><div class="sw__name">200</div><div class="sw__hex">ECEAF4</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#D8D5E2"></div><div class="sw__meta"><div class="sw__name">300</div><div class="sw__hex">D8D5E2</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#B0AAC0"></div><div class="sw__meta"><div class="sw__name">400</div><div class="sw__hex">B0AAC0</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#807A92"></div><div class="sw__meta"><div class="sw__name">500</div><div class="sw__hex">807A92</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#5C5670"></div><div class="sw__meta"><div class="sw__name">600</div><div class="sw__hex">5C5670</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#3F3A4D"></div><div class="sw__meta"><div class="sw__name">700</div><div class="sw__hex">3F3A4D</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#25222E"></div><div class="sw__meta"><div class="sw__name">800</div><div class="sw__hex">25222E</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#0E0E14"></div><div class="sw__meta"><div class="sw__name">900</div><div class="sw__hex">0E0E14</div></div></div>
</div>
</body></html>
