<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Radius hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:28px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:84px;height:64px;background:var(--color-blue-100);border:1.5px solid var(--color-blue-600);}
  .tag{font:500 12px/1 var(--font-sans);color:var(--text-primary);}
  .ref{font:400 11px/1 var(--font-mono);color:var(--text-secondary);}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="tag">sm · inputs</div><div class="ref">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="tag">md · buttons</div><div class="ref">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="tag">lg · cards</div><div class="ref">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="tag">xl · modals</div><div class="ref">16px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="tag">pill · tags</div><div class="ref">999px</div></div>
</div>
</body></html>
