<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Form controls</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:24px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  label{font:500 13px/1.4 var(--font-sans);color:var(--text-primary);}
  .help{font:400 12px/1.4 var(--font-sans);color:var(--text-secondary);}
  .input,.select,.textarea{display:block;width:100%;padding:8px 12px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:#fff;color:var(--text-primary);font:400 14px/1.5 var(--font-sans);box-sizing:border-box;}
  .input::placeholder{color:var(--text-tertiary);}
  .input:hover{border-color:var(--border-strong);}
  .input[data-state=focus]{outline:none;border-color:var(--border-brand);box-shadow:var(--shadow-focus-ring);}
  .input[data-state=error]{border-color:var(--color-danger-600);}
  .input[disabled]{background:var(--bg-subtle);color:var(--text-secondary);}
  .check{display:flex;align-items:center;gap:8px;font:400 14px var(--font-sans);color:var(--text-body);cursor:pointer;}
  .check input{width:16px;height:16px;accent-color:var(--color-blue-600);}
  .switch{position:relative;width:34px;height:20px;background:var(--color-neutral-300);border-radius:999px;}
  .switch.on{background:var(--color-blue-600);}
  .switch::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .15s var(--motion-ease-out);}
  .switch.on::after{left:17px;}
</style></head><body>
<div class="grid">
  <div class="field">
    <label>Hotel name</label>
    <input class="input" value="Banff Springs Hotel"/>
    <span class="help">Public name shown to travellers</span>
  </div>
  <div class="field">
    <label>Commission rate</label>
    <input class="input" data-state=focus value="12.5"/>
    <span class="help" style="color:var(--text-brand)">Focused</span>
  </div>
  <div class="field">
    <label>Payout email</label>
    <input class="input" data-state=error value="not-a-real-email"/>
    <span class="help" style="color:var(--text-danger)">Enter a valid email address</span>
  </div>
  <div class="field">
    <label>Bokun integration ID</label>
    <input class="input" disabled value="—"/>
    <span class="help">Disabled until Stripe Connect is linked</span>
  </div>
  <div class="field" style="grid-column:1/-1;">
    <label>Notes for the operator</label>
    <textarea class="textarea" rows="2" placeholder="Optional context — guest expectations, accessibility needs, etc."></textarea>
  </div>
  <label class="check"><input type="checkbox" checked/> Send weekly payout summary</label>
  <label class="check" style="justify-content:space-between;"><span>Auto-credit hotel-card scans</span><span class="switch on" aria-hidden></span></label>
</div>
</body></html>
