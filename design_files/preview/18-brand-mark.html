<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:32px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;background:var(--bg-page);border-radius:var(--radius-lg);border:1px solid var(--border-subtle);}
  .item.dark{background:var(--color-neutral-900);}
  .item.dark .name,.item.dark .meta{color:#fff;}
  .name{font:500 13px/1 var(--font-sans);color:var(--text-primary);}
  .meta{font:400 11px/1.4 var(--font-mono);color:var(--text-secondary);}
  .lg{width:64px;height:64px;border-radius:14px;}
  svg.lg{display:block;}
</style></head><body>
<div class="row">
  <div class="item">
    <svg class="lg" viewBox="0 0 36 36"><rect width="36" height="36" rx="8" fill="#4F5BFF"/><path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="#FAFAFC" stroke-width="4" stroke-linecap="round" fill="none"/></svg>
    <div class="name">Mark · Connect</div>
    <div class="meta">blue-500 · radius 8 / 14</div>
  </div>
  <div class="item">
    <svg viewBox="0 0 220 36" width="180" height="32"><rect width="36" height="36" rx="8" fill="#4F5BFF"/><path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="#FAFAFC" stroke-width="4" stroke-linecap="round" fill="none"/><text x="48" y="24" font-family="Inter,sans-serif" font-size="20" font-weight="600" fill="#25222E" letter-spacing="-0.4">horizon</text><text x="142" y="24" font-family="Inter,sans-serif" font-size="20" font-weight="400" fill="#5C5670" letter-spacing="-0.2">connect</text></svg>
    <div class="name">Wordmark</div>
    <div class="meta">Inter 600 + 400</div>
  </div>
  <div class="item dark">
    <svg class="lg" viewBox="0 0 36 36"><rect width="36" height="36" rx="8" fill="#FF8A3D"/><path d="M13 7v22M13 18c0-6 12-6 12 0v11" stroke="#FAF9F6" stroke-width="4" stroke-linecap="round" fill="none"/></svg>
    <div class="name">Mark · Tours sibling</div>
    <div class="meta" style="color:#B0AAC0">orange-500 · warm neutrals</div>
  </div>
</div>
</body></html>
