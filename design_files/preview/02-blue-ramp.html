<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Blue ramp</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-surface);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;}
  .sw{display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw__chip{height:64px;}
  .sw__meta{padding:6px 8px;background:#fff;}
  .sw__name{font:var(--weight-medium) 11px/1.2 var(--font-sans);color:var(--text-primary);}
  .sw__hex{font:400 10px/1.4 var(--font-mono);color:var(--text-secondary);margin-top:2px;}
  .anchor{outline:2px solid var(--color-blue-500);outline-offset:-2px;}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="sw__chip" style="background:#EEF0FF"></div><div class="sw__meta"><div class="sw__name">50</div><div class="sw__hex">EEF0FF</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#DDE2FF"></div><div class="sw__meta"><div class="sw__name">100</div><div class="sw__hex">DDE2FF</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#BFC6FF"></div><div class="sw__meta"><div class="sw__name">200</div><div class="sw__hex">BFC6FF</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#95A0FF"></div><div class="sw__meta"><div class="sw__name">300</div><div class="sw__hex">95A0FF</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#7281FF"></div><div class="sw__meta"><div class="sw__name">400</div><div class="sw__hex">7281FF</div></div></div>
  <div class="sw anchor"><div class="sw__chip" style="background:#4F5BFF"></div><div class="sw__meta"><div class="sw__name">500 · anchor</div><div class="sw__hex">4F5BFF</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#3543E6"></div><div class="sw__meta"><div class="sw__name">600 · hover</div><div class="sw__hex">3543E6</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#2530BB"></div><div class="sw__meta"><div class="sw__name">700 · pressed</div><div class="sw__hex">2530BB</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:#1A2289"></div><div class="sw__meta"><div class="sw__name">800</div><div class="sw__hex">1A2289</div></div></div>
</div>
</body></html>
