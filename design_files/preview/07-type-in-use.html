<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Type in use</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-page);padding:28px;}
  .card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:24px;max-width:640px;box-shadow:var(--shadow-e1);}
  .eyeb{font:500 11px/1.4 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);}
  .h1{font:500 28px/1.1 var(--font-sans);letter-spacing:-.02em;color:var(--text-primary);margin:6px 0 2px;}
  .sub{font:400 14px/1.5 var(--font-sans);color:var(--text-body);margin:0 0 16px;}
  .num{font:500 28px/1 var(--font-sans);color:var(--text-primary);letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .nums{display:flex;gap:36px;margin-top:8px;}
  .nums small{font:400 11px/1.4 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);display:block;margin-bottom:6px;}
  .delta{font:500 12px/1 var(--font-sans);color:var(--feedback-success-text);font-variant-numeric:tabular-nums;margin-left:8px;}
  code{font:400 12px/1 var(--font-mono);background:var(--bg-subtle);padding:2px 6px;border-radius:var(--radius-sm);color:var(--text-body);}
</style></head><body>
<div class="card">
  <div class="eyeb">Partner · Banff Springs Hotel</div>
  <h1 class="h1">$28,420.50 in commission this quarter</h1>
  <p class="sub">347 bookings across 12 tour operators. The referral link in your lobby kiosk drives 62 % of credited touches.</p>
  <div class="nums">
    <div><small>Bookings</small><div class="num">347 <span class="delta">+18%</span></div></div>
    <div><small>Travellers</small><div class="num">912</div></div>
    <div><small>Commission</small><div class="num">$28,420.50</div></div>
  </div>
  <div style="margin-top:14px;font:400 12px/1.5 var(--font-mono);color:var(--text-secondary);">Confirmation · <code>HRZ-3DK29F</code> · synced 2 min ago</div>
</div>
</body></html>
